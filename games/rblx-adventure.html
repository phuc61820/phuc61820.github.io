        start: 'start',
        scenes: {

            { label: '💻 Hack thay vì bắn', next: 'hack' } ] },

          reset: { text: 'Reset thất bại, AI phát hiện!', ending: 'lose' },

      {

        desc: 'Khám phá thành phố dưới đáy biển',
        color: '#0284c7',
        start: 'start',
        scenes: {
          start: { text: 'Tàu lặn của bạn đến tọa độ Atlantis.', choices: [

          deep: { text: 'Có sinh vật lạ lướt qua!', choices: [

            { label: '🤫 Tắt đèn im lặng', next: 'quiet' } ] },
          sonar: { text: 'Sonar phát hiện kiến trúc cổ bên dưới.', choices: [

          quiet: { text: 'Sinh vật bơi qua, không chú ý.', choices: [

          temple: { text: 'Đền có viên ngọc thần phát sáng.', choices: [
            { label: '💎 Lấy ngọc', next: 'gem' },
            { label: '📸 Chỉ chụp ảnh', next: 'photo' } ] },
          palace: { text: 'Cung điện có xác vua đeo vương miện.', choices: [
            { label: '👑 Lấy vương miện', next: 'curse' },
            { label: '🙏 Để yên, đi tiếp', next: 'photo' } ] },
          gem: { text: 'Ngọc kích hoạt bẫy! Nước tràn vào.', choices: [
            { label: '🏃 Chạy', next: 'flood' } ] },
          photo: { text: 'Bạn ghi lại mọi thứ.', choices: [
            { label: '🚀 Về mặt nước', next: 'surface' } ] },
          curse: { text: 'Lời nguyền kích hoạt, tàu lặn hỏng!', ending: 'lose' },
          flood: { text: 'Bạn thoát nhưng mất ngọc.', choices: [
            { label: '🚀 Về mặt nước', next: 'surface' } ] },
          surface: { text: 'Bạn về an toàn với bằng chứng!', choices: [
            { label: '🏆 Công bố khám phá', next: 'win' } ] },
          win: { text: '🏆 LỊCH SỬ! Bạn tìm thấy Atlantis!', ending: 'win' }
        }
      }
    ];

    // ====== PROGRESS ======
    const STORAGE_KEY = 'rblxAdventureProgress';
    function loadProgress() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch(e) { return {}; }
    }
    function saveProgress(p) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch(e) {}
    }

    // ====== HUB ======
    function Hub({ onPick, progress }) {
      const completed = Object.values(progress).filter(p => p.win).length;
      return (
        <div style={{ padding: 20, maxWidth: 1200, margin: '0 auto' }}>
          <a href="../index.html" style={{ display: 'inline-block', marginBottom: 16, padding: '10px 20px', background: '#374151', color: 'white', borderRadius: 8, textDecoration: 'none', fontWeight: 'bold' }}>← Quay lại</a>
          <h1 style={{ textAlign: 'center', fontSize: 42, marginBottom: 8 }}>🗺️ Adventure Hub</h1>
          <p style={{ textAlign: 'center', marginBottom: 8, opacity: 0.9 }}>10 cuộc phiêu lưu chọn lựa lôi cuốn</p>
          <p style={{ textAlign: 'center', marginBottom: 24, fontWeight: 'bold' }}>🏆 Chiến thắng: {completed}/10</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(250px, 1fr))', gap: 16 }}>
            {STORIES.map(s => {
              const p = progress[s.id] || {};
              const played = p.endings ? Object.keys(p.endings).length : 0;
              return (
                <button key={s.id} onClick={() => onPick(s.id)} style={{
                  background: s.color, border: 'none', borderRadius: 16, padding: 20,
                  color: 'white', cursor: 'pointer', textAlign: 'left',
                  boxShadow: p.win ? '0 0 20px gold' : '0 4px 12px rgba(0,0,0,0.3)'
                }}>
                  <div style={{ fontSize: 48, marginBottom: 8 }}>{s.icon}</div>
                  <div style={{ fontSize: 20, fontWeight: 'bold', marginBottom: 6 }}>{s.title}</div>
                  <div style={{ fontSize: 13, opacity: 0.9, marginBottom: 10 }}>{s.desc}</div>
                  <div style={{ fontSize: 12, opacity: 0.95 }}>
                    {p.win ? '🏆 Đã thắng' : played > 0 ? `🎯 ${played} kết thúc` : '🆕 Chưa chơi'}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // ====== STORY PLAYER ======
    function Story({ story, onBack, progress, setProgress }) {
      const [sceneId, setSceneId] = useState(story.start);
      const scene = story.scenes[sceneId];
      const [history, setHistory] = useState([]);

      function choose(next) {
        setHistory(h => [...h.slice(-4), scene.text]);
        setSceneId(next);
        const nextScene = story.scenes[next];
        if (nextScene && nextScene.ending) {
          const sp = progress[story.id] || { endings: {} };
          sp.endings = sp.endings || {};
          sp.endings[next] = nextScene.ending;
          if (nextScene.ending === 'win') sp.win = true;
          const newProgress = { ...progress, [story.id]: sp };
          setProgress(newProgress);
          saveProgress(newProgress);
        }
      }

      function restart() {
        setSceneId(story.start);
        setHistory([]);
      }

      const isEnd = scene.ending;

      return (
        <div style={{ padding: 20, maxWidth: 800, margin: '0 auto' }}>
          <button onClick={onBack} style={{ padding: '8px 16px', background: '#374151', border: 'none', color: 'white', borderRadius: 8, cursor: 'pointer', marginBottom: 16 }}>← Menu</button>
          <div style={{ background: story.color, borderRadius: 16, padding: 20, marginBottom: 16, textAlign: 'center' }}>
            <div style={{ fontSize: 60 }}>{story.icon}</div>
            <h2 style={{ fontSize: 26 }}>{story.title}</h2>
          </div>

          {history.length > 0 && (
            <div style={{ background: 'rgba(255,255,255,0.05)', borderRadius: 12, padding: 12, marginBottom: 12, fontSize: 13, opacity: 0.7, maxHeight: 120, overflowY: 'auto' }}>
              {history.map((h, i) => <div key={i} style={{ marginBottom: 4 }}>📖 {h}</div>)}
            </div>
          )}

          <div style={{
            background: isEnd === 'win' ? 'linear-gradient(135deg, #059669, #10b981)' :
                        isEnd === 'lose' ? 'linear-gradient(135deg, #991b1b, #dc2626)' :
                        'rgba(255,255,255,0.1)',
            borderRadius: 16, padding: 24, marginBottom: 20, fontSize: 18, lineHeight: 1.6,
            border: '2px solid rgba(255,255,255,0.2)'
          }}>
            {scene.text}
          </div>

          {!isEnd && scene.choices && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {scene.choices.map((c, i) => (
                <button key={i} onClick={() => choose(c.next)} style={{
                  padding: '14px 20px', fontSize: 16, background: 'rgba(255,255,255,0.15)',
                  border: '2px solid rgba(255,255,255,0.3)', color: 'white',
                  borderRadius: 12, cursor: 'pointer', textAlign: 'left', fontWeight: 'bold'
                }}>{c.label}</button>
              ))}
            </div>
          )}

          {isEnd && (
            <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
              <button onClick={restart} style={{ padding: '12px 24px', fontSize: 16, background: '#f59e0b', border: 'none', color: 'white', borderRadius: 12, cursor: 'pointer', fontWeight: 'bold' }}>🔄 Chơi lại</button>
              <button onClick={onBack} style={{ padding: '12px 24px', fontSize: 16, background: '#374151', border: 'none', color: 'white', borderRadius: 12, cursor: 'pointer', fontWeight: 'bold' }}>🏠 Menu</button>
            </div>
          )}
        </div>
      );
    }

    // ====== APP ======
    function App() {
      const [selected, setSelected] = useState(null);
      const [progress, setProgress] = useState(loadProgress());

      if (selected) {
        const story = STORIES.find(s => s.id === selected);
        return <Story story={story} onBack={() => setSelected(null)} progress={progress} setProgress={setProgress} />;
      }
      return <Hub onPick={setSelected} progress={progress} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
