    const LATIN_SUFFIX = ["orientalis","magnificus","grandis","elegans","vulgaris","imperialis","rex","maximus","minor","gigas","asiaticus","africanus","europaeus","indicus","tropicus","polaris","serrata","aurora","nocturnus","argentum"];

    // ===================== GENERATOR =====================

    function pick(arr, seed) { return arr[seed % arr.length]; }

    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return Math.abs(h);
    }

    function generateLatin(name, i) {
      const a = pick(LATIN_PREFIX, hashStr(name) + i);
      const b = pick(LATIN_SUFFIX, hashStr(name) * 3 + i * 7);
      return a + " " + b;
    }

    function buildSpecies(kind, idx, totalOfKind) {
      let names, emojis, habitats, foods, sizes, lifes, descTmpl, factTmpl, types, careList, reactions;
      if (kind === 'animal') {
        names = ANIMAL_NAMES; emojis = ANIMAL_EMOJIS; habitats = ANIMAL_HABITATS; foods = ANIMAL_FOODS;
        sizes = SIZES_ANIMAL; lifes = LIFESPANS_ANIMAL; descTmpl = ANIMAL_DESC_TEMPLATES; factTmpl = ANIMAL_FACTS;
        types = ANIMAL_TYPES; careList = ANIMAL_CARE; reactions = REACTIONS_ANIMAL;
      } else if (kind === 'plant') {
        names = PLANT_NAMES; emojis = PLANT_EMOJIS; habitats = PLANT_HABITATS; foods = PLANT_FOODS;
        sizes = SIZES_PLANT; lifes = LIFESPANS_PLANT; descTmpl = PLANT_DESC_TEMPLATES; factTmpl = PLANT_FACTS;
        types = PLANT_TYPES; careList = PLANT_CARE; reactions = REACTIONS_PLANT;
      } else {
        names = DINO_NAMES; emojis = DINO_EMOJIS; habitats = DINO_HABITATS; foods = DINO_FOODS;
        sizes = SIZES_DINO; lifes = LIFESPANS_DINO; descTmpl = DINO_DESC_TEMPLATES; factTmpl = DINO_FACTS;
        types = DINO_TYPES; careList = DINO_CARE; reactions = REACTIONS_DINO;
      }

      // Ensure every species has a unique displayed name by appending a variant suffix when wrapping
      let baseName = names[idx % names.length];
      const cycle = Math.floor(idx / names.length);
      let displayName = baseName;
      if (cycle > 0) {
        const VARIANTS = [" (phân loài phương Bắc)"," (phân loài phương Nam)"," (biến thể Đông)"," (biến thể Tây)"," (dòng quý hiếm)"," (dòng cổ đại)"," (giống thuần)"];
        displayName = baseName + VARIANTS[(cycle - 1) % VARIANTS.length];
      }

      const seed = hashStr(displayName) + idx * 13;
      return {
        id: kind + "_" + idx,
        kind,
        n: displayName,
        e: pick(emojis, seed),
        sci: generateLatin(displayName, idx),
        h: pick(habitats, seed + 1),
        f: pick(foods, seed + 2),
        sz: pick(sizes, seed + 3),
        life: pick(lifes, seed + 4),
        typ: pick(types, seed + 5),
        descIdx: seed % descTmpl.length,
        factIdx: (seed + 17) % factTmpl.length,
        care: careList,
        reactions
      };
    }

      );
    }

    function SearchBar({ value, onChange }) {
      return (
        <div style={{ padding: '0 14px 10px', display: 'flex', justifyContent: 'center' }}>
          <input
            type="text"
            value={value}
            onChange={e => onChange(e.target.value)}
            placeholder="🔍 Tìm kiếm loài (VD: Hổ, Hoa Sen, T-Rex)..."
            style={{
              width: '100%', maxWidth: 480,
              padding: '10px 14px',
              borderRadius: 10,
              border: '1px solid rgba(74,222,128,0.3)',
              background: 'rgba(10,31,10,0.6)',
              color: '#e6f4e6', fontSize: 14, outline: 'none'
            }}
          />
        </div>
      );
    }

    function SpeciesCard({ species, happiness, onClick }) {
      return (
        <button
          onClick={onClick}
          style={{
            background: 'linear-gradient(160deg, rgba(20,83,45,0.5), rgba(10,31,10,0.8))',
            border: happiness > 0 ? '2px solid #4ade80' : '1px solid rgba(74,222,128,0.2)',
            borderRadius: 14, padding: '12px 6px',
            display: 'flex', flexDirection: 'column', alignItems: 'center',
            cursor: 'pointer', color: '#e6f4e6', position: 'relative',
            minHeight: 120
          }}
        >
          {happiness > 0 && (
            <div style={{
              position: 'absolute', top: 4, right: 6,
              fontSize: 10, color: '#bbf7d0',
              background: 'rgba(34,197,94,0.3)', borderRadius: 8,
              padding: '2px 6px'
            }}>💚 {happiness}</div>
          )}
          <div style={{ fontSize: 40, marginBottom: 6 }}>{species.e}</div>
          <div style={{
            fontSize: 12, fontWeight: 600, color: '#ecfccb',
            textAlign: 'center', lineHeight: 1.25, padding: '0 4px'
          }}>{species.n}</div>
        </button>
      );
    }

    function Grid({ species, happinessMap, onSelect, pageSize, onLoadMore, shown }) {
      const visible = species.slice(0, shown);
      return (
        <div>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fill, minmax(130px, 1fr))',
            gap: 10, padding: '4px 14px 16px'
          }}>
            {visible.map(s => (
              <SpeciesCard
                key={s.id}
                species={s}
                happiness={happinessMap[s.id] || 0}
                onClick={() => onSelect(s)}
              />
            ))}
          </div>
          {shown < species.length && (
            <div style={{ textAlign: 'center', padding: '0 0 24px' }}>
              <button
                onClick={onLoadMore}
                style={{
                  padding: '10px 24px', borderRadius: 22,
                  border: '1px solid #4ade80', background: 'rgba(34,197,94,0.2)',
                  color: '#ecfccb', cursor: 'pointer', fontSize: 14, fontWeight: 600
                }}
              >
                Tải thêm ({species.length - shown} loài còn lại)
              </button>
            </div>
          )}
          {species.length === 0 && (
            <div style={{ textAlign: 'center', padding: 40, color: '#86efac', opacity: 0.6 }}>
              Không tìm thấy loài nào 😢
            </div>
          )}
        </div>
      );
    }

    function InfoRow({ label, value }) {
      return (
        <div style={{
          display: 'flex', justifyContent: 'space-between', gap: 12,
          padding: '8px 12px', borderBottom: '1px dashed rgba(74,222,128,0.15)'
        }}>
          <span style={{ color: '#86efac', opacity: 0.85 }}>{label}</span>
          <span style={{ color: '#ecfccb', textAlign: 'right', fontWeight: 600 }}>{value}</span>
        </div>
      );
    }

    function Detail({ species, happiness, onBack, onCare, message }) {
      const [caring, setCaring] = useState(false);
      const desc = getDesc(species);
      const fact = getFact(species);
      const kindLabel = KIND_LABEL[species.kind];

      return (
        <div style={{ maxWidth: 640, margin: '0 auto', padding: '14px 14px 40px' }}>
          <button
            onClick={onBack}
            style={{
              background: 'rgba(34,197,94,0.2)', color: '#ecfccb',
              border: '1px solid rgba(74,222,128,0.3)', padding: '8px 14px',
              borderRadius: 10, cursor: 'pointer', fontSize: 13, marginBottom: 12
            }}
          >← Quay lại danh sách</button>

          <div style={{
            background: 'linear-gradient(160deg, rgba(20,83,45,0.5), rgba(10,31,10,0.9))',
            borderRadius: 18, padding: 20,
            border: '2px solid rgba(74,222,128,0.3)'
          }}>
            <div style={{ textAlign: 'center', marginBottom: 10 }}>
              <div style={{ fontSize: 96, lineHeight: 1 }}>{species.e}</div>
              <h2 style={{ color: '#ecfccb', fontSize: 22, margin: '10px 0 4px' }}>{species.n}</h2>
              <div style={{ color: '#86efac', fontStyle: 'italic', fontSize: 13, opacity: 0.8 }}>
                {species.sci}
              </div>
            </div>

            <div style={{
              background: 'rgba(10,31,10,0.6)', borderRadius: 12,
              marginTop: 14, overflow: 'hidden',
              border: '1px solid rgba(74,222,128,0.15)'
            }}>
              <InfoRow label="Loại" value={kindLabel} />
              <InfoRow label="Phân loại" value={species.typ} />
              <InfoRow label="Môi trường sống" value={species.h} />
              <InfoRow label="Thức ăn" value={species.f} />
              <InfoRow label="Kích thước" value={species.sz} />
              <InfoRow label="Tuổi thọ" value={species.life} />
            </div>

            <div style={{
              marginTop: 14, padding: 14, borderRadius: 12,
              background: 'rgba(10,31,10,0.5)', color: '#d1fae5',
              lineHeight: 1.55, fontSize: 14
            }}>
              {desc}
            </div>

            <div style={{
              marginTop: 12, padding: 14, borderRadius: 12,
              background: 'rgba(250,204,21,0.12)',
              border: '1px solid rgba(250,204,21,0.3)',
              color: '#fef9c3', lineHeight: 1.55, fontSize: 14
            }}>
              <strong>💡 Bạn có biết: </strong>{fact}
            </div>

            {!caring ? (
              <button
                onClick={() => setCaring(true)}
                style={{
                  display: 'block', width: '100%',
                  marginTop: 16, padding: '12px',
                  borderRadius: 12, border: 'none',
                  background: 'linear-gradient(90deg, #16a34a, #4ade80)',
                  color: '#042f1a', fontWeight: 700, fontSize: 15,
                  cursor: 'pointer'
                }}
              >🎮 Chăm sóc {species.n}</button>
            ) : (
              <CarePanel
                species={species}
                happiness={happiness}
                onCare={onCare}
                message={message}
              />
            )}
          </div>
        </div>
      );
    }

    function CarePanel({ species, happiness, onCare, message }) {
      return (
        <div style={{
          marginTop: 16, padding: 14, borderRadius: 14,
          background: 'rgba(34,197,94,0.1)',
          border: '1px solid rgba(74,222,128,0.3)'
        }}>
          <div style={{ marginBottom: 10, color: '#ecfccb', fontWeight: 600, textAlign: 'center' }}>
            Hạnh phúc: {happiness}/100
          </div>
          <div style={{
            height: 14, background: 'rgba(0,0,0,0.3)', borderRadius: 10,
            overflow: 'hidden', marginBottom: 14
          }}>
            <div style={{
              height: '100%',
              width: Math.min(100, happiness) + '%',
              background: 'linear-gradient(90deg, #facc15, #22c55e)',
              transition: 'width 0.3s'
            }}/>
          </div>

          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))',
            gap: 8
          }}>
            {species.care.map((action, i) => (
              <button
                key={i}
                onClick={() => onCare(species, action)}
                disabled={happiness >= 100}
                style={{
                  padding: '10px 8px', borderRadius: 10,
                  border: '1px solid rgba(74,222,128,0.35)',
                  background: happiness >= 100 ? 'rgba(100,100,100,0.2)' : 'rgba(22,101,52,0.6)',
                  color: '#ecfccb', fontSize: 13, cursor: happiness >= 100 ? 'not-allowed' : 'pointer',
                  fontWeight: 600
                }}
              >{action}</button>
            ))}
          </div>

          {message && (
            <div style={{
              marginTop: 12, padding: 10, borderRadius: 10,
              background: 'rgba(74,222,128,0.2)',
              color: '#ecfccb', textAlign: 'center', fontSize: 14
            }}>{message}</div>
          )}

          {happiness >= 100 && (
            <div style={{
              marginTop: 10, padding: 10, borderRadius: 10,
              background: 'rgba(250,204,21,0.2)',
              color: '#fef9c3', textAlign: 'center', fontSize: 13
            }}>⭐ Đã đạt hạnh phúc tối đa! Tuyệt vời!</div>
          )}
        </div>
      );
    }

    function MilestoneToast({ text, onClose }) {
      if (!text) return null;
      return (
        <div style={{
          position: 'fixed', top: 70, left: '50%',
          transform: 'translateX(-50%)',
          background: 'linear-gradient(90deg, #facc15, #4ade80)',
          color: '#052e16', padding: '12px 20px',
          borderRadius: 20, fontWeight: 700, fontSize: 14,
          boxShadow: '0 8px 30px rgba(0,0,0,0.4)',
          zIndex: 999, cursor: 'pointer'
        }} onClick={onClose}>
          {text} <span style={{ marginLeft: 8, opacity: 0.7 }}>(nhấn để đóng)</span>
        </div>
      );
    }

    // ===================== MAIN APP =====================

    function App() {
      const [tab, setTab] = useState('all');
      const [search, setSearch] = useState('');
      const [shown, setShown] = useState(60);
      const [selected, setSelected] = useState(null);
      const [happinessMap, setHappinessMap] = useState({});
      const [viewed, setViewed] = useState(new Set());
      const [careMsg, setCareMsg] = useState('');
      const [milestone, setMilestone] = useState('');
      const [reachedMilestones, setReachedMilestones] = useState(new Set());

      const filtered = useMemo(() => {
        let base = ALL_SPECIES;
        if (tab !== 'all') base = base.filter(s => s.kind === tab);
        if (search.trim()) {
          const q = search.trim().toLowerCase();
          base = base.filter(s => s.n.toLowerCase().includes(q));
        }
        return base;
      }, [tab, search]);

      const caredCount = useMemo(
        () => Object.values(happinessMap).filter(v => v > 0).length,
        [happinessMap]
      );
      const totalHappiness = useMemo(
        () => Object.values(happinessMap).reduce((a, b) => a + b, 0),
        [happinessMap]
      );

      const handleSelect = useCallback((s) => {
        setSelected(s);
        setViewed(prev => {
          if (prev.has(s.id)) return prev;
          const next = new Set(prev);
          next.add(s.id);
          return next;
        });
        setCareMsg('');
      }, []);

      const handleCare = useCallback((s, action) => {
        setHappinessMap(prev => {
          const cur = prev[s.id] || 0;
          const inc = 8 + Math.floor(Math.random() * 8); // +8~15
          const next = Math.min(100, cur + inc);
          const updated = { ...prev, [s.id]: next };

          // milestone check
          const caredNow = Object.values(updated).filter(v => v > 0).length;
          const ms = MILESTONES.find(m => m.n === caredNow);
          if (ms && !reachedMilestones.has(ms.n)) {
            setMilestone(ms.msg);
            setReachedMilestones(prevMs => {
              const n = new Set(prevMs); n.add(ms.n); return n;
            });
          }
          return updated;
        });
        const r = s.reactions[Math.floor(Math.random() * s.reactions.length)];
        setCareMsg(`${s.e} ${s.n} ${r}`);
      }, [reachedMilestones]);

      // reset shown when filter changes
      useMemo(() => { setShown(60); }, [tab, search]);

      if (selected) {
        return (
          <div>
            <MilestoneToast text={milestone} onClose={() => setMilestone('')} />
            <Detail
              species={selected}
              happiness={happinessMap[selected.id] || 0}
              onBack={() => setSelected(null)}
              onCare={handleCare}
              message={careMsg}
            />
          </div>
        );
      }

      return (
        <div>
          <MilestoneToast text={milestone} onClose={() => setMilestone('')} />
          <Header
            viewedCount={viewed.size}
            caredCount={caredCount}
            totalHappiness={totalHappiness}
          />
          <Tabs current={tab} onChange={setTab} />
          <SearchBar value={search} onChange={setSearch} />
          <Grid
            species={filtered}
            happinessMap={happinessMap}
            onSelect={handleSelect}
            shown={shown}
            onLoadMore={() => setShown(s => s + 60)}
          />
          <div style={{
            textAlign: 'center', padding: '20px 14px 30px',
            color: '#86efac', opacity: 0.5, fontSize: 12
          }}>
            Tổng cộng 1000 loài • 500 động vật • 300 thực vật • 200 khủng long
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
