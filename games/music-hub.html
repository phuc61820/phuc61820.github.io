<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Âm Nhạc Hub — Game Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a0a2e; min-height: 100vh; color: white; }
    #root { min-height: 100vh; }
    button { transition: all 0.15s; }
    button:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }
    button:active:not(:disabled) { transform: scale(0.95); }
  </style>
  <script src="../js/theme.js"></script>
</head>
<body>
  <button id="themeToggle" onclick="toggleMode()">☀️</button>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ===== Audio Engine =====
    let audioCtx = null;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playTone(freq, duration = 0.4, type = 'sine', vol = 0.2) {
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(); osc.stop(ctx.currentTime + duration);
    }
    function playNoise(duration = 0.2, vol = 0.3) {
      const ctx = getCtx();
      const bufferSize = ctx.sampleRate * duration;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      noise.connect(gain); gain.connect(ctx.destination);
      noise.start(); noise.stop(ctx.currentTime + duration);
    }

    // ===== Storage =====
    function getProgress() {
      try { return JSON.parse(localStorage.getItem('musicProgress') || '{}'); }
      catch { return {}; }
    }
    function setHigh(game, score) {
      const p = getProgress();
      if (!p[game] || score > p[game]) {
        p[game] = score;
        localStorage.setItem('musicProgress', JSON.stringify(p));
      }
    }

    // ===== Hub =====
    const GAMES = [
      { id: 'piano', name: 'Đàn Piano', icon: '🎹', color: '#fff', desc: 'Chơi phím đàn' },
      { id: 'guitar', name: 'Đàn Guitar', icon: '🎸', color: '#d4a373', desc: 'Gảy dây đàn' },
      { id: 'drums', name: 'Trống', icon: '🥁', color: '#e63946', desc: 'Gõ trống nhịp' },
      { id: 'tap', name: 'Tap Nhịp', icon: '🎵', color: '#f72585', desc: 'Tap nốt rơi' },
      { id: 'synth', name: 'Synth', icon: '🎛️', color: '#7209b7', desc: 'Sequencer điện tử' },
      { id: 'xylophone', name: 'Xylophone', icon: '🎶', color: '#06ffa5', desc: 'Gõ thanh' },
      { id: 'violin', name: 'Violin', icon: '🎻', color: '#b5651d', desc: 'Kéo cung' },
      { id: 'dj', name: 'DJ', icon: '🎧', color: '#3a86ff', desc: 'Scratch turntable' },
      { id: 'choir', name: 'Hợp Xướng', icon: '🎤', color: '#ffbe0b', desc: 'Khớp cao độ' },
      { id: 'beatbox', name: 'Beatbox', icon: '🥁', color: '#ff006e', desc: 'Tap pad nhịp' },
    ];

    function Hub() {
      return (
        <div style={{ padding: 24, maxWidth: 1100, margin: '0 auto' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
            <a href="../index.html" style={{ background: 'rgba(255,255,255,0.1)', color: 'white', padding: '8px 14px', borderRadius: 8, textDecoration: 'none' }}>← Về Hub</a>
            <h1 style={{ fontSize: 28 }}>🎵 Âm Nhạc Hub</h1>
            <div style={{ width: 80 }}></div>
          </div>
          <p style={{ textAlign: 'center', opacity: 0.8, marginBottom: 24 }}>10 nhạc cụ và game nhịp điệu</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 16 }}>
            {GAMES.map(g => {
              const high = getProgress()[g.id] || 0;
              return (
                <a key={g.id} href={`#${g.id}`} style={{ background: 'rgba(255,255,255,0.08)', borderRadius: 14, padding: 18, textAlign: 'center', textDecoration: 'none', color: 'white', border: `2px solid ${g.color}40` }}>
                  <div style={{ fontSize: 48 }}>{g.icon}</div>
                  <div style={{ fontWeight: 700, marginTop: 6 }}>{g.name}</div>
                  <div style={{ fontSize: 12, opacity: 0.7, marginTop: 4 }}>{g.desc}</div>
                  {high > 0 && <div style={{ fontSize: 11, marginTop: 6, color: g.color }}>★ {high}</div>}
                </a>
              );
            })}
          </div>
        </div>
      );
    }

    function GameShell({ title, children }) {
      return (
        <div style={{ padding: 16, maxWidth: 900, margin: '0 auto' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
            <a href="#" style={{ background: 'rgba(255,255,255,0.1)', color: 'white', padding: '6px 12px', borderRadius: 8, textDecoration: 'none' }}>← Hub</a>
            <h2 style={{ fontSize: 20 }}>{title}</h2>
            <div style={{ width: 60 }}></div>
          </div>
          {children}
        </div>
      );
    }

    // ===== 1. Piano =====
    function Piano() {
      const keys = [
        { n: 'C', f: 261.63, k: 'A' }, { n: 'D', f: 293.66, k: 'S' },
        { n: 'E', f: 329.63, k: 'D' }, { n: 'F', f: 349.23, k: 'F' },
        { n: 'G', f: 392.00, k: 'G' }, { n: 'A', f: 440.00, k: 'H' },
        { n: 'B', f: 493.88, k: 'J' }, { n: 'C2', f: 523.25, k: 'K' },
      ];
      const [count, setCount] = useState(0);
      const hit = (f) => { playTone(f, 0.6, 'triangle'); setCount(c => { const n = c + 1; setHigh('piano', n); return n; }); };
      return (
        <GameShell title="🎹 Đàn Piano">
          <div style={{ textAlign: 'center', marginBottom: 12 }}>Phím đã đánh: <b>{count}</b></div>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 4 }}>
            {keys.map(k => (
              <button key={k.n} onClick={() => hit(k.f)} style={{ width: 60, height: 200, background: 'white', color: 'black', border: '2px solid #333', borderRadius: '0 0 8px 8px', fontSize: 16, fontWeight: 700, cursor: 'pointer' }}>
                <div>{k.n}</div>
                <div style={{ fontSize: 11, opacity: 0.6, marginTop: 140 }}>{k.k}</div>
              </button>
            ))}
          </div>
          <p style={{ textAlign: 'center', marginTop: 16, opacity: 0.7, fontSize: 13 }}>Nhấn phím để chơi nốt</p>
        </GameShell>
      );
    }

    // ===== 2. Guitar =====
    function Guitar() {
      const strings = [
        { n: 'E (thấp)', f: 82.41, c: '#8b4513' },
        { n: 'A', f: 110.00, c: '#a0522d' },
        { n: 'D', f: 146.83, c: '#cd853f' },
        { n: 'G', f: 196.00, c: '#daa520' },
        { n: 'B', f: 246.94, c: '#ffd700' },
        { n: 'E (cao)', f: 329.63, c: '#fff8dc' },
      ];
      const [strums, setStrums] = useState(0);
      const strum = (f) => { playTone(f, 1.2, 'sawtooth', 0.15); setStrums(s => { const n = s + 1; setHigh('guitar', n); return n; }); };
      const strumAll = () => {
        strings.forEach((s, i) => setTimeout(() => playTone(s.f, 1.2, 'sawtooth', 0.15), i * 40));
        setStrums(s => { const n = s + 1; setHigh('guitar', n); return n; });
      };
      return (
        <GameShell title="🎸 Đàn Guitar">
          <div style={{ textAlign: 'center', marginBottom: 12 }}>Số lần gảy: <b>{strums}</b></div>
          <div style={{ background: '#3e2723', padding: 20, borderRadius: 16 }}>
            {strings.map(s => (
              <div key={s.n} onClick={() => strum(s.f)} style={{ display: 'flex', alignItems: 'center', height: 38, cursor: 'pointer', borderBottom: '1px solid #2c1810' }}>
                <div style={{ width: 70, fontSize: 12 }}>{s.n}</div>
                <div style={{ flex: 1, height: 3, background: s.c, borderRadius: 2 }}></div>
              </div>
            ))}
          </div>
          <button onClick={strumAll} style={{ width: '100%', padding: 14, marginTop: 14, background: '#d4a373', color: 'black', border: 'none', borderRadius: 10, fontWeight: 700, fontSize: 16 }}>🎸 Gảy Tất Cả</button>
        </GameShell>
      );
    }

    // ===== 3. Drums =====
    function Drums() {
      const drums = [
        { n: 'Kick', f: 60, c: '#e63946', d: 0.3, type: 'sine' },
        { n: 'Snare', f: 200, c: '#f1faee', d: 0.15, type: 'noise' },
        { n: 'Hi-Hat', f: 800, c: '#a8dadc', d: 0.08, type: 'noise' },
        { n: 'Tom', f: 120, c: '#457b9d', d: 0.25, type: 'sine' },
        { n: 'Cymbal', f: 1200, c: '#f4a261', d: 0.4, type: 'noise' },
        { n: 'Clap', f: 1500, c: '#e76f51', d: 0.1, type: 'noise' },
      ];
      const [hits, setHits] = useState(0);
      const hit = (d) => {
        if (d.type === 'noise') playNoise(d.d, 0.25);
        else playTone(d.f, d.d, 'sine', 0.4);
        setHits(h => { const n = h + 1; setHigh('drums', n); return n; });
      };
      return (
        <GameShell title="🥁 Trống">
          <div style={{ textAlign: 'center', marginBottom: 12 }}>Đập: <b>{hits}</b></div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
            {drums.map(d => (
              <button key={d.n} onClick={() => hit(d)} style={{ height: 120, background: d.c, color: '#222', border: 'none', borderRadius: '50%', fontSize: 18, fontWeight: 700, cursor: 'pointer' }}>
                🥁<br />{d.n}
              </button>
            ))}
          </div>
        </GameShell>
      );
    }

    // ===== 4. Tap (falling beats) =====
    function Tap() {
      const [notes, setNotes] = useState([]);
      const [score, setScore] = useState(0);
      const [running, setRunning] = useState(false);
      const lanes = ['#f72585', '#7209b7', '#3a86ff', '#06ffa5'];
      const freqs = [261.63, 329.63, 392.00, 523.25];
      const idRef = useRef(0);

      useEffect(() => {
        if (!running) return;
        const spawn = setInterval(() => {
          setNotes(ns => [...ns, { id: ++idRef.current, lane: Math.floor(Math.random() * 4), y: 0 }]);
        }, 800);
        const move = setInterval(() => {
          setNotes(ns => ns.map(n => ({ ...n, y: n.y + 4 })).filter(n => n.y < 400));
        }, 30);
        return () => { clearInterval(spawn); clearInterval(move); };
      }, [running]);

      const tapLane = (lane) => {
        playTone(freqs[lane], 0.3, 'square');
        const hit = notes.find(n => n.lane === lane && n.y > 320 && n.y < 380);
        if (hit) {
          setNotes(ns => ns.filter(n => n.id !== hit.id));
          setScore(s => { const n = s + 10; setHigh('tap', n); return n; });
        }
      };

      return (
        <GameShell title="🎵 Tap Nhịp">
          <div style={{ textAlign: 'center', marginBottom: 12 }}>Điểm: <b>{score}</b> {!running && <button onClick={() => { setRunning(true); setScore(0); setNotes([]); }} style={{ marginLeft: 12, padding: '6px 16px', background: '#f72585', color: 'white', border: 'none', borderRadius: 8 }}>Bắt đầu</button>}</div>
          <div style={{ position: 'relative', height: 400, background: '#0a0a1f', borderRadius: 12, display: 'flex', overflow: 'hidden' }}>
            {[0, 1, 2, 3].map(i => (
              <div key={i} style={{ flex: 1, borderLeft: '1px solid rgba(255,255,255,0.1)', position: 'relative' }}>
                {notes.filter(n => n.lane === i).map(n => (
                  <div key={n.id} style={{ position: 'absolute', top: n.y, left: '20%', width: '60%', height: 30, background: lanes[i], borderRadius: 6 }}></div>
                ))}
                <div style={{ position: 'absolute', bottom: 20, left: 0, right: 0, height: 60, border: `2px solid ${lanes[i]}`, borderRadius: 6 }}></div>
              </div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginTop: 12 }}>
            {lanes.map((c, i) => (
              <button key={i} onClick={() => tapLane(i)} style={{ padding: 18, background: c, color: 'white', border: 'none', borderRadius: 10, fontWeight: 700 }}>TAP</button>
            ))}
          </div>
        </GameShell>
      );
    }

    // ===== 5. Synth Sequencer =====
    function Synth() {
      const [grid, setGrid] = useState(Array(4).fill(null).map(() => Array(8).fill(false)));
      const [step, setStep] = useState(-1);
      const [playing, setPlaying] = useState(false);
      const tones = [261.63, 329.63, 392.00, 523.25];
      const colors = ['#f72585', '#7209b7', '#3a86ff', '#06ffa5'];

      useEffect(() => {
        if (!playing) return;
        const t = setInterval(() => {
          setStep(s => {
            const next = (s + 1) % 8;
            grid.forEach((row, i) => { if (row[next]) playTone(tones[i], 0.25, 'square'); });
            return next;
          });
        }, 250);
        return () => clearInterval(t);
      }, [playing, grid]);

      const toggle = (r, c) => {
        const ng = grid.map(row => [...row]);
        ng[r][c] = !ng[r][c];
        setGrid(ng);
        const total = ng.flat().filter(Boolean).length;
        setHigh('synth', total);
      };

      return (
        <GameShell title="🎛️ Synth Sequencer">
          <div style={{ textAlign: 'center', marginBottom: 12 }}>
            <button onClick={() => { setPlaying(p => !p); if (playing) setStep(-1); }} style={{ padding: '8px 20px', background: playing ? '#e63946' : '#06ffa5', color: 'black', border: 'none', borderRadius: 8, fontWeight: 700 }}>{playing ? '⏹ Dừng' : '▶ Phát'}</button>
          </div>
          <div style={{ display: 'grid', gap: 6 }}>
            {grid.map((row, r) => (
              <div key={r} style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: 6 }}>
                {row.map((on, c) => (
                  <button key={c} onClick={() => toggle(r, c)} style={{ height: 50, background: on ? colors[r] : 'rgba(255,255,255,0.1)', border: step === c ? '2px solid yellow' : 'none', borderRadius: 6, cursor: 'pointer' }}></button>
                ))}
              </div>
            ))}
          </div>
        </GameShell>
      );
    }

    // ===== 6. Xylophone =====
    function Xylophone() {
      const bars = [
        { n: 'C', f: 523.25, c: '#e63946' },
        { n: 'D', f: 587.33, c: '#f4a261' },
        { n: 'E', f: 659.25, c: '#ffd60a' },
        { n: 'F', f: 698.46, c: '#06ffa5' },
        { n: 'G', f: 783.99, c: '#3a86ff' },
        { n: 'A', f: 880.00, c: '#7209b7' },
        { n: 'B', f: 987.77, c: '#f72585' },
        { n: 'C2', f: 1046.50, c: '#ff006e' },
      ];
      const [hits, setHits] = useState(0);
      const hit = (f) => { playTone(f, 0.8, 'triangle', 0.25); setHits(h => { const n = h + 1; setHigh('xylophone', n); return n; }); };
      return (
        <GameShell title="🎶 Xylophone">
          <div style={{ textAlign: 'center', marginBottom: 12 }}>Đập thanh: <b>{hits}</b></div>
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'flex-end', gap: 6, padding: 20, background: '#3e2723', borderRadius: 12 }}>
            {bars.map((b, i) => (
              <button key={b.n} onClick={() => hit(b.f)} style={{ width: 50, height: 200 - i * 12, background: b.c, border: 'none', borderRadius: 6, cursor: 'pointer', color: 'white', fontWeight: 700, boxShadow: '0 4px 0 rgba(0,0,0,0.3)' }}>{b.n}</button>
            ))}
          </div>
        </GameShell>
      );
    }

    // ===== 7. Violin =====
    function Violin() {
      const [bowing, setBowing] = useState(false);
      const [bowCount, setBowCount] = useState(0);
      const [pitch, setPitch] = useState(440);
      const oscRef = useRef(null);
      const gainRef = useRef(null);

      const startBow = () => {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = pitch;
        gain.gain.value = 0;
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start();
        oscRef.current = osc;
        gainRef.current = gain;
        gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.1);
        setBowing(true);
      };
      const stopBow = () => {
        if (oscRef.current) {
          const ctx = getCtx();
          gainRef.current.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
          setTimeout(() => oscRef.current && oscRef.current.stop(), 250);
          oscRef.current = null;
          setBowCount(c => { const n = c + 1; setHigh('violin', n); return n; });
        }
        setBowing(false);
      };
      const onMove = (e) => {
        if (!bowing) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const x = (e.clientX || e.touches?.[0]?.clientX || 0) - rect.left;
        const f = 200 + (x / rect.width) * 600;
        setPitch(f);
        if (oscRef.current) oscRef.current.frequency.value = f;
      };

      return (
        <GameShell title="🎻 Violin">
          <div style={{ textAlign: 'center', marginBottom: 12 }}>Lượt kéo: <b>{bowCount}</b> · Pitch: {pitch.toFixed(0)}Hz</div>
          <div onMouseDown={startBow} onMouseUp={stopBow} onMouseLeave={stopBow} onMouseMove={onMove} onTouchStart={startBow} onTouchEnd={stopBow} onTouchMove={onMove} style={{ height: 200, background: 'linear-gradient(90deg, #8b4513, #b5651d, #8b4513)', borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'ew-resize', userSelect: 'none', fontSize: 18, fontWeight: 700 }}>
            {bowing ? '🎻 Đang kéo cung — di chuột để đổi cao độ' : '🎻 Nhấn giữ và kéo cung'}
          </div>
        </GameShell>
      );
    }

    // ===== 8. DJ =====
    function DJ() {
      const [angle, setAngle] = useState(0);
      const [scratches, setScratches] = useState(0);
      const lastRef = useRef({ x: 0, y: 0, t: 0 });
      const dragging = useRef(false);

      const onDown = (e) => {
        dragging.current = true;
        const r = e.currentTarget.getBoundingClientRect();
        const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
        const x = (e.clientX || e.touches?.[0]?.clientX) - cx;
        const y = (e.clientY || e.touches?.[0]?.clientY) - cy;
        lastRef.current = { x, y, t: Date.now() };
      };
      const onMove = (e) => {
        if (!dragging.current) return;
        const r = e.currentTarget.getBoundingClientRect();
        const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
        const x = (e.clientX || e.touches?.[0]?.clientX) - cx;
        const y = (e.clientY || e.touches?.[0]?.clientY) - cy;
        const a1 = Math.atan2(lastRef.current.y, lastRef.current.x);
        const a2 = Math.atan2(y, x);
        let d = (a2 - a1) * 180 / Math.PI;
        if (d > 180) d -= 360; if (d < -180) d += 360;
        setAngle(an => an + d);
        const dt = Date.now() - lastRef.current.t;
        if (dt > 30) {
          const speed = Math.abs(d) / dt;
          playTone(150 + speed * 4000, 0.08, 'sawtooth', 0.2);
          setScratches(s => { const n = s + 1; setHigh('dj', n); return n; });
          lastRef.current = { x, y, t: Date.now() };
        }
      };
      const onUp = () => { dragging.current = false; };

      return (
        <GameShell title="🎧 DJ Turntable">
          <div style={{ textAlign: 'center', marginBottom: 12 }}>Scratch: <b>{scratches}</b></div>
          <div onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp} onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp} style={{ width: 280, height: 280, margin: '0 auto', background: 'radial-gradient(circle, #222 0%, #000 70%)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'grab', userSelect: 'none', position: 'relative', border: '8px solid #444' }}>
            <div style={{ width: '90%', height: '90%', borderRadius: '50%', background: 'repeating-radial-gradient(circle, #111, #222 4px)', transform: `rotate(${angle}deg)`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ width: 60, height: 60, borderRadius: '50%', background: '#ff006e', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24 }}>🎵</div>
            </div>
          </div>
          <p style={{ textAlign: 'center', marginTop: 16, opacity: 0.7, fontSize: 13 }}>Kéo xoay đĩa để scratch</p>
        </GameShell>
      );
    }

    // ===== 9. Choir (pitch match) =====
    function Choir() {
      const [target, setTarget] = useState(440);
      const [user, setUser] = useState(440);
      const [score, setScore] = useState(0);
      const oscRef = useRef(null);

      const newTarget = () => {
        const t = 200 + Math.random() * 600;
        setTarget(t);
        playTone(t, 1.0, 'sine', 0.2);
      };
      useEffect(() => { newTarget(); }, []);

      const sing = () => {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = user;
        gain.gain.value = 0.15;
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start();
        setTimeout(() => {
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
          setTimeout(() => osc.stop(), 350);
        }, 700);
        const diff = Math.abs(user - target);
        const points = Math.max(0, 100 - Math.floor(diff));
        setScore(s => { const n = s + points; setHigh('choir', n); return n; });
        setTimeout(newTarget, 1200);
      };

      const pct = ((target - 200) / 600) * 100;
      const upct = ((user - 200) / 600) * 100;

      return (
        <GameShell title="🎤 Hợp Xướng">
          <div style={{ textAlign: 'center', marginBottom: 12 }}>Điểm: <b>{score}</b></div>
          <div style={{ background: 'rgba(255,255,255,0.1)', padding: 16, borderRadius: 12 }}>
            <div style={{ marginBottom: 10 }}>🎯 Mục tiêu: {target.toFixed(0)} Hz</div>
            <div style={{ position: 'relative', height: 50, background: 'linear-gradient(90deg, #3a86ff, #06ffa5, #ffd60a, #f72585)', borderRadius: 8, marginBottom: 12 }}>
              <div style={{ position: 'absolute', top: -8, left: `${pct}%`, fontSize: 20 }}>🎯</div>
              <div style={{ position: 'absolute', bottom: -8, left: `${upct}%`, fontSize: 20 }}>🎤</div>
            </div>
            <div style={{ marginBottom: 8 }}>Bạn: {user.toFixed(0)} Hz</div>
            <input type="range" min="200" max="800" value={user} onChange={e => setUser(+e.target.value)} style={{ width: '100%' }} />
          </div>
          <button onClick={sing} style={{ width: '100%', padding: 14, marginTop: 14, background: '#ffbe0b', color: 'black', border: 'none', borderRadius: 10, fontWeight: 700 }}>🎤 Hát!</button>
          <button onClick={() => playTone(target, 1.0, 'sine', 0.2)} style={{ width: '100%', padding: 10, marginTop: 8, background: 'rgba(255,255,255,0.1)', color: 'white', border: 'none', borderRadius: 10 }}>🔊 Nghe lại mẫu</button>
        </GameShell>
      );
    }

    // ===== 10. Beatbox =====
    function Beatbox() {
      const pads = [
        { n: 'BOOM', f: 80, c: '#e63946', type: 'sine', d: 0.3 },
        { n: 'TS', f: 5000, c: '#a8dadc', type: 'noise', d: 0.05 },
        { n: 'KA', f: 250, c: '#f1faee', type: 'noise', d: 0.12 },
        { n: 'PSH', f: 2000, c: '#457b9d', type: 'noise', d: 0.2 },
        { n: 'BAP', f: 150, c: '#f72585', type: 'sine', d: 0.15 },
        { n: 'SS', f: 8000, c: '#7209b7', type: 'noise', d: 0.1 },
        { n: 'TUM', f: 100, c: '#3a86ff', type: 'sine', d: 0.4 },
        { n: 'CHK', f: 3000, c: '#06ffa5', type: 'noise', d: 0.06 },
        { n: 'POP', f: 400, c: '#ffd60a', type: 'square', d: 0.08 },
      ];
      const [hits, setHits] = useState(0);
      const hit = (p) => {
        if (p.type === 'noise') playNoise(p.d, 0.25);
        else playTone(p.f, p.d, p.type, 0.3);
        setHits(h => { const n = h + 1; setHigh('beatbox', n); return n; });
      };
      return (
        <GameShell title="🥁 Beatbox">
          <div style={{ textAlign: 'center', marginBottom: 12 }}>Tap: <b>{hits}</b></div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
            {pads.map(p => (
              <button key={p.n} onClick={() => hit(p)} style={{ height: 100, background: p.c, color: '#222', border: 'none', borderRadius: 12, fontSize: 22, fontWeight: 800, cursor: 'pointer' }}>{p.n}</button>
            ))}
          </div>
        </GameShell>
      );
    }

    // ===== App Router =====
    function App() {
      const [hash, setHash] = useState(window.location.hash.slice(1));
      useEffect(() => {
        const onHash = () => setHash(window.location.hash.slice(1));
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      const map = {
        piano: Piano, guitar: Guitar, drums: Drums, tap: Tap,
        synth: Synth, xylophone: Xylophone, violin: Violin,
        dj: DJ, choir: Choir, beatbox: Beatbox,
      };
      const G = map[hash];
      return G ? <G /> : <Hub />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
