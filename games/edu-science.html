        { q: 'Nguồn điện trong nhà từ đâu?', a: 'Nhà máy điện', opts: ['Nhà máy điện', 'Mặt trăng', 'Gió tự nhiên trong nhà', 'Tự sinh'] },
      ],
      ecosystem: [
        { q: 'Sinh vật tạo ra thức ăn từ quang hợp là?', a: 'Cây xanh', opts: ['Cây xanh', 'Hổ', 'Chim', 'Cá'] },
        { q: 'Chuỗi thức ăn bắt đầu từ?', a: 'Thực vật', opts: ['Thực vật', 'Động vật ăn thịt', 'Vi khuẩn', 'Nấm'] },
        { q: 'Động vật ăn cỏ là?', a: 'Bò', opts: ['Bò', 'Hổ', 'Sư tử', 'Đại bàng'] },
        { q: 'Động vật ăn thịt là?', a: 'Hổ', opts: ['Hổ', 'Thỏ', 'Bò', 'Dê'] },
        { q: 'Vai trò của phân hủy?', a: 'Trả chất dinh dưỡng về đất', opts: ['Trả chất dinh dưỡng về đất', 'Tạo ra ánh sáng', 'Làm hại cây', 'Sinh ra nước'] },
        { q: 'Sinh vật phân hủy gồm?', a: 'Nấm, vi khuẩn', opts: ['Nấm, vi khuẩn', 'Hổ, báo', 'Cá, tôm', 'Chim, bướm'] },
        { q: 'Ví dụ chuỗi thức ăn đúng?', a: 'Cỏ → Thỏ → Cáo', opts: ['Cỏ → Thỏ → Cáo', 'Cáo → Thỏ → Cỏ', 'Thỏ → Cỏ → Cáo', 'Cáo → Cỏ → Thỏ'] },
        { q: 'Hệ sinh thái rừng có?', a: 'Cây, động vật, đất, nước', opts: ['Cây, động vật, đất, nước', 'Chỉ có cây', 'Chỉ có động vật', 'Chỉ có đá'] },
        { q: 'Rừng có vai trò?', a: 'Cho oxy, giữ nước, chắn gió', opts: ['Cho oxy, giữ nước, chắn gió', 'Gây ô nhiễm', 'Tạo bão', 'Hủy sinh thái'] },
        { q: 'Sinh vật nào là sinh vật tiêu thụ bậc 1?', a: 'Động vật ăn thực vật', opts: ['Động vật ăn thực vật', 'Cây xanh', 'Động vật ăn thịt', 'Vi khuẩn'] },
        { q: 'Môi trường sống của cá là?', a: 'Nước', opts: ['Nước', 'Sa mạc', 'Trên cạn', 'Trong lửa'] },
        { q: 'Ô nhiễm môi trường gây ra bởi?', a: 'Rác thải và khí thải', opts: ['Rác thải và khí thải', 'Cây xanh', 'Mưa', 'Nắng'] },
      ],
      human: [
        { q: 'Mắt giúp ta?', a: 'Nhìn', opts: ['Nhìn', 'Nghe', 'Ngửi', 'Nếm'] },
        { q: 'Tai giúp ta?', a: 'Nghe', opts: ['Nghe', 'Nhìn', 'Ngửi', 'Sờ'] },
        { q: 'Mũi giúp ta?', a: 'Ngửi', opts: ['Ngửi', 'Nghe', 'Nhìn', 'Nếm'] },
        { q: 'Lưỡi giúp ta?', a: 'Nếm vị', opts: ['Nếm vị', 'Nhìn', 'Nghe', 'Ngửi'] },
        { q: 'Da giúp ta?', a: 'Xúc giác (cảm nhận)', opts: ['Xúc giác (cảm nhận)', 'Nhìn', 'Nghe', 'Nếm'] },
        { q: 'Có bao nhiêu giác quan chính?', a: '5', opts: ['5', '3', '7', '10'] },
        { q: 'Vị nào sau đây là vị cơ bản?', a: 'Ngọt', opts: ['Ngọt', 'Xanh', 'Tròn', 'Nặng'] },
        { q: 'Khi bị cận thị, ta cần?', a: 'Đeo kính', opts: ['Đeo kính', 'Bịt mắt', 'Đi chân', 'Đeo tai nghe'] },
        { q: 'Khi bị điếc, ta khó?', a: 'Nghe âm thanh', opts: ['Nghe âm thanh', 'Nhìn', 'Ngửi', 'Nếm'] },
        { q: 'Mùi thơm được cảm nhận bởi?', a: 'Mũi', opts: ['Mũi', 'Mắt', 'Tai', 'Lưỡi'] },
        { q: 'Giác quan nào giúp phân biệt nóng, lạnh?', a: 'Xúc giác (da)', opts: ['Xúc giác (da)', 'Thị giác', 'Thính giác', 'Khứu giác'] },
        { q: 'Để bảo vệ mắt, ta nên?', a: 'Không nhìn trực tiếp vào mặt trời', opts: ['Không nhìn trực tiếp vào mặt trời', 'Nhìn lâu vào đèn sáng', 'Đọc trong bóng tối', 'Dụi mắt bẩn'] },
      ],
    };

    function parseHash() {
      const h = window.location.hash.replace('#', '');
      return h && GAMES.find(g => g.id === h) ? h : '';
    }

    function App() {
      const [route, setRoute] = useState(parseHash());
      useEffect(() => {
        const onHash = () => setRoute(parseHash());
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      if (!route) return <Hub />;
      return <Quiz gameId={route} />;
    }

    function Hub() {
      const progress = loadProgress();
      return (
        <div style={{ padding: '20px', maxWidth: '1000px', margin: '0 auto' }}>
          <a href="../index.html" style={{ color: '#a7f3d0', textDecoration: 'none', fontSize: '16px' }}>← Trang chủ</a>
          <h1 style={{ fontSize: 'clamp(28px,5vw,42px)', textAlign: 'center', marginTop: '10px', marginBottom: '8px' }}>🔬 Khoa Học</h1>
          <p style={{ textAlign: 'center', color: '#a7f3d0', marginBottom: '30px', fontSize: '16px' }}>10 trò chơi học khoa học vui cho bé</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: '14px' }}>
            {GAMES.map(g => (
              <a key={g.id} href={`#${g.id}`} style={{ textDecoration: 'none' }}>
                <div style={{ background: g.color, borderRadius: '16px', padding: '18px', cursor: 'pointer', color: 'white', boxShadow: '0 4px 12px rgba(0,0,0,0.3)', minHeight: '160px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
                  <div>
                    <div style={{ fontSize: '42px', marginBottom: '6px' }}>{g.icon}</div>
                    <div style={{ fontSize: '18px', fontWeight: 'bold' }}>{g.name}</div>
                    <div style={{ fontSize: '13px', opacity: 0.9, marginTop: '4px' }}>{g.desc}</div>
                  </div>
                  {progress[g.id] != null && (
                    <div style={{ fontSize: '13px', marginTop: '8px', background: 'rgba(0,0,0,0.25)', padding: '4px 8px', borderRadius: '8px', display: 'inline-block', alignSelf: 'flex-start' }}>🏆 {progress[g.id]}</div>
                  )}
                </div>
              </a>
            ))}
          </div>
        </div>
      );
    }

    function buildRound(gameId) {
      const bank = QUESTIONS[gameId] || [];
      const count = Math.min(bank.length, 12);
      return shuffle(bank).slice(0, count).map(item => ({
        q: item.q,
        a: item.a,
        opts: shuffle(item.opts),
      }));
    }

    function Quiz({ gameId }) {
      const game = GAMES.find(g => g.id === gameId);
      const [questions, setQuestions] = useState(() => buildRound(gameId));
      const [idx, setIdx] = useState(0);
      const [score, setScore] = useState(0);
      const [sel, setSel] = useState(null);
      const [done, setDone] = useState(false);
      const [newHigh, setNewHigh] = useState(false);

      const current = questions[idx];
      const progress = loadProgress();
      const high = progress[gameId] || 0;

      const choose = (opt) => {
        if (sel !== null) return;
        setSel(opt);
        const correct = opt === current.a;
        const next = score + (correct ? 1 : 0);
        if (correct) setScore(next);
        setTimeout(() => {
          if (idx + 1 >= questions.length) {
            setDone(true);
            const isNew = saveHigh(gameId, next);
            setNewHigh(isNew);
          } else {
            setIdx(idx + 1);
            setSel(null);
          }
        }, 900);
      };

      const restart = () => {
        setQuestions(buildRound(gameId));
        setIdx(0); setScore(0); setSel(null); setDone(false); setNewHigh(false);
      };

      if (done) {
        const total = questions.length;
        const pct = Math.round(score / total * 100);
        return (
          <div style={{ padding: '20px', maxWidth: '520px', margin: '0 auto', textAlign: 'center' }}>
            <a href="#" onClick={() => { window.location.hash=''; }} style={{ color: '#a7f3d0', textDecoration: 'none', float: 'left' }}>← Hub</a>
            <div style={{ clear: 'both', height: '20px' }} />
            <div style={{ fontSize: '80px' }}>{game.icon}</div>
            <h2 style={{ fontSize: '28px', marginBottom: '10px' }}>{game.name}</h2>
            <div style={{ background: game.color, borderRadius: '20px', padding: '30px', marginTop: '20px', boxShadow: '0 6px 20px rgba(0,0,0,0.3)' }}>
              <div style={{ fontSize: '20px', marginBottom: '10px' }}>Kết quả</div>
              <div style={{ fontSize: '52px', fontWeight: 'bold' }}>{score}/{total}</div>
              <div style={{ fontSize: '18px', marginTop: '6px' }}>{pct}% chính xác</div>
              {newHigh && <div style={{ marginTop: '12px', fontSize: '18px', fontWeight: 'bold' }}>🎉 Kỷ lục mới!</div>}
              <div style={{ marginTop: '10px', fontSize: '14px', opacity: 0.9 }}>Kỷ lục cao: {Math.max(high, score)}</div>
            </div>
            <button onClick={restart} style={{ marginTop: '20px', background: 'white', color: game.color, border: 'none', padding: '14px 30px', borderRadius: '12px', fontSize: '18px', fontWeight: 'bold', cursor: 'pointer' }}>🔄 Chơi lại</button>
            <br />
            <button onClick={() => { window.location.hash=''; }} style={{ marginTop: '12px', background: 'rgba(255,255,255,0.2)', color: 'white', border: '2px solid white', padding: '10px 24px', borderRadius: '12px', fontSize: '16px', cursor: 'pointer' }}>🏠 Về Hub</button>
          </div>
        );
      }

      if (!current) {
        return <div style={{ padding: '30px', textAlign: 'center' }}>Đang tải...</div>;
      }

      return (
        <div style={{ padding: '20px', maxWidth: '600px', margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
            <a href="#" onClick={() => { window.location.hash=''; }} style={{ color: '#a7f3d0', textDecoration: 'none' }}>← Hub</a>
            <div style={{ fontSize: '14px', color: '#a7f3d0' }}>🏆 Kỷ lục: {high}</div>
          </div>
          <div style={{ textAlign: 'center', marginBottom: '14px' }}>
            <div style={{ fontSize: '48px' }}>{game.icon}</div>
            <h2 style={{ fontSize: '22px', marginTop: '4px' }}>{game.name}</h2>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '14px', marginBottom: '10px', color: '#d1fae5' }}>
            <div>Câu {idx + 1}/{questions.length}</div>
            <div>Điểm: {score}</div>
          </div>
          <div style={{ background: 'rgba(255,255,255,0.1)', height: '8px', borderRadius: '4px', overflow: 'hidden', marginBottom: '20px' }}>
            <div style={{ background: game.color, height: '100%', width: `${(idx / questions.length) * 100}%`, transition: 'width 0.3s' }} />
          </div>
          <div style={{ background: 'rgba(255,255,255,0.1)', borderRadius: '16px', padding: '24px', marginBottom: '20px', minHeight: '110px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ fontSize: '20px', textAlign: 'center', lineHeight: 1.4 }}>{current.q}</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '10px' }}>
            {current.opts.map((opt, i) => {
              let bg = 'rgba(255,255,255,0.15)';
              let border = '2px solid rgba(255,255,255,0.3)';
              if (sel !== null) {
                if (opt === current.a) { bg = '#10b981'; border = '2px solid #10b981'; }
                else if (opt === sel) { bg = '#ef4444'; border = '2px solid #ef4444'; }
              }
              return (
                <button key={i} onClick={() => choose(opt)} disabled={sel !== null} style={{ background: bg, color: 'white', border: border, padding: '14px 16px', borderRadius: '12px', fontSize: '16px', cursor: sel === null ? 'pointer' : 'default', textAlign: 'left' }}>
                  {String.fromCharCode(65 + i)}. {opt}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
