function generateFishForMap(mapData) {
  const s = mapData.size;
  const map = Array.from({ length: s }, () => Array(s).fill(false));
  let placed = 0;
  while (placed < mapData.fishCount) {
    const x = Math.floor(Math.random() * s);
    const y = Math.floor(Math.random() * s);
    if (!map[y][x]) {
      map[y][x] = true;
      placed++;
    }
  }
  return map;
}

  const pickMonster = () => {
    const pool = currentMap.cosmic ? COSMIC_MONSTERS : MONSTERS;
    const totalW = pool.reduce((s, m) => s + m.weight, 0);
    let roll = Math.random() * totalW;
    for (const m of pool) {
      roll -= m.weight;
      if (roll <= 0) return m;
    }
    return pool[0];
  };

  const handleRelease = () => {
    if (!caughtFish) return;
    const chance = Math.random();

    if (chance < treasureChance) {
      const tPool = currentMap.cosmic ? COSMIC_TREASURES : TREASURES;
      const treasure = tPool[Math.floor(Math.random() * tPool.length)];
      let amount = treasure.min !== undefined && treasure.max > 0
        ? Math.floor(Math.random() * (treasure.max - treasure.min + 1)) + treasure.min
        : 0;
      if (hasCrew("pirate") && (treasure.type === "nc" || treasure.type === "both")) {
        amount = Math.floor(amount * (1 + crewMult(0.5)));
      }
      setTreasureResult({ treasure, amount, fishName: caughtFish.name, fishWeight: caughtFish.weight });
      setGameState("treasure");
    } else {
      // 30% → cá gặp thuỷ quái và chiến đấu!

      const fish = caughtFish;
      const { power: fishPower, crit: fishCrit } = calcFishPower(fish.weight);

        setMonsterEncounter({ ...monster, fishName: fish.name, fishWeight: fish.weight });
        setBattleResult({ won: true, lootNc, lootSm, fishPower, monsterPower, fishCrit, collected: false });

      power: monsterEncounter.power,
      color: monsterEncounter.color,

    else if (totalStars >= 15) rank = 4;

    const variety = new Set(aquarium.map((a) => a.name)).size;
    let visitors = aquarium.length + Math.floor(totalStars / 3) + (hasMonster ? 3 : 0) + Math.floor(variety / 2);

        setTimeout(() => healerTick(), 250);

      if (turnsInDay >= TURNS_PER_DAY - 3) {
        setTimeOfDay("sunset");
      } else {
        setTimeOfDay("day");
      }
      if (turnsInDay === 0 && next > 0) {
        // Calculate which day is ending based on turns
        const endingDay = Math.floor(next / TURNS_PER_DAY);
        setTimeout(() => {
          setTimeOfDay("night");
          setNightStats({ wins: 0, losses: 0, totalNc: 0, totalSm: 0, dmgTaken: 0 });
          if (endingDay > 0 && endingDay % NET_CHALLENGE_INTERVAL === 0) {
            startNetChallenge();
          } else {

  };

  const buyCrew = (crewId) => {
    const def = CREW_MEMBERS.find((c) => c.id === crewId);
    if (!def) return;
    if (ownedCrew.includes(crewId)) {
      addLog(`❌ ${def.icon} ${def.name} đã có trong đội!`);
      return;
    }
    if (ownedCrew.length >= BOAT_CAPACITY[boatLevel - 1]) {
      addLog(`⛵ Thuyền đầy! Nâng cấp thuyền để chứa thêm (${ownedCrew.length}/${BOAT_CAPACITY[boatLevel - 1]}).`);
      return;
    }
    if (nc < def.cost) {
      addLog(`Cần ${def.cost.toLocaleString()} NC để thuê ${def.name}`);
      return;
    }
    setNc((p) => p - def.cost);
    setOwnedCrew((prev) => [...prev, crewId]);
    addLog(`${def.icon} ${def.name} gia nhập đội!`);
  };

  const calcFishPower = (fishWeight) => {
    let power = fishWeight * 2;
    power += fishUpgrades.armor * 20;
    power += fishUpgrades.weapon * 25;
    power += fishWeight * fishUpgrades.training * 0.5;
    const readyBuddies = buddyFish.filter(b => b.ready);
    power += readyBuddies.length * fishWeight * 0.5;
    power += fishUpgrades.army * 15;
    if (fishWeight < 50) power += fishUpgrades.rage * 30;
    if (hasCrew("trainer")) power += crewMult(30);
    if (hasCrew("samurai")) power += crewMult(60);
    if (hasCrew("knight")) power += crewMult(80);
    if (hasCrew("paladin")) power += crewMult(120);
    if (hasCrew("dragonknight")) power += crewMult(200);
    const allPowerCrews = ["shaman", "wizard", "warlock", "archmage", "sorcerer", "prophet", "demigod"];
    for (const c of allPowerCrews) {
      if (hasCrew(c)) {
        const def = CREW_MEMBERS.find(x => x.id === c);
        if (def && def.bonus.type === "allPower") {
          const fishBonus = def.bonus.value * 50;
          power += crewMult(fishBonus);
        }
      }
    }
    const multCrews = ["king", "zeus", "poseidon", "odin", "loki", "ra", "laclong", "cosmologist", "galaxyking", "speedster", "dragonlord", "cthulhu_ally", "oceanspirit", "voidlord", "multiverseking", "timemaster", "dimensionlord", "infinityone", "alpha", "omega_final", "akasha", "brahman_ally", "destroyerfish", "absolutegod", "infinityfisher"];
    for (const c of multCrews) {
      if (hasCrew(c)) {
        const def = CREW_MEMBERS.find(x => x.id === c);
        if (def && def.bonus.type === "multiply") {
          power = Math.floor(power * def.bonus.value);
        }
      }
    }
    const critChance = fishUpgrades.spirit * 0.15;
    const crit = Math.random() < critChance;
    if (crit) power *= 3;
    return { power, crit };
  };

  const calcPlayerNightPower = () => {
    let power = sm + canCap * 30 + npc * 20;
    const nightPowerCrews = ["warrior", "ninja", "archer", "assassin", "berserker", "warlord", "godwarrior", "thor", "shiva", "thanhgiong", "anubis", "titan", "leviathan_ally", "blackhole_ally"];
    for (const c of nightPowerCrews) {
      if (hasCrew(c)) {
        const def = CREW_MEMBERS.find(x => x.id === c);
        if (def && def.bonus.type === "nightPower") {
          power += crewMult(def.bonus.value);
        }
      }
    }
    const allPowerCrews = ["shaman", "wizard", "warlock", "archmage", "sorcerer", "prophet", "demigod", "dragonknight", "auco", "stargod"];
    for (const c of allPowerCrews) {
      if (hasCrew(c)) {
        const def = CREW_MEMBERS.find(x => x.id === c);
        if (def && def.bonus.type === "allPower") {
          const nightBonus = def.bonus.value * 100;
          power += crewMult(nightBonus);
        }
      }
    }
    const multCrews = ["king", "zeus", "poseidon", "odin", "loki", "ra", "laclong", "cosmologist", "galaxyking", "speedster", "dragonlord", "cthulhu_ally", "oceanspirit", "voidlord", "multiverseking", "timemaster", "dimensionlord", "infinityone", "alpha", "omega_final", "akasha", "brahman_ally", "destroyerfish", "absolutegod", "infinityfisher"];
    for (const c of multCrews) {
      if (hasCrew(c)) {
        const def = CREW_MEMBERS.find(x => x.id === c);
        if (def && def.bonus.type === "multiply") {
          power = Math.floor(power * def.bonus.value);
        }
      }
    }
    return power;
  };

  const buyFishUpgrade = (key) => {
    const def = FISH_UPGRADES.find((u) => u.key === key);
    if (!def) return;
    const curLv = fishUpgrades[key];
    if (curLv >= def.max) {
      addLog(`${def.name} đã max!`);
      return;
    }
    const cost = def.baseCost * (curLv + 1);
    if (nc < cost) {
      addLog(`Cần ${cost} NC để nâng ${def.name}`);
      return;
    }
    setNc((p) => p - cost);
    setFishUpgrades((prev) => ({ ...prev, [key]: curLv + 1 }));
    addLog(`${def.icon} ${def.name} lên cấp ${curLv + 1}!`);
  };

  const chooseNightFight = () => {
    setNightWave(1);
    setGameState("nightBattle");
    spawnNightMonster();
  };

  const chooseNightSleep = () => {
    const heal = 20 + Math.floor(sm * 0.1);
    setSm((p) => p + heal);
    addLog(`Nghỉ ngơi... Hồi +${heal} SM`);
    setDay((d) => d + 1);
    setGameState("playing");
    setTimeOfDay("day");
  };

  const spawnNightMonster = () => {
    const pool = currentMap.cosmic ? COSMIC_MONSTERS : MONSTERS;
    const monster = pool[Math.floor(Math.random() * pool.length)];
    const boost = currentMap.monsterBoost + (nightWave - 1) * 15 + (day - 1) * 10;
    setNightMonster({
      ...monster,
      power: monster.power + boost,
      hp: monster.hp + boost * 2,
    });
    setNightResult(null);
  };

  const fightNightMonster = () => {
    if (!nightMonster) return;
    const playerPower = calcPlayerNightPower();
    const monsterPower = nightMonster.power + Math.floor(Math.random() * (nightMonster.power / 3));
    const won = playerPower >= monsterPower;
    if (won) {
      const mapLootMult = Math.max(1, Math.sqrt(currentMap.fishMult));
      const lootNc = Math.floor((Math.floor(Math.random() * (nightMonster.loot_nc[1] - nightMonster.loot_nc[0] + 1)) + nightMonster.loot_nc[0]) * mapLootMult);
      const lootSm = Math.floor((Math.floor(Math.random() * (nightMonster.loot_sm[1] - nightMonster.loot_sm[0] + 1)) + nightMonster.loot_sm[0]) * mapLootMult);
      setNc((p) => p + lootNc);
      setSm((p) => p + lootSm);
      setNightStats((prev) => ({
        ...prev,
        wins: prev.wins + 1,
        totalNc: prev.totalNc + lootNc,
        totalSm: prev.totalSm + lootSm,
      }));
      setNightResult({ won: true, playerPower, monsterPower, lootNc, lootSm });
    } else {
      const dmg = Math.floor(monsterPower / 3);
      const lostNc = Math.floor(nc * 0.05);
      setSm((p) => Math.max(10, p - dmg));
      setNc((p) => Math.max(0, p - lostNc));
      setNightStats((prev) => ({
        ...prev,
        losses: prev.losses + 1,
        dmgTaken: prev.dmgTaken + dmg,
      }));
      setNightResult({ won: false, playerPower, monsterPower, dmg, lostNc });
    }
  };

  const nextNightWave = () => {
    if (nightWave >= 5) {
      setGameState("nightSummary");
      return;
    }
    setNightWave((w) => w + 1);
    spawnNightMonster();
  };

  const closeNightSummary = () => {
    setDay((d) => d + 1);
    setNightWave(0);
    setNightMonster(null);
    setNightResult(null);
    setGameState("playing");
    setTimeOfDay("day");
  };

  const startNetChallenge = () => {
    const size = currentMap.size;
    const fishPositions = [];
    const fishCount = Math.floor(currentMap.fishCount * 1.5);
    while (fishPositions.length < fishCount) {
      const x = Math.floor(Math.random() * size);
      const y = Math.floor(Math.random() * size);
      if (!fishPositions.some(p => p.x === x && p.y === y)) {
        fishPositions.push({ x, y, weight: Math.floor(Math.random() * 50 * currentMap.fishMult) + 10 });
      }
    }
    setNetChallenge({
      fishPositions,
      netThrows: 3,
      caughtFish: [],
      totalKg: 0,
    });
    setGameState("netChallenge");
  };

  const throwNet = (cellX, cellY) => {
    if (!netChallenge || netChallenge.netThrows <= 0) return;
    const caught = [];
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        const tx = cellX + dx;
        const ty = cellY + dy;
        const fish = netChallenge.fishPositions.find(f => f.x === tx && f.y === ty);
        if (fish) caught.push(fish);
      }
    }
    const newFishPositions = netChallenge.fishPositions.filter(f => !caught.includes(f));
    const kgCaught = caught.reduce((s, f) => s + f.weight, 0);
    setNetChallenge(prev => ({
      ...prev,
      fishPositions: newFishPositions,
      netThrows: prev.netThrows - 1,
      caughtFish: [...prev.caughtFish, ...caught],
      totalKg: prev.totalKg + kgCaught,
    }));
    if (caught.length > 0) addLog(`Bắt được ${caught.length} cá (${kgCaught}kg)!`);
    else addLog(`Lưới trống!`);
  };

  const endNetChallenge = () => {
    if (!netChallenge) return;
    const sellPrice = netChallenge.totalKg * 2;
    setNc(p => p + sellPrice);
    addLog(`Kết thúc thử thách lưới: ${netChallenge.caughtFish.length} cá, ${netChallenge.totalKg}kg -> +${sellPrice} NC`);
    setNetChallenge(null);
    setGameState("nightChoice");
  };

  useEffect(() => {
    const onKey = (e) => {
      if (gameState !== "playing") return;
      switch (e.key.toLowerCase()) {
        case "w": case "arrowup": move(0, -1); break;
        case "s": case "arrowdown": move(0, 1); break;
        case "a": case "arrowleft": move(-1, 0); break;
        case "d": case "arrowright": move(1, 0); break;
        case "f": case " ": doFish(); break;
        case "u": upgrade(); break;
        case "h": hireNPC(); break;
        case "m": setShowMapSelect(true); break;
        case "?": setShowHelp(true); break;
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [gameState, move, doFish, upgrade, hireNPC]);

  useEffect(() => {
    if (logRef.current) {
      logRef.current.scrollTop = logRef.current.scrollHeight;
    }
  }, [log]);

  const handleCellClick = (x, y) => {
    if (gameState === "netChallenge") {
      throwNet(x, y);
      return;
    }
    if (gameState !== "playing") return;
    if (x === px && y === py) {
      doFish();
    } else if (Math.abs(x - px) + Math.abs(y - py) === 1) {
      move(x - px, y - py);
    }
  };

  const startGame = () => {
    setGameState("playing");
    setPx(Math.floor(currentMap.size / 2));
    setPy(Math.floor(currentMap.size / 2));
    setFishMap(generateFishForMap(currentMap));
  };

  const goToMenu = () => {
    setGameState("menu");
  };

  if (gameState === "menu") {
    return (
      <div style={styles.container}>
        <div style={styles.menuWrap}>
          <div style={styles.titleArea}>
            <div style={styles.bigFish}>🐟</div>
            <h1 style={styles.title}>{t("title")}</h1>
            <p style={styles.subtitle}>{t("subtitle")}</p>
          </div>
          <div style={styles.menuInfo}>
            <p style={styles.menuText}>🗺️ 125 {t("menuMap")}</p>
            <p style={styles.menuText}>🌌 {t("menuCosmic")}</p>
            <p style={styles.menuText}>👥 {t("menuCrew")}</p>
            <p style={styles.menuText}>🕸️ {t("menuNet")}</p>
            <p style={styles.menuText}>🏛️ {t("menuAquarium")}</p>
            <p style={styles.menuText}>🐠 {t("menuTank")}</p>
            <p style={styles.menuText}>🔒 {t("menuCage")}</p>
            <p style={styles.menuText}>🌙 {t("menuNight")}</p>
          </div>
          <button style={styles.playBtn} onClick={startGame}>
            {luot > 0 ? t("continueBtn") : t("startBtn")}
          </button>
          <button
            style={{ ...styles.playBtn, background: "linear-gradient(135deg, #64748b, #475569)", marginTop: 10 }}
            onClick={() => window.location.href = "../index.html"}
          >
            🏠 Quay về
          </button>
          <div style={styles.controls}>
            <span style={styles.controlTag}>WASD di chuyển</span>
            <span style={styles.controlTag}>F/Space câu</span>
            <span style={styles.controlTag}>U nâng cần</span>
            <span style={styles.controlTag}>H thuê NPC</span>
          </div>
          <div style={{ marginTop: 16 }}>
            <button
              style={{ background: "none", border: "none", fontSize: 24, cursor: "pointer" }}
              onClick={() => setShowLangPicker(!showLangPicker)}
            >
              {LANGUAGES.find(l => l.code === lang)?.flag || "🌐"}
            </button>
            {showLangPicker && (
              <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 8 }}>
                {LANGUAGES.map(l => (
                  <button
                    key={l.code}
                    style={{
                      background: lang === l.code ? "rgba(94,234,212,0.2)" : "rgba(255,255,255,0.05)",
                      border: lang === l.code ? "1px solid #5eead4" : "1px solid rgba(255,255,255,0.1)",
                      borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 18,
                    }}
                    onClick={() => { setLang(l.code); setShowLangPicker(false); }}
                  >
                    {l.flag}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // Render main game
  return (
    <div style={{
      ...styles.container,
      background: timeOfDay === "night"
        ? "linear-gradient(145deg, #050510 0%, #0a0a20 50%, #0d0d30 100%)"
        : timeOfDay === "sunset"
        ? "linear-gradient(145deg, #1a0a0a 0%, #2d1020 50%, #1a2040 100%)"
        : currentMap.cosmic
        ? `linear-gradient(145deg, ${currentMap.color} 0%, #050510 50%, #0a0a20 100%)`
        : `linear-gradient(145deg, ${currentMap.color} 0%, #132744 40%, #1a3a5c 100%)`,
    }}>
      <div style={styles.gameWrap}>
        {/* HEADER */}
        <div style={styles.header}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <h2 style={styles.headerTitle}>
              {currentMap.icon} {currentMap.name}
              {currentMap.cosmic && <span style={{ marginLeft: 8, fontSize: 12, color: "#c084fc" }}>VŨ TRỤ</span>}
            </h2>
            <div style={{ display: "flex", gap: 6 }}>
              <button style={{ ...styles.actionBtn, padding: "4px 10px", fontSize: 12 }} onClick={() => setShowHelp(true)}>❓</button>
              <button style={{ ...styles.actionBtn, padding: "4px 10px", fontSize: 12 }} onClick={goToMenu}>📋</button>
            </div>
          </div>
          <div style={styles.statsRow}>
            <div style={styles.stat}>
              <span style={styles.statLabel}>SM</span>
              <span style={{ ...styles.statValue, color: "#5eead4" }}>{sm.toLocaleString()}</span>
            </div>
            <div style={styles.stat}>
              <span style={styles.statLabel}>NC</span>
              <span style={{ ...styles.statValue, color: "#fbbf24" }}>{nc.toLocaleString()}</span>
            </div>
            <div style={styles.stat}>
              <span style={styles.statLabel}>{t("day")}</span>
              <span style={styles.statValue}>{day}</span>
            </div>
            <div style={styles.stat}>
              <span style={styles.statLabel}>{t("turns")}</span>
              <span style={styles.statValue}>{luot}</span>
            </div>
            <div style={styles.stat}>
              <span style={styles.statLabel}>Cá</span>
              <span style={styles.statValue}>{totalCaught}</span>
            </div>
            <div style={styles.stat}>
              <span style={styles.statLabel}>Quái</span>
              <span style={styles.statValue}>{monstersSlain}</span>
            </div>
          </div>
        </div>

        <div style={styles.mainArea}>
          {/* MAP */}
          <div style={styles.mapSection}>
            <div style={{ ...styles.grid, gridTemplateColumns: `repeat(${SIZE}, 1fr)` }}>
              {Array.from({ length: SIZE * SIZE }).map((_, i) => {
                const x = i % SIZE;
                const y = Math.floor(i / SIZE);
                const isPlayer = x === px && y === py;
                const hasFish = fishMap[y] && fishMap[y][x];
                const isRipple = ripple && ripple.x === x && ripple.y === y;
                const isNetHover = netHover && Math.abs(netHover.x - x) <= 1 && Math.abs(netHover.y - y) <= 1;
                const netFish = netChallenge?.fishPositions.find(f => f.x === x && f.y === y);
                return (
                  <div
                    key={i}
                    style={{
                      ...styles.cell,
                      ...(isPlayer ? styles.playerCell : {}),
                      ...(hasFish && !isPlayer ? styles.fishCell : {}),
                      ...(isRipple ? styles.rippleCell : {}),
                      ...(isNetHover ? { background: "rgba(94,234,212,0.2)", border: "1px dashed #5eead4" } : {}),
                      fontSize: SIZE > 8 ? 16 : SIZE > 6 ? 20 : 24,
                      cursor: "pointer",
                    }}
                    onClick={() => handleCellClick(x, y)}
                    onMouseEnter={() => gameState === "netChallenge" && setNetHover({ x, y })}
                    onMouseLeave={() => setNetHover(null)}
                  >
                    {isPlayer ? (fishingAnim ? "🎣" : "🧑") : netFish ? "🐟" : hasFish ? "🐟" : (currentMap.cosmic ? COSMIC_WATER[Math.floor(Math.random() * COSMIC_WATER.length)] : WATER_EMOJIS[Math.floor(Math.random() * WATER_EMOJIS.length)])}
                  </div>
                );
              })}
            </div>
            {/* D-PAD */}
            <div style={styles.dpad}>
              <div style={styles.dpadRow}>
                <div style={styles.dpadSpacer} />
                <button style={styles.dpadBtn} onClick={() => move(0, -1)}>▲</button>
                <div style={styles.dpadSpacer} />
              </div>
              <div style={styles.dpadRow}>
                <button style={styles.dpadBtn} onClick={() => move(-1, 0)}>◄</button>
                <button style={{ ...styles.dpadBtn, ...styles.dpadCenter }} onClick={doFish}>🎣</button>
                <button style={styles.dpadBtn} onClick={() => move(1, 0)}>►</button>
              </div>
              <div style={styles.dpadRow}>
                <div style={styles.dpadSpacer} />
                <button style={styles.dpadBtn} onClick={() => move(0, 1)}>▼</button>
                <div style={styles.dpadSpacer} />
              </div>
            </div>
          </div>

          {/* SIDE PANEL */}
          <div style={styles.sidePanel}>
            <div style={styles.actionBtns}>
              <button style={styles.actionBtn} onClick={upgrade}>⬆️ {t("upgrade")} ({canCap}/5) - {canCap * 100} NC</button>
              <button style={styles.actionBtn} onClick={hireNPC}>👤 {t("hireNpc")} ({npc}) - 100 NC</button>
              <button style={styles.actionBtn} onClick={() => setShowShop(true)}>🐠 {t("fishShop")}</button>
              <button style={styles.actionBtn} onClick={() => setShowTank(true)}>🐠 {t("fishTank")} ({tank.length}/{tankCapacity})</button>
              <button style={styles.actionBtn} onClick={() => setShowCage(true)}>🔒 {t("monsterCage")} ({monsterCage.length}/{cageCapacity})</button>
              <button style={styles.actionBtn} onClick={() => setShowAquarium(true)}>🏛️ {t("aquariumPanel")} ({aquarium.length}/{aquariumCapacity})</button>
              <button style={styles.actionBtn} onClick={() => setShowCrew(true)}>👥 {t("crewPanel")} ({ownedCrew.length})</button>
              <button style={styles.actionBtn} onClick={() => setShowMapSelect(true)}>🗺️ {t("mapBtn")}</button>
            </div>
            <div style={styles.rodInfo}>
              <p style={styles.rodTitle}>🎣 Cần Câu Cấp {canCap}</p>
              <p style={styles.rodDetail}>Tải trọng: {CAN_MAX[canCap - 1].toLocaleString()}kg</p>
              <div style={styles.rodBar}>
                <div style={{ ...styles.rodFill, width: `${(canCap / 5) * 100}%` }} />
              </div>
            </div>
            <div style={styles.miniStats}>
              <p>🏆 Cá lớn nhất: {biggestFish.toLocaleString()}kg</p>
              <p>🏛️ Tổng khách: {aquariumTotalVisitors.toLocaleString()}</p>
            </div>
            <div ref={logRef} style={styles.logArea}>
              {log.length === 0 ? <p style={styles.logEmpty}>Nhật ký trống...</p> : log.map((m, i) => <p key={i} style={styles.logMsg}>{m}</p>)}
            </div>
          </div>
        </div>

        {/* CAUGHT FISH MODAL */}
        {gameState === "result" && caughtFish && !caughtFish.tooHeavy && (
          <div style={styles.overlay}>
            <div style={{ ...styles.modal, ...(caughtFish.rare ? styles.modalRare : {}) }}>
              <div style={styles.fishEmoji}>{caughtFish.cosmic ? "🌌" : "🐟"}</div>
              <h3 style={styles.fishName}>{caughtFish.name}</h3>
              <p style={styles.fishWeight}>{caughtFish.weight.toLocaleString()} kg</p>
              {caughtFish.rare && <span style={styles.rareBadge}>{caughtFish.cosmic ? t("cosmic") : t("rare")}</span>}
              <div style={{ ...styles.choiceRow, marginTop: 20 }}>
                <button style={{ ...styles.choiceBtn, ...styles.eatBtn }} onClick={handleEat}>
                  🍖 {t("eat")}
                  <span style={styles.choiceSub}>+SM</span>
                </button>
                <button style={{ ...styles.choiceBtn, ...styles.sellBtn }} onClick={handleSell}>
                  💰 {t("sell")}
                  <span style={styles.choiceSub}>+NC</span>
                </button>
                <button style={{ ...styles.choiceBtn, background: "linear-gradient(135deg, #0ea5e9, #0369a1)", color: "white" }} onClick={handleTank}>
                  🐠 {t("tankBtn")}
                  <span style={styles.choiceSub}>x3</span>
                </button>
                <button style={{ ...styles.choiceBtn, ...styles.releaseBtn }} onClick={handleRelease}>
                  🌊 {t("release")}
                  <span style={styles.choiceSub}>?</span>
                </button>
              </div>
            </div>
          </div>
        )}

        {/* TOO HEAVY MODAL */}
        {gameState === "result" && caughtFish && caughtFish.tooHeavy && (
          <div style={styles.overlay}>
            <div style={styles.modal}>
              <div style={styles.fishEmoji}>🐋</div>
              <h3 style={styles.fishName}>{caughtFish.name}</h3>
              <p style={styles.fishWeight}>{caughtFish.weight.toLocaleString()} kg</p>
              <p style={styles.tooHeavy}>{t("tooHeavy")}</p>
              <p style={styles.tooHeavySub}>Cần: {CAN_MAX[canCap - 1].toLocaleString()}kg max</p>
              <button style={styles.modalBtn} onClick={handleTooHeavy}>{t("cont")}</button>
            </div>
          </div>
        )}

                { title: "Câu cá", color: "#38bdf8", items: ["Đứng trên ô có cá rồi nhấn F/Space", "Cá lớn cần cần câu mạnh hơn"] },
                { title: "Lựa chọn", color: "#f59e0b", items: ["Ăn = +SM", "Bán = +NC", "Bể = nuôi lớn, bán x3", "Thả = kho báu hoặc đánh quái"] },
                { title: "Nâng cấp", color: "#fb923c", items: ["U = nâng cần", "H = thuê NPC", "Shop = buff cá chiến"] },
                { title: "Đêm", color: "#818cf8", items: ["15 lượt = 1 ngày", "Đêm: chiến 5 wave hoặc ngủ"] },
              ].map((s, i) => (
                <div key={i} style={{ marginBottom: 14 }}>
                  <h4 style={{ margin: "0 0 6px", fontSize: 14, fontWeight: 700, color: s.color }}>{s.title}</h4>
                  {s.items.map((item, j) => (
                    <p key={j} style={{ margin: "3px 0", fontSize: 12, color: "#94a3b8", paddingLeft: 12 }}>- {item}</p>
                  ))}
                </div>
              ))}
              <button style={{ ...styles.modalBtn, width: "100%", marginTop: 8, background: "linear-gradient(135deg, #ef4444, #dc2626)", color: "white" }} onClick={() => setShowHelp(false)}>
                Đã hiểu!
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
