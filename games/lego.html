<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧱 Xếp Lego — Game Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #1a0a2e, #2e1065);
      min-height: 100vh;
      overflow-x: hidden;
    }
    #root {
      min-height: 100vh;
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Lego pieces configuration
    const LEGO_PIECES = [
      { id:'1x1', name:'1×1', icon:'🟥', w:1,h:1, color:'#ef4444', cost:5   },
      { id:'1x2', name:'1×2', icon:'🟧', w:2,h:1, color:'#f97316', cost:8   },
      { id:'1x4', name:'1×4', icon:'🟨', w:4,h:1, color:'#eab308', cost:14  },
      { id:'2x2', name:'2×2', icon:'🟩', w:2,h:2, color:'#22c55e', cost:18  },
      { id:'2x4', name:'2×4', icon:'🟦', w:4,h:2, color:'#3b82f6', cost:28  },
      { id:'2x2r',name:'2×2 Đỏ',icon:'🔴',w:2,h:2,color:'#dc2626',cost:20  },
      { id:'arch', name:'Vòm', icon:'🌈', w:3,h:2, color:'#a855f7', cost:25 },
      { id:'window',name:'Cửa Sổ',icon:'🪟',w:2,h:2,color:'#60a5fa',cost:22 },
      { id:'door', name:'Cửa', icon:'🚪', w:1,h:3, color:'#78716c', cost:30 },
      { id:'roof', name:'Mái',  icon:'🔺', w:4,h:2, color:'#b45309', cost:35 },
      { id:'star', name:'Ngôi Sao',icon:'⭐',w:2,h:2,color:'#fbbf24',cost:50},
    ];

    // Challenges configuration
    const LEGO_CHALLENGES = [
      { name:'Nhà Nhỏ',    target:50,  reward:500,   desc:'Xây được 50 ô gạch' },
      { name:'Cái Tháp',   target:100, reward:2000,  desc:'100 ô + cao tối thiểu 8 tầng' },
      { name:'Lâu Đài',    target:200, reward:10000, desc:'200 ô gạch trở lên' },
      { name:'Siêu Công Trình',target:500,reward:100000,desc:'500 ô! Bậc thầy Lego' },
    ];

    // Grid configuration
    const GRID_W=12, GRID_H=16, CELL=28;

    function LegoGame({ onBack }) {
      const [grid, setGrid]         = useState(()=>Array(GRID_H).fill(null).map(()=>Array(GRID_W).fill(null)));
      const [selected, setSelected] = useState(LEGO_PIECES[0]);
      const [coins, setCoins]       = useState(Infinity);
      const [score, setScore]       = useState(0);
      const [best, setBest]         = useState(0);
      const [placing, setPlacing]   = useState(false);
      const [completed, setCompleted] = useState([]);
      const [msg, setMsg]           = useState('');

      const totalCells = grid.flat().filter(Boolean).length;

      const showMsg = (t) => { setMsg(t); setTimeout(()=>setMsg(''),2000); };

      const canPlace = (r, c, piece) => {
        if(r+piece.h>GRID_H||c+piece.w>GRID_W) return false;
        for(let dr=0;dr<piece.h;dr++) for(let dc=0;dc<piece.w;dc++) if(grid[r+dr][c+dc]) return false;
        return true;
      };

      const placePiece = (r, c) => {
        if(!selected) return;
        if(!canPlace(r,c,selected)) { showMsg('❌ Không đặt được ở đây!'); return; }
        const ng=grid.map(row=>[...row]);
        for(let dr=0;dr<selected.h;dr++) for(let dc=0;dc<selected.w;dc++) ng[r+dr][c+dc]={piece:selected,color:selected.color};
        setGrid(ng);
        setCoins(p=>p-selected.cost);
        const newTotal=ng.flat().filter(Boolean).length;
        const pts=selected.w*selected.h*2;
        setScore(p=>{const np=p+pts;setBest(b=>Math.max(b,np));return np;});
        // Check challenges
        LEGO_CHALLENGES.forEach(ch=>{
          if(!completed.includes(ch.name)&&newTotal>=ch.target){
            setCompleted(p=>[...p,ch.name]);
            setCoins(c2=>c2+ch.reward);
            showMsg(`🏆 Hoàn thành: ${ch.name}! +${ch.reward}xu`);
          }
        });
      };

      const removePiece = (r,c) => {
        if(!grid[r][c]) return;
        const color=grid[r][c].color;
        const ng=grid.map(row=>[...row]);
        // Remove all connected cells of same placement
        for(let dr=0;dr<GRID_H;dr++) for(let dc=0;dc<GRID_W;dc++) if(ng[dr][dc]?.color===color&&Math.abs(dr-r)<=3&&Math.abs(dc-c)<=3) ng[dr][dc]=null;
        setGrid(ng);
        setCoins(p=>p+3);
      };

      const resetGrid=()=>{ setGrid(Array(GRID_H).fill(null).map(()=>Array(GRID_W).fill(null))); setScore(0); setCoins(Infinity); setCompleted([]); };

      return(
        <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#1a0a2e,#2e1065)',display:'flex',flexDirection:'column',padding:8,gap:6}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
            <h3 style={{margin:0,color:'#f0abfc',fontSize:14,fontWeight:900}}>🧱 Xếp Lego</h3>
            <div style={{textAlign:'right'}}><div style={{color:'#fbbf24',fontWeight:900}}>🪙 ∞</div><div style={{fontSize:9,color:'#64748b'}}>⭐ {score}</div></div>
          </div>

          {msg&&<div style={{textAlign:'center',background:'rgba(240,171,252,0.15)',border:'1px solid rgba(240,171,252,0.3)',borderRadius:8,padding:'5px',color:'#f0abfc',fontSize:12,fontWeight:700}}>{msg}</div>}

          {/* Piece selector */}
          <div style={{display:'flex',gap:4,overflowX:'auto',paddingBottom:4}}>
            {LEGO_PIECES.map(p=>(
              <button key={p.id} onClick={()=>setSelected(p)} style={{
                flexShrink:0,background:selected?.id===p.id?`${p.color}33`:'rgba(255,255,255,0.04)',
                border:`2px solid ${selected?.id===p.id?p.color:'rgba(255,255,255,0.08)'}`,
                borderRadius:8,padding:'5px 8px',cursor:'pointer',textAlign:'center',
              }}>
                <div style={{fontSize:18}}>{p.icon}</div>
                <div style={{fontSize:8,color:p.color,fontWeight:700}}>{p.name}</div>
                <div style={{fontSize:8,color:'#64748b'}}>🪙{p.cost}</div>
              </button>
            ))}
          </div>

          {/* Grid */}
          <div style={{overflowX:'auto',overflowY:'auto',maxHeight:460}}>
            <div style={{display:'inline-block',border:'2px solid rgba(255,255,255,0.1)',borderRadius:8,background:'rgba(0,0,0,0.3)'}}>
              {grid.map((row,r)=>(
                <div key={r} style={{display:'flex'}}>
                  {row.map((cell,c)=>(
                    <div key={c}
                      onClick={()=>cell?removePiece(r,c):placePiece(r,c)}
                      style={{
                        width:CELL,height:CELL,
                        background:cell?cell.color:(r+c)%2===0?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.06)',
                        border:'1px solid rgba(255,255,255,0.05)',
                        cursor:'pointer',
                        boxShadow:cell?`inset 0 -3px 0 rgba(0,0,0,0.3), inset 0 0 0 2px rgba(255,255,255,0.15)`:'none',
                        position:'relative',
                      }}
                    >
                      {cell&&<div style={{position:'absolute',top:3,left:3,width:CELL-10,height:CELL-10,borderRadius:'50%',background:'rgba(255,255,255,0.2)'}}/>}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>

          {/* Stats & challenge */}
          <div style={{display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:10,color:'#64748b'}}>🧱 {totalCells} ô | 🏆 Kỷ lục: {best}</div>
            <button onClick={resetGrid} style={{background:'rgba(239,68,68,0.15)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:8,padding:'4px 12px',color:'#f87171',fontSize:11,cursor:'pointer',fontWeight:700}}>🗑️ Xoá</button>
          </div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {LEGO_CHALLENGES.map(ch=>(
              <span key={ch.name} style={{fontSize:9,padding:'2px 7px',borderRadius:8,background:completed.includes(ch.name)?'rgba(251,191,36,0.15)':'rgba(255,255,255,0.04)',color:completed.includes(ch.name)?'#fbbf24':'#475569',border:`1px solid ${completed.includes(ch.name)?'rgba(251,191,36,0.3)':'rgba(255,255,255,0.06)'}`}}>
                {completed.includes(ch.name)?'✅ ':''}{ch.name}: {ch.target}ô → +{ch.reward}xu
              </span>
            ))}
          </div>
        </div>
      );
    }

    // App wrapper
    function App() {
      const handleBack = () => {
        window.location.href = '../index.html';
      };

      return <LegoGame onBack={handleBack} />;
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
