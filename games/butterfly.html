<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🦋 Bắt Bướm — Game Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(180deg,#bfdbfe,#86efac); }
    #root { min-height: 100vh; }
  </style>
  <script src="../js/theme.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TYPES = [
      { icon: '🦋', pts: 1, speed: 2.5, size: 44 },
      { icon: '🦋', pts: 2, speed: 3.5, size: 36, color: 'hue-rotate(60deg)' },
      { icon: '🦋', pts: 5, speed: 5, size: 28, color: 'hue-rotate(180deg)' },
      { icon: '🐝', pts: 3, speed: 4, size: 32 },
      { icon: '🪲', pts: -1, speed: 3, size: 38 }
    ];

    function ButterflyGame() {
      const [butterflies, setButterflies] = useState([]);
      const [score, setScore] = useState(0);
      const [started, setStarted] = useState(false);
      const [missed, setMissed] = useState(0);
      const [netPos, setNetPos] = useState({ x: 0, y: 0 });
      const [swinging, setSwinging] = useState(false);
      const idRef = useRef(0);
      const containerRef = useRef(null);

      const onBack = () => {
        window.location.href = "../index.html";
      };

      // Spawn butterflies
      useEffect(() => {
        if (!started) return;
        const interval = setInterval(() => {
          const type = TYPES[Math.floor(Math.random() * TYPES.length)];
          const id = idRef.current++;
          const fromLeft = Math.random() > 0.5;
          const startX = fromLeft ? -60 : window.innerWidth + 60;
          const endX = fromLeft ? window.innerWidth + 60 : -60;
          const startY = 100 + Math.random() * (window.innerHeight - 250);
          const wobble = (Math.random() - 0.5) * 100;

          setButterflies(prev => [...prev, {
            id,
            ...type,
            x: startX,
            y: startY,
            targetX: endX,
            wobble,
            startX,
            direction: fromLeft ? 1 : -1
          }]);
        }, 700);
        return () => clearInterval(interval);
      }, [started]);

      // Move butterflies
      useEffect(() => {
        if (!started) return;
        const interval = setInterval(() => {
          setButterflies(prev => {
            const updated = prev.map(b => ({
              ...b,
              x: b.x + b.speed * b.direction,
              y: b.y + Math.sin(Date.now() / 200 + b.id) * 2
            }));

            const escaped = updated.filter(b =>
              (b.direction > 0 && b.x > window.innerWidth + 50) ||
              (b.direction < 0 && b.x < -50)
            );

            if (escaped.length > 0) {
              setMissed(m => m + escaped.length);
            }

            return updated.filter(b =>
              !((b.direction > 0 && b.x > window.innerWidth + 50) ||
                (b.direction < 0 && b.x < -50))
            );
          });
        }, 50);
        return () => clearInterval(interval);
      }, [started]);

      const catchButterfly = (id, pts) => {
        setSwinging(true);
        setTimeout(() => setSwinging(false), 150);
        setButterflies(prev => prev.filter(b => b.id !== id));
        setScore(s => s + pts);
      };

      const handlePointerMove = (e) => {
        const rect = containerRef.current?.getBoundingClientRect();
        if (rect) {
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          setNetPos({
            x: clientX - rect.left,
            y: clientY - rect.top
          });
        }
      };

      const reset = () => {
        setButterflies([]);
        setScore(0);
        setMissed(0);
        setStarted(true);
        idRef.current = 0;
      };

      const gameOver = missed >= 10;

      return (
        <div
          ref={containerRef}
          onPointerMove={handlePointerMove}
          onTouchMove={handlePointerMove}
          style={{
            position: 'relative',
            width: '100%',
            minHeight: '100vh',
            overflow: 'hidden',
            cursor: started && !gameOver ? 'none' : 'default',
            touchAction: 'none'
          }}
        >
          {/* Back Button */}
          <button
            onClick={onBack}
            style={{
              position: 'absolute',
              top: 16,
              left: 16,
              zIndex: 100,
              padding: '8px 16px',
              fontSize: 16,
              borderRadius: 8,
              border: 'none',
              background: '#fff',
              boxShadow: '0 2px 8px rgba(0,0,0,0.15)',
              cursor: 'pointer'
            }}
          >
            ← Quay lại
          </button>

          {/* Score */}
          <div style={{
            position: 'absolute',
            top: 16,
            right: 16,
            zIndex: 100,
            padding: '8px 16px',
            fontSize: 20,
            fontWeight: 'bold',
            borderRadius: 8,
            background: '#fff',
            boxShadow: '0 2px 8px rgba(0,0,0,0.15)'
          }}>
            🎯 {score} | 💨 {missed}/10
          </div>

          {/* Grass */}
          <div style={{
            position: 'absolute',
            bottom: 0,
            left: 0,
            right: 0,
            height: 80,
            background: 'linear-gradient(0deg, #22c55e, #4ade80)',
            borderTopLeftRadius: '50% 30px',
            borderTopRightRadius: '50% 30px'
          }} />

          {/* Flowers */}
          {[...Array(8)].map((_, i) => (
            <div
              key={i}
              style={{
                position: 'absolute',
                bottom: 40 + Math.random() * 20,
                left: `${10 + i * 12}%`,
                fontSize: 28 + Math.random() * 12,
                transform: `rotate(${Math.random() * 20 - 10}deg)`
              }}
            >
              {['🌸', '🌼', '🌺', '🌻', '💐'][i % 5]}
            </div>
          ))}

          {/* Butterflies */}
          {butterflies.map(b => (
            <div
              key={b.id}
              onClick={() => catchButterfly(b.id, b.pts)}
              onTouchStart={(e) => {
                e.preventDefault();
                catchButterfly(b.id, b.pts);
              }}
              style={{
                position: 'absolute',
                left: b.x,
                top: b.y,
                fontSize: b.size,
                cursor: 'pointer',
                filter: b.color || 'none',
                transform: `scaleX(${b.direction})`,
                transition: 'transform 0.1s',
                userSelect: 'none',
                zIndex: 10
              }}
            >
              {b.icon}
            </div>
          ))}

          {/* Net cursor */}
          {started && !gameOver && (
            <div
              style={{
                position: 'absolute',
                left: netPos.x - 30,
                top: netPos.y - 30,
                fontSize: 50,
                pointerEvents: 'none',
                transform: swinging ? 'rotate(-30deg)' : 'rotate(0deg)',
                transition: 'transform 0.1s',
                zIndex: 50
              }}
            >
              🥅
            </div>
          )}

          {/* Start Overlay */}
          {!started && !gameOver && (
            <div style={{
              position: 'absolute',
              inset: 0,
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              justifyContent: 'center',
              background: 'rgba(255,255,255,0.8)',
              zIndex: 200
            }}>
              <div style={{ fontSize: 80, marginBottom: 20 }}>🦋</div>
              <h1 style={{ fontSize: 36, marginBottom: 16, color: '#166534' }}>Bắt Bướm</h1>
              <p style={{ fontSize: 18, marginBottom: 24, color: '#666', textAlign: 'center', padding: '0 20px' }}>
                Nhấn vào bướm để bắt! Đừng để thoát quá 10 con.
              </p>
              <button
                onClick={reset}
                style={{
                  padding: '16px 48px',
                  fontSize: 24,
                  borderRadius: 12,
                  border: 'none',
                  background: 'linear-gradient(135deg, #22c55e, #16a34a)',
                  color: '#fff',
                  cursor: 'pointer',
                  boxShadow: '0 4px 12px rgba(34,197,94,0.4)'
                }}
              >
                Bắt đầu!
              </button>
            </div>
          )}

          {/* Game Over Overlay */}
          {gameOver && (
            <div style={{
              position: 'absolute',
              inset: 0,
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              justifyContent: 'center',
              background: 'rgba(0,0,0,0.7)',
              zIndex: 200
            }}>
              <div style={{ fontSize: 60, marginBottom: 20 }}>😢</div>
              <h1 style={{ fontSize: 36, marginBottom: 16, color: '#fff' }}>Hết giờ!</h1>
              <p style={{ fontSize: 24, marginBottom: 24, color: '#fbbf24' }}>
                Điểm số: {score}
              </p>
              <button
                onClick={reset}
                style={{
                  padding: '16px 48px',
                  fontSize: 24,
                  borderRadius: 12,
                  border: 'none',
                  background: 'linear-gradient(135deg, #f59e0b, #d97706)',
                  color: '#fff',
                  cursor: 'pointer',
                  boxShadow: '0 4px 12px rgba(245,158,11,0.4)'
                }}
              >
                Chơi lại
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ButterflyGame />);
  </script>
</body>
</html>
