    function getProgress() {
      try { return JSON.parse(localStorage.getItem('eduGeoProgress') || '{}'); }
      catch(e) { return {}; }
    }
    function saveProgress(id, score) {
      const p = getProgress();
      if (!p[id] || score > p[id]) p[id] = score;
      localStorage.setItem('eduGeoProgress', JSON.stringify(p));
    }

    function Hub({ onPick }) {
      const progress = getProgress();
      return (
        <div style={{ padding: '20px', maxWidth: '900px', margin: '0 auto' }}>
          <div style={{ marginBottom: '20px' }}>
            <a href="../index.html" style={{ color: 'white', textDecoration: 'none', fontSize: '16px' }}>← Về trang chủ</a>
          </div>
          <h1 style={{ fontSize: '36px', marginBottom: '8px', textAlign: 'center' }}>🌍 Địa Lý Game Hub</h1>
          <p style={{ textAlign: 'center', opacity: 0.85, marginBottom: '28px' }}>Khám phá thế giới qua 10 trò chơi</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: '16px' }}>
            {GAMES.map(g => (
              <button key={g.id} onClick={() => onPick(g.id)}
                style={{ background: g.color, border: 'none', borderRadius: '14px', padding: '20px', color: 'white', textAlign: 'left', cursor: 'pointer', boxShadow: '0 4px 12px rgba(0,0,0,0.25)' }}>
                <div style={{ fontSize: '38px', marginBottom: '8px' }}>{g.icon}</div>
                <div style={{ fontSize: '18px', fontWeight: 'bold', marginBottom: '4px' }}>{g.title}</div>
                <div style={{ fontSize: '13px', opacity: 0.9 }}>{g.desc}</div>
                {progress[g.id] !== undefined && (
                  <div style={{ marginTop: '8px', fontSize: '12px', background: 'rgba(0,0,0,0.25)', padding: '4px 8px', borderRadius: '6px', display: 'inline-block' }}>
                    🏆 Kỷ lục: {progress[g.id]}
                  </div>
                )}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function Quiz({ id, onExit }) {
      const game = GAMES.find(g => g.id === id);
      const questions = QUIZZES[id] || [];
      const [idx, setIdx] = useState(0);
      const [score, setScore] = useState(0);
      const [picked, setPicked] = useState(null);
      const [done, setDone] = useState(false);

      const q = questions[idx];

      function handlePick(i) {
        if (picked !== null) return;
        setPicked(i);
        const correct = i === q.c;
        if (correct) setScore(s => s + 1);
        setTimeout(() => {
          if (idx + 1 >= questions.length) {
            const finalScore = score + (correct ? 1 : 0);
            saveProgress(id, finalScore);
            setDone(true);
          } else {
            setIdx(idx + 1);
            setPicked(null);
          }
        }, 900);
      }

      function reset() {
        setIdx(0); setScore(0); setPicked(null); setDone(false);
      }

      if (done) {
        const pct = Math.round((score / questions.length) * 100);
        const msg = pct === 100 ? '🎉 Hoàn hảo!' : pct >= 80 ? '🌟 Xuất sắc!' : pct >= 60 ? '👍 Tốt!' : pct >= 40 ? '💪 Cố lên!' : '📚 Học thêm nhé!';
        return (
          <div style={{ padding: '20px', maxWidth: '600px', margin: '0 auto', textAlign: 'center' }}>
            <div style={{ marginBottom: '20px', textAlign: 'left' }}>
              <button onClick={onExit} style={{ background: 'rgba(255,255,255,0.2)', border: 'none', color: 'white', padding: '8px 16px', borderRadius: '8px', cursor: 'pointer' }}>← Quay lại</button>
            </div>
            <div style={{ background: game.color, padding: '40px', borderRadius: '16px', marginTop: '40px' }}>
              <div style={{ fontSize: '80px', marginBottom: '16px' }}>{game.icon}</div>
              <h2 style={{ fontSize: '32px', marginBottom: '12px' }}>Kết quả</h2>
              <div style={{ fontSize: '48px', fontWeight: 'bold', marginBottom: '8px' }}>{score}/{questions.length}</div>
              <div style={{ fontSize: '20px', marginBottom: '24px' }}>{msg}</div>
              <button onClick={reset} style={{ background: 'white', color: game.color, border: 'none', padding: '12px 32px', borderRadius: '10px', fontSize: '16px', fontWeight: 'bold', cursor: 'pointer', marginRight: '10px' }}>🔄 Chơi lại</button>
              <button onClick={onExit} style={{ background: 'rgba(0,0,0,0.3)', color: 'white', border: 'none', padding: '12px 32px', borderRadius: '10px', fontSize: '16px', fontWeight: 'bold', cursor: 'pointer' }}>🏠 Trang chủ</button>
            </div>
          </div>
        );
      }

      if (!q) return null;

      return (
        <div style={{ padding: '20px', maxWidth: '600px', margin: '0 auto' }}>
          <div style={{ marginBottom: '20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <button onClick={onExit} style={{ background: 'rgba(255,255,255,0.2)', border: 'none', color: 'white', padding: '8px 16px', borderRadius: '8px', cursor: 'pointer' }}>← Thoát</button>
            <div style={{ fontSize: '14px', opacity: 0.9 }}>Điểm: {score} / {questions.length}</div>
          </div>

          <div style={{ background: game.color, padding: '20px', borderRadius: '14px', marginBottom: '16px' }}>
            <div style={{ fontSize: '14px', opacity: 0.9, marginBottom: '6px' }}>{game.icon} {game.title}</div>
            <div style={{ fontSize: '14px', marginBottom: '10px' }}>Câu {idx + 1} / {questions.length}</div>
            <div style={{ background: 'rgba(0,0,0,0.2)', height: '6px', borderRadius: '3px', overflow: 'hidden' }}>
              <div style={{ background: 'white', height: '100%', width: `${((idx) / questions.length) * 100}%`, transition: 'width 0.3s' }}></div>
            </div>
          </div>

          <div style={{ background: 'rgba(255,255,255,0.12)', padding: '24px', borderRadius: '14px', marginBottom: '16px' }}>
            <h2 style={{ fontSize: '22px', lineHeight: 1.4 }}>{q.q}</h2>
          </div>

          <div style={{ display: 'grid', gap: '10px' }}>
            {q.a.map((ans, i) => {
              let bg = 'rgba(255,255,255,0.15)';
              if (picked !== null) {
                if (i === q.c) bg = '#16a34a';
                else if (i === picked) bg = '#dc2626';
              }
              return (
                <button key={i} onClick={() => handlePick(i)} disabled={picked !== null}
                  style={{ background: bg, border: '2px solid rgba(255,255,255,0.2)', color: 'white', padding: '14px 18px', borderRadius: '10px', fontSize: '16px', textAlign: 'left', cursor: picked !== null ? 'default' : 'pointer' }}>
                  <span style={{ fontWeight: 'bold', marginRight: '10px' }}>{String.fromCharCode(65 + i)}.</span>
                  {ans}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [route, setRoute] = useState(window.location.hash.slice(1) || '');

      useEffect(() => {
        const onHash = () => setRoute(window.location.hash.slice(1) || '');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      function pick(id) { window.location.hash = id; }
      function exit() { window.location.hash = ''; }

      if (route && QUIZZES[route]) {
        return <Quiz id={route} onExit={exit} />;
      }
      return <Hub onPick={pick} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
