        { q: 'Nước nào khởi xướng Thế chiến thứ 2?', a: ['Đức Quốc Xã', 'Nhật Bản', 'Ý', 'Liên Xô'], c: 0 },
        { q: 'Ai là lãnh đạo Đức Quốc Xã?', a: ['Adolf Hitler', 'Mussolini', 'Stalin', 'Churchill'], c: 0 },
        { q: 'Ai là thủ tướng Anh trong Thế chiến 2?', a: ['Winston Churchill', 'Chamberlain', 'Attlee', 'Eden'], c: 0 },
        { q: 'Trận Trân Châu Cảng diễn ra năm nào?', a: ['1941', '1939', '1945', '1942'], c: 0 },
        { q: 'Nước nào đã ném bom nguyên tử xuống Nhật?', a: ['Mỹ', 'Liên Xô', 'Anh', 'Pháp'], c: 0 },
        { q: 'Hai thành phố Nhật bị ném bom nguyên tử?', a: ['Hiroshima và Nagasaki', 'Tokyo và Osaka', 'Kyoto và Kobe', 'Yokohama và Nagoya'], c: 0 },
        { q: 'Phe Đồng Minh gồm những nước chính nào?', a: ['Mỹ, Anh, Liên Xô', 'Đức, Ý, Nhật', 'Pháp, Đức, Ý', 'Anh, Pháp, Đức'], c: 0 },
        { q: 'Phe Trục gồm những nước chính nào?', a: ['Đức, Ý, Nhật', 'Mỹ, Anh, Liên Xô', 'Anh, Pháp, Mỹ', 'Liên Xô, Trung Quốc'], c: 0 },
        { q: 'Ngày D-Day (đổ bộ Normandy) diễn ra năm nào?', a: ['1944', '1939', '1945', '1941'], c: 0 },
        { q: 'Ai là Tổng thống Mỹ trong phần lớn Thế chiến 2?', a: ['Franklin D. Roosevelt', 'Truman', 'Eisenhower', 'Wilson'], c: 0 }
      ],
      ancient: [
        { q: 'Kim tự tháp nổi tiếng ở đâu?', a: ['Ai Cập', 'Hy Lạp', 'La Mã', 'Trung Quốc'], c: 0 },
        { q: 'Đấu trường Colosseum ở thành phố nào?', a: ['Rome', 'Athens', 'Alexandria', 'Cairo'], c: 0 },
        { q: 'Văn minh Hy Lạp cổ nổi tiếng về?', a: ['Triết học và dân chủ', 'Kim tự tháp', 'Vạn Lý Trường Thành', 'Đấu trường'], c: 0 },
        { q: 'Ai là triết gia nổi tiếng của Hy Lạp?', a: ['Socrates', 'Caesar', 'Cleopatra', 'Napoleon'], c: 0 },
        { q: 'Julius Caesar là nhân vật của nền văn minh nào?', a: ['La Mã', 'Hy Lạp', 'Ai Cập', 'Ba Tư'], c: 0 },
        { q: 'Cleopatra là nữ hoàng của nước nào?', a: ['Ai Cập', 'La Mã', 'Hy Lạp', 'Ba Tư'], c: 0 },
        { q: 'Đỉnh Olympus gắn với thần thoại nào?', a: ['Hy Lạp', 'La Mã', 'Ai Cập', 'Bắc Âu'], c: 0 },
        { q: 'Chữ viết tượng hình của Ai Cập gọi là?', a: ['Hieroglyph', 'Cuneiform', 'Alphabet', 'Hanzi'], c: 0 },
        { q: 'Thần Zeus là chúa tể thần thoại nào?', a: ['Hy Lạp', 'La Mã', 'Ai Cập', 'Nhật Bản'], c: 0 },
        { q: 'Alexander Đại đế là vua của đâu?', a: ['Macedonia (Hy Lạp)', 'La Mã', 'Ba Tư', 'Ai Cập'], c: 0 },
        { q: 'Đế chế La Mã sụp đổ (Tây La Mã) năm nào?', a: ['476', '1000', '100', '800'], c: 0 },
        { q: 'Thế vận hội Olympic đầu tiên ở đâu?', a: ['Hy Lạp cổ đại', 'La Mã', 'Ai Cập', 'Ba Tư'], c: 0 }
      ]
    };

    // Shuffle helper
    const shuffle = (arr) => { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

    const prepareQuestions = (list) => {
      return shuffle(list).map(item => {
        const correctAns = item.a[item.c];
        const shuffled = shuffle(item.a);
        return { q: item.q, a: shuffled, c: shuffled.indexOf(correctAns) };
      });
    };

    function Quiz({ gameId, title, icon, color, onExit }) {
      const [questions] = useState(() => prepareQuestions(QUESTIONS[gameId]));
      const [idx, setIdx] = useState(0);
      const [score, setScore] = useState(0);
      const [selected, setSelected] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const [done, setDone] = useState(false);
      const highScore = loadProgress()[gameId] || 0;

      const handleAnswer = (i) => {
        if (selected !== null) return;
        setSelected(i);
        setShowResult(true);
        if (i === questions[idx].c) setScore(s => s + 1);
      };

      const next = () => {
        if (idx + 1 >= questions.length) {
          saveProgress(gameId, score + (selected === questions[idx].c ? 0 : 0));
          setDone(true);
        } else {
          setIdx(idx + 1);
          setSelected(null);
          setShowResult(false);
        }
      };

      useEffect(() => {
        if (done) saveProgress(gameId, score);
      }, [done]);

      if (done) {
        const pct = Math.round((score / questions.length) * 100);
        return (
          <div style={{ padding: 20, maxWidth: 600, margin: '0 auto', textAlign: 'center' }}>
            <div style={{ fontSize: 80, marginTop: 40 }}>{pct >= 80 ? '🏆' : pct >= 50 ? '🎉' : '📚'}</div>
            <h1 style={{ fontSize: 32, marginBottom: 20 }}>Hoàn thành!</h1>
            <div style={{ background: 'rgba(0,0,0,0.3)', padding: 30, borderRadius: 16, marginBottom: 20 }}>
              <div style={{ fontSize: 56, fontWeight: 'bold', color: '#fbbf24' }}>{score}/{questions.length}</div>
              <div style={{ fontSize: 20, opacity: 0.9, marginTop: 8 }}>{pct}% đúng</div>
              <div style={{ marginTop: 16, fontSize: 16, opacity: 0.85 }}>Kỷ lục: {Math.max(highScore, score)}/{questions.length}</div>
            </div>
            <button onClick={() => { window.location.reload(); }} style={{ background: color, color: 'white', border: 'none', padding: '14px 28px', fontSize: 18, borderRadius: 12, cursor: 'pointer', margin: 6, fontWeight: 'bold' }}>Chơi lại</button>
            <button onClick={onExit} style={{ background: '#475569', color: 'white', border: 'none', padding: '14px 28px', fontSize: 18, borderRadius: 12, cursor: 'pointer', margin: 6, fontWeight: 'bold' }}>Về Hub</button>
          </div>
        );
      }

      const q = questions[idx];
      return (
        <div style={{ padding: 20, maxWidth: 700, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
            <button onClick={onExit} style={{ background: 'rgba(0,0,0,0.35)', color: 'white', border: 'none', padding: '8px 14px', borderRadius: 10, cursor: 'pointer', fontSize: 14 }}>← Hub</button>
            <div style={{ fontSize: 14, opacity: 0.9 }}>Câu {idx + 1}/{questions.length}</div>
            <div style={{ fontSize: 14, background: 'rgba(0,0,0,0.3)', padding: '6px 12px', borderRadius: 10 }}>⭐ {score}</div>
          </div>

          <div style={{ textAlign: 'center', marginBottom: 20 }}>
            <div style={{ fontSize: 48 }}>{icon}</div>
            <h2 style={{ fontSize: 20, marginTop: 6 }}>{title}</h2>
          </div>

          <div style={{ background: 'rgba(0,0,0,0.3)', padding: 22, borderRadius: 14, marginBottom: 16 }}>
            <div style={{ fontSize: 18, lineHeight: 1.5, fontWeight: 500 }}>{q.q}</div>
          </div>

          <div style={{ display: 'grid', gap: 10 }}>
            {q.a.map((opt, i) => {
              let bg = 'rgba(255,255,255,0.12)';
              if (showResult) {
                if (i === q.c) bg = '#16a34a';
                else if (i === selected) bg = '#dc2626';
              } else if (selected === i) {
                bg = color;
              }
              return (
                <button key={i} onClick={() => handleAnswer(i)} disabled={showResult}
                  style={{ background: bg, color: 'white', border: '2px solid rgba(255,255,255,0.25)', padding: '14px 18px', borderRadius: 12, fontSize: 16, cursor: showResult ? 'default' : 'pointer', textAlign: 'left', fontWeight: 500 }}>
                  {String.fromCharCode(65 + i)}. {opt}
                </button>
              );
            })}
          </div>

          {showResult && (
            <button onClick={next} style={{ background: '#fbbf24', color: '#1f2937', border: 'none', padding: '14px', borderRadius: 12, fontSize: 18, fontWeight: 'bold', cursor: 'pointer', width: '100%', marginTop: 16 }}>
              {idx + 1 >= questions.length ? 'Xem kết quả' : 'Câu tiếp theo →'}
            </button>
          )}
        </div>
      );
    }

    function Hub({ onPick }) {
      const progress = loadProgress();
      return (
        <div style={{ padding: 20, maxWidth: 900, margin: '0 auto' }}>
          <div style={{ display: 'flex', alignItems: 'center', marginBottom: 20 }}>
            <a href="../index.html" style={{ background: 'rgba(0,0,0,0.35)', color: 'white', textDecoration: 'none', padding: '8px 14px', borderRadius: 10, fontSize: 14 }}>← Trang chủ</a>
          </div>

          <div style={{ textAlign: 'center', marginBottom: 26 }}>
            <div style={{ fontSize: 64 }}>📜</div>
            <h1 style={{ fontSize: 32, fontWeight: 'bold' }}>Lịch Sử</h1>
            <p style={{ opacity: 0.85, marginTop: 6 }}>10 trò chơi học lịch sử Việt Nam và thế giới</p>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 14 }}>
            {GAMES.map(g => {
              const hs = progress[g.id] || 0;
              return (
                <button key={g.id} onClick={() => onPick(g.id)}
                  style={{ background: g.color, color: 'white', border: 'none', padding: 18, borderRadius: 16, cursor: 'pointer', textAlign: 'left', boxShadow: '0 4px 14px rgba(0,0,0,0.25)' }}>
                  <div style={{ fontSize: 40, marginBottom: 6 }}>{g.icon}</div>
                  <div style={{ fontSize: 17, fontWeight: 'bold', marginBottom: 4 }}>{g.title}</div>
                  <div style={{ fontSize: 12, opacity: 0.9, marginBottom: 8 }}>{g.desc}</div>
                  {hs > 0 && <div style={{ fontSize: 12, background: 'rgba(0,0,0,0.3)', padding: '3px 8px', borderRadius: 8, display: 'inline-block' }}>🏆 {hs}</div>}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [route, setRoute] = useState(window.location.hash.replace('#', ''));
      useEffect(() => {
        const onHash = () => setRoute(window.location.hash.replace('#', ''));
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const pick = (id) => { window.location.hash = id; };
      const exit = () => { window.location.hash = ''; };

      const game = GAMES.find(g => g.id === route);
      if (game) {
        return <Quiz gameId={game.id} title={game.title} icon={game.icon} color={game.color} onExit={exit} />;
      }
      return <Hub onPick={pick} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
