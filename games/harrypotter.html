          { num: 2, title: 'Vết sẹo', summary: 'Harry thức giấc với vết sẹo đau nhói sau cơn ác mộng về Voldemort và một đầy tớ. Cậu gửi cú đêm báo cho Sirius về cơn đau kỳ lạ này.' },
          { num: 3, title: 'Lời mời', summary: 'Gia đình Weasley viết thư mời Harry đi xem Cúp Quidditch Thế Giới. Nhà Dursley miễn cưỡng đồng ý sau khi đọc bức thư kỳ quặc của bà Weasley.' },
          { num: 4, title: 'Trở lại Cái Hang', summary: 'Nhà Weasley dùng bột Floo để đến đón Harry từ lò sưởi bị chặn. Anh Fred và George nghịch kẹo Cao Su Biến Lưỡi khiến Dudley bị hại dở.' },
          { num: 5, title: 'Phép thuật và mũi tên', summary: 'Harry về đến Cái Hang gặp lại gia đình đông đúc nhà Weasley. Anh Bill đi làm ở Ai Cập và anh Charlie nghiên cứu rồng ở Romania cũng trở về xem Quidditch.' },
          { num: 6, title: 'Chiếc Cổng Di Chuyển', summary: 'Cả nhà thức dậy từ rạng sáng đi bộ đến đồi để dùng Cổng Di Chuyển. Họ gặp gia đình Diggory với cậu bé Cedric đẹp trai trên đường đi.' },
          { num: 7, title: 'Bagman và Crouch', summary: 'Trong khu cắm trại Cúp thế giới, Harry gặp Ludo Bagman và Barty Crouch của Bộ. Ông Weasley giới thiệu những người bạn đồng nghiệp và cảnh báo về tin đồn kỳ lạ.' },
          { num: 8, title: 'Trận chung kết Cúp Quidditch', summary: 'Ireland thắng Bulgaria trong trận chung kết gay cấn dù Krum bắt được Snitch. Harry được chứng kiến những tinh linh Veela và cầu thủ đẳng cấp thế giới.' },
          { num: 9, title: 'Dấu Hiệu Hắc Ám', summary: 'Sau trận đấu, một nhóm Tử Thần Thực Tử tấn công khu cắm trại đốt phá. Dấu Hiệu Hắc Ám xuất hiện trên trời khiến ai cũng hoảng loạn sau mười ba năm yên bình.' },
          { num: 10, title: 'Scandal ở Bộ Pháp Thuật', summary: 'Báo Nhật Báo Tiên Tri đăng bài chỉ trích cách Bộ xử lý vụ tấn công. Gia đình Weasley trở về Cái Hang chuẩn bị cho năm học mới đầy biến động.' },
          { num: 11, title: 'Trên tàu tốc hành Hogwarts', summary: 'Trên đường đến trường, Malfoy ám chỉ điều gì đó thú vị sẽ xảy ra tại Hogwarts năm nay. Cậu ta chê cười rằng cha Draco biết thông tin mà người khác không hay.' },
          { num: 12, title: 'Giải đấu Tam Pháp thuật', summary: 'Thầy Dumbledore thông báo Hogwarts sẽ tổ chức Giải đấu Tam Pháp thuật sau vài trăm năm gián đoạn. Ba trường sẽ cử đại diện tranh tài qua ba vòng thử thách nguy hiểm.' },
          { num: 13, title: 'Mắt Điên Moody', summary: 'Giáo viên mới môn Phòng Chống Nghệ Thuật Hắc Ám tên Alastor "Mắt Điên" Moody xuất hiện. Ông biểu diễn ba lời nguyền không thể tha thứ lên con nhện trước mặt học sinh.' },
          { num: 14, title: 'Ba lời nguyền không tha thứ', summary: 'Moody dạy về ba lời nguyền Imperius, Crucio và Avada Kedavra. Ông thử phép Imperius lên từng học sinh để dạy cách kháng cự lời nguyền điều khiển tâm trí.' },
          { num: 15, title: 'Beauxbatons và Durmstrang', summary: 'Hai trường khách mời đến Hogwarts: Beauxbatons đến bằng xe ngựa bay, còn Durmstrang đến bằng thuyền nổi từ dưới hồ. Hiệu trưởng Karkaroff và Madame Maxime được chào đón.' },
          { num: 16, title: 'Chiếc Cốc Lửa', summary: 'Chiếc Cốc Lửa cổ được đặt giữa đại sảnh để chọn ba đấu sĩ. Chỉ học sinh trên mười bảy tuổi mới được phép ghi tên vào vòng lửa.' },
          { num: 17, title: 'Bốn đấu sĩ', summary: 'Cốc Lửa chọn Krum, Fleur, Cedric và bất ngờ thêm cả Harry làm đấu sĩ thứ tư. Dù Harry khẳng định không ghi tên, hợp đồng phép thuật ràng buộc cậu phải thi đấu.' },
          { num: 18, title: 'Cân đo đũa phép', summary: 'Ký giả Rita Skeeter viết bài xuyên tạc về Harry cho Nhật Báo Tiên Tri. Bốn đấu sĩ được kiểm tra đũa phép trước khi thi đấu chính thức.' },
          { num: 19, title: 'Rồng Đuôi Gai Hungary', summary: 'Hagrid lén dẫn Harry đi xem rồng - sinh vật của thử thách đầu tiên. Harry nhận được con Rồng Đuôi Gai Hungary hung dữ nhất trong bốn con rồng.' },
          { num: 20, title: 'Thử thách thứ nhất', summary: 'Harry dùng thần chú Triệu Hồi để gọi cây chổi Tia Chớp từ trường đến giúp. Cậu bay lượn né rồng và lấy được quả trứng vàng nhanh nhất so với ba đối thủ.' },
          { num: 21, title: 'Mặt trận giải phóng gia tinh', summary: 'Hermione phát động phong trào S.P.E.W. đòi quyền lợi cho gia tinh. Cô phẫn nộ khi biết nhà bếp Hogwarts sử dụng hàng trăm gia tinh làm việc không lương.' },
          { num: 22, title: 'Rắc rối bất ngờ', summary: 'Harry và Ron hòa giải sau thời gian cãi nhau vì chuyện giải đấu. Ron thừa nhận mình đã ghen tị và xin lỗi bạn thân khi biết sự thật.' },
          { num: 23, title: 'Vũ hội Giáng sinh', summary: 'Vũ hội Giáng sinh được tổ chức với bốn đấu sĩ và bạn nhảy mở màn. Harry bất ngờ khi thấy Hermione biến hóa xinh đẹp đi cùng Viktor Krum.' },
          { num: 24, title: 'Tiết lộ của Rita Skeeter', summary: 'Rita Skeeter đăng bài đâm chọc Hagrid là người khổng lồ lai gây náo loạn. Hagrid bị tổn thương nặng nề và suýt nghỉ dạy vì áp lực dư luận.' },
          { num: 25, title: 'Quả trứng và con mắt', summary: 'Với gợi ý của Cedric, Harry mở quả trứng dưới nước trong nhà tắm các đấu sĩ. Tấm bản đồ Đạo Tặc cho thấy Barty Crouch đang đi lang thang trong đêm một cách đáng ngờ.' },
          { num: 26, title: 'Thử thách thứ hai', summary: 'Harry dùng cỏ nước nhân ngư để thở dưới nước suốt một giờ trong hồ. Cậu cứu cả Ron và em gái Fleur về an toàn sau khi hết thời gian nhưng chỉ xếp hạng tư.' },
          { num: 27, title: 'Trở lại của Padfoot', summary: 'Sirius bí mật đến Hogsmeade dưới dạng chó đen gặp bộ ba trong hang. Ông cảnh báo về những bất thường liên quan đến Bộ Pháp Thuật và Crouch.' },
          { num: 28, title: 'Sự điên loạn của ông Crouch', summary: 'Harry và Viktor tình cờ gặp ông Crouch hóa điên trong Rừng Cấm. Khi Harry chạy đi báo Dumbledore, Crouch biến mất không dấu vết.' },
          { num: 29, title: 'Giấc mơ', summary: 'Harry chợp mắt trong lớp Tiên Tri và thấy Voldemort trừng phạt Wormtail. Vết sẹo đau nhói mạnh khiến cậu kể cho Dumbledore và dùng Tưởng Ký xem ký ức cũ.' },
          { num: 30, title: 'Chậu Tưởng Ký', summary: 'Harry lén nhìn vào Chậu Tưởng Ký và thấy phiên tòa cũ của các Tử Thần Thực Tử. Cậu chứng kiến Barty Crouch Jr. bị chính cha mình tống vào Azkaban.' },
          { num: 31, title: 'Thử thách thứ ba', summary: 'Mê cung bí ẩn được dựng lên cho thử thách cuối cùng. Bốn đấu sĩ phải vượt qua sinh vật và bẫy phép để chạm vào Cúp Tam Pháp thuật ở trung tâm.' },
          { num: 32, title: 'Xương, thịt và máu', summary: 'Cúp hóa ra là Cổng Di Chuyển đưa Harry và Cedric đến nghĩa trang. Wormtail giết Cedric một cách lạnh lùng rồi thực hiện nghi lễ hồi sinh Voldemort.' },
          { num: 33, title: 'Các Tử thần Thực tử', summary: 'Voldemort triệu hồi các Tử Thần Thực Tử trung thành đến quỳ dưới chân hắn. Hắn kể lại câu chuyện thất bại mười ba năm trước và chế giễu những kẻ đã bỏ rơi hắn.' },
          { num: 34, title: 'Tiên Cao Thủ', summary: 'Harry đối đầu Voldemort trong trận đấu đũa phép một chọi một. Hai cây đũa cùng lõi lông phượng hoàng tạo hiệu ứng Priori Incantatem làm các bóng ma xuất hiện.' },
          { num: 35, title: 'Huyết thanh Sự thật', summary: 'Ai đó giả Moody lôi Harry đi khi cậu vừa trở về trường. Dumbledore kịp thời phát hiện và dùng Huyết thanh Sự thật ép kẻ giả mạo thú tội.' },
          { num: 36, title: 'Con đường chia ly', summary: 'Kẻ giả Moody thực chất là Barty Crouch Jr. đã trốn tù và thế chỗ Moody thật. Fudge từ chối tin Voldemort đã trở lại và còn để Giám Ngục giết Crouch Jr. trước khi bị xét xử.' },
          { num: 37, title: 'Khởi đầu', summary: 'Dumbledore tập hợp các đồng minh cũ để chuẩn bị cho cuộc chiến sắp tới. Harry về lại Privet Drive với tâm trạng nặng nề vì Cedric đã hy sinh và Voldemort đã trở về.' }
        ]

        summary: 'Harry gia nhập Hội Phượng Hoàng và chống lại Bộ Pháp Thuật đang phủ nhận sự trở lại của Voldemort.',
        chapters: [
          { num: 1, title: 'Dudley bị tấn công', summary: 'Hai Giám Ngục tấn công Harry và Dudley trong một con hẻm Privet Drive. Harry dùng phép Patronus để tự vệ nhưng bị Bộ Pháp Thuật đe dọa trục xuất khỏi Hogwarts.' },
          { num: 2, title: 'Bầy cú bay lạc', summary: 'Hàng loạt cú mang thư đến nhà số 4 khuyên Harry đừng rời đi. Dượng Vernon nhốt gia đình lại vì hoảng sợ khi nghe câu chuyện về Giám Ngục.' },
          { num: 3, title: 'Đội Hậu vệ Tiền trạm', summary: 'Một nhóm pháp sư lạ mặt đến đón Harry trên cây chổi bay đi. Họ bay qua London và đưa cậu đến một địa chỉ bí ẩn mà người thường không thể thấy được.' },
          { num: 4, title: 'Số 12 quảng trường Grimmauld', summary: 'Harry đến nhà cũ của gia đình Black - trụ sở bí mật của Hội Phượng Hoàng. Cậu gặp lại Sirius và bà mẹ vợ hay la hét trong bức chân dung.' },
          { num: 5, title: 'Hội Phượng Hoàng', summary: 'Harry tức giận khi mọi người giấu thông tin về Voldemort với cậu. Ron và Hermione giải thích mẹ Weasley muốn bảo vệ những người trẻ khỏi sự thật đáng sợ.' },
          { num: 6, title: 'Gia đình Black cao quý', summary: 'Bộ ba dọn dẹp ngôi nhà ma ám đầy dơ bẩn suốt nhiều năm bị bỏ hoang. Họ tìm thấy tấm thảm gia phả nhà Black với những tên bị xóa sổ vì phản bội dòng dõi.' },
          { num: 7, title: 'Bộ Pháp Thuật', summary: 'Harry đến Bộ Pháp Thuật để dự phiên tòa về việc dùng phép trước mặt Muggle. Dumbledore xuất hiện bào chữa và cậu được tha bổng nhờ chứng cứ Giám Ngục có thật.' },
          { num: 8, title: 'Phiên tòa', summary: 'Cả hội đồng Wizengamot xét xử Harry một cách khắc nghiệt bất thường. Fudge cố gắng buộc tội cậu nhưng Dumbledore lật ngược tình thế nhờ lời khai của bà Figg.' },
          { num: 9, title: 'Chia tay và cú sốc', summary: 'Harry trở về nhà Sirius ăn mừng chiến thắng phiên tòa. Nhưng bầu không khí u ám khi Percy Weasley tuyệt giao với cha mẹ vì đứng về phía Bộ.' },
          { num: 10, title: 'Luna Lovegood', summary: 'Trên tàu đến Hogwarts, Ginny giới thiệu cô bạn Luna Lovegood kỳ quặc. Bộ ba cũng phát hiện Harry có thể nhìn thấy loài sinh vật Thestral kéo xe ngựa đến trường.' },
          { num: 11, title: 'Bài hát của Phân Mũ', summary: 'Mũ Phân Loại hát bài cảnh báo về sự chia rẽ giữa các nhà Hogwarts. Dolores Umbridge của Bộ được giới thiệu làm giáo viên Phòng Chống Nghệ Thuật Hắc Ám mới.' },
          { num: 12, title: 'Giáo sư Umbridge', summary: 'Umbridge bắt học sinh chỉ đọc sách mà không được thực hành phép. Harry cãi lại trong lớp khi bà phủ nhận Voldemort trở lại và bị phạt ở lại sau giờ.' },
          { num: 13, title: 'Sự trừng phạt của Umbridge', summary: 'Umbridge bắt Harry viết câu "Tôi không được nói dối" bằng chiếc bút đặc biệt. Mỗi chữ viết ra lại khắc vết thương chảy máu lên chính mu bàn tay cậu.' },
          { num: 14, title: 'Percy và Padfoot', summary: 'Percy viết thư khuyên Ron tránh xa Harry kẻo liên lụy công việc tương lai. Sirius liên lạc qua lò sưởi và kể về những hoạt động của Hội.' },
          { num: 15, title: 'Tổng Thanh Tra Hogwarts', summary: 'Bộ Pháp Thuật phong Umbridge làm Tổng Thanh Tra giám sát toàn bộ giáo viên. Bà bắt đầu đuổi việc những giáo viên không theo quan điểm của Bộ.' },
          { num: 16, title: 'Ở Đầu Lợn', summary: 'Hermione tập hợp học sinh phản kháng tại quán Đầu Lợn ở Hogsmeade. Cả nhóm đồng ý thành lập câu lạc bộ tự học phòng chống hắc ám với Harry làm thầy.' },
          { num: 17, title: 'Sắc Lệnh Giáo Dục Số 24', summary: 'Umbridge ra sắc lệnh cấm mọi tổ chức học sinh chưa được phép. Nhóm Harry quyết định hoạt động bí mật dưới tên "Quân Đoàn Dumbledore".' },
          { num: 18, title: 'Quân Đoàn Dumbledore', summary: 'Dobby chỉ cho Harry căn Phòng Điều Ước hoàn hảo cho việc tập luyện. Các thành viên QĐD bí mật học phép thuật dưới sự dẫn dắt của Harry mỗi tuần.' },
          { num: 19, title: 'Sư tử và rắn', summary: 'Gryffindor thắng trận Quidditch đầu tiên nhưng Harry bị cấm thi đấu suốt đời. Umbridge cấm cậu và anh em sinh đôi Weasley chơi chổi vĩnh viễn.' },
          { num: 20, title: 'Câu chuyện của Hagrid', summary: 'Hagrid trở về sau chuyến đi bí mật với khuôn mặt đầy vết thương. Ông kể lại chuyến đi tìm những người khổng lồ cùng Madame Maxime để kết minh.' },
          { num: 21, title: 'Con rắn trong giấc mơ', summary: 'Harry mơ thấy mình là con rắn lớn tấn công ông Weasley trong Bộ. Cậu báo Dumbledore và ông Weasley được cứu kịp thời khỏi vũng máu.' },
          { num: 22, title: 'Bệnh viện St. Mungo', summary: 'Bộ ba đến thăm ông Weasley ở bệnh viện phù thủy St. Mungo. Họ tình cờ gặp vợ chồng cha mẹ Neville - những pháp sư bị tra tấn đến mất trí.' },
          { num: 23, title: 'Kỳ nghỉ Giáng sinh', summary: 'Cả gia đình Weasley và Harry nghỉ lễ tại nhà Sirius. Sirius cảm thấy mình bị nhốt và uống rượu nhiều, tâm trạng buồn bã vì không được ra ngoài chiến đấu.' },
          { num: 24, title: 'Occlumency', summary: 'Dumbledore yêu cầu Snape dạy Harry môn Occlumency để chống Voldemort đột nhập tâm trí. Các buổi học căng thẳng vì Harry ghét Snape và không thể tập trung.' },
          { num: 25, title: 'Con bọ bị dồn vào chân tường', summary: 'Hermione dùng con bọ Rita Skeeter để ép bà viết bài phỏng vấn Harry. Tạp chí The Quibbler của cha Luna đăng bài kể thật về đêm Voldemort trở lại.' },
          { num: 26, title: 'Quá khứ và tương lai', summary: 'Giáo sư Trelawney bị Umbridge sa thải công khai giữa sân trường. Dumbledore phản đối và mời Firenze nhân mã thay thế dạy Tiên Tri.' },
          { num: 27, title: 'Con bán nhân', summary: 'Firenze dạy Tiên Tri theo cách hoàn toàn khác - qua các vì sao. Umbridge cấm mọi tiếp xúc giữa học sinh và giáo viên không thuần máu.' },
          { num: 28, title: 'Ký ức tồi tệ nhất của Snape', summary: 'Harry lén nhìn vào chậu Tưởng Ký của Snape khi thầy rời phòng. Cậu thấy ký ức cha mình James ngày xưa đã bắt nạt Snape một cách tàn nhẫn.' },
          { num: 29, title: 'Tư vấn nghề nghiệp', summary: 'Bộ ba gặp các giáo viên để lên kế hoạch nghề nghiệp tương lai. Harry muốn làm Thần Sáng và McGonagall kiên quyết ủng hộ dù Umbridge phản đối.' },
          { num: 30, title: 'Grawp', summary: 'Hagrid tiết lộ bí mật: ông giấu em trai khổng lồ Grawp trong Rừng Cấm. Ông nhờ Harry và Hermione chăm sóc Grawp nếu mình bị đuổi khỏi trường.' },

              fontSize: 15, fontWeight: 700, marginBottom: 12
            }}>{isRead ? '✓ Đã đọc' : 'Đánh dấu đã đọc'}</button>

            <div style={{ display: 'flex', gap: 10 }}>
              <button disabled={!hasPrev} onClick={() => onNav(-1)} style={{
                flex: 1, background: hasPrev ? 'rgba(251,191,36,0.15)' : 'rgba(100,100,100,0.15)',
                border: '1px solid rgba(251,191,36,0.3)',
                color: hasPrev ? '#fbbf24' : '#64748b',
                padding: 12, borderRadius: 10, cursor: hasPrev ? 'pointer' : 'not-allowed',
                fontSize: 14, fontWeight: 600
              }}>← Chương trước</button>
              <button disabled={!hasNext} onClick={() => onNav(1)} style={{
                flex: 1, background: hasNext ? 'rgba(251,191,36,0.15)' : 'rgba(100,100,100,0.15)',
                border: '1px solid rgba(251,191,36,0.3)',
                color: hasNext ? '#fbbf24' : '#64748b',
                padding: 12, borderRadius: 10, cursor: hasNext ? 'pointer' : 'not-allowed',
                fontSize: 14, fontWeight: 600
              }}>Chương tiếp →</button>
            </div>
          </div>
        </div>
      );
    }

    function QuizView({ book, onBack, onFinish }) {
      const questions = QUIZZES[book.id];
      const [idx, setIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [score, setScore] = useState(0);
      const [done, setDone] = useState(false);

      if (done) {
        const pct = Math.round(score / questions.length * 100);
        const stars = pct >= 90 ? 3 : pct >= 65 ? 2 : pct >= 40 ? 1 : 0;
        return (
          <div>
            <Header title="Kết quả Quiz" onBack={onBack} />
            <div style={{ maxWidth: 500, margin: '40px auto', padding: '0 16px', textAlign: 'center' }}>
              <div style={{ fontSize: 80, marginBottom: 16 }}>{stars === 3 ? '🏆' : stars === 2 ? '🥈' : stars === 1 ? '🥉' : '📚'}</div>
              <h2 style={{ color: '#fbbf24', fontSize: 28, marginBottom: 8 }}>{score}/{questions.length}</h2>
              <p style={{ color: '#cbd5e1', marginBottom: 12 }}>{pct}% chính xác</p>
              <div style={{ fontSize: 40, marginBottom: 20 }}>
                {'⭐'.repeat(stars)}{'☆'.repeat(3-stars)}
              </div>
              <p style={{ color: '#e2e8f0', marginBottom: 24 }}>
                {stars === 3 ? 'Xuất sắc! Bạn là fan cuồng Harry Potter!' :
                 stars === 2 ? 'Rất tốt! Kiến thức vững chắc.' :
                 stars === 1 ? 'Ổn rồi! Hãy đọc thêm nhé.' : 'Cố gắng hơn nhé, hãy ôn lại sách!'}
              </p>
              <button onClick={() => onFinish(stars)} style={{
                background: 'linear-gradient(135deg, #fbbf24, #f59e0b)',
                color: '#1a0a3a', border: 'none',
                padding: '14px 32px', borderRadius: 12, cursor: 'pointer',
                fontSize: 15, fontWeight: 700
              }}>Hoàn thành</button>
            </div>
          </div>
        );
      }

      const q = questions[idx];
      const answered = selected !== null;

      return (
        <div>
          <Header title={`Quiz ${book.title}`} onBack={onBack} subtitle={`Câu ${idx+1}/${questions.length}`} />
          <div style={{ maxWidth: 600, margin: '0 auto', padding: '0 16px 40px' }}>
            <div style={{
              background: 'rgba(0,0,0,0.3)', borderRadius: 6, height: 6, overflow: 'hidden', marginBottom: 20
            }}>
              <div style={{
                width: `${(idx/questions.length)*100}%`, height: '100%',
                background: 'linear-gradient(90deg, #fbbf24, #f59e0b)',
                transition: 'width 0.3s'
              }} />
            </div>

            <div style={{
              background: 'rgba(76,29,149,0.3)',
              border: '1px solid rgba(251,191,36,0.3)',
              borderRadius: 16, padding: 20, marginBottom: 16
            }}>
              <h3 style={{ color: '#fbbf24', fontSize: 18, lineHeight: 1.5 }}>{q.q}</h3>
            </div>

            <div style={{ display: 'grid', gap: 10, marginBottom: 16 }}>
              {q.a.map((ans, i) => {
                let bg = 'rgba(76,29,149,0.25)';
                let border = 'rgba(251,191,36,0.2)';
                if (answered) {
                  if (i === q.correct) { bg = 'rgba(34,197,94,0.3)'; border = 'rgba(34,197,94,0.6)'; }
                  else if (i === selected) { bg = 'rgba(239,68,68,0.3)'; border = 'rgba(239,68,68,0.6)'; }
                }
                return (
                  <button key={i} onClick={() => {
                    if (answered) return;
                    setSelected(i);
                    if (i === q.correct) setScore(s => s + 1);
                  }} disabled={answered} style={{
                    background: bg,
                    border: `1px solid ${border}`,
                    color: '#e2e8f0', padding: '14px 16px', borderRadius: 10,
                    cursor: answered ? 'default' : 'pointer',
                    textAlign: 'left', fontSize: 14
                  }}>{String.fromCharCode(65+i)}. {ans}</button>
                );
              })}
            </div>

            {answered && (
              <div>
                <div style={{
                  textAlign: 'center', padding: 12, marginBottom: 12,
                  background: selected === q.correct ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)',
                  border: `1px solid ${selected === q.correct ? 'rgba(34,197,94,0.5)' : 'rgba(239,68,68,0.5)'}`,
                  borderRadius: 10, fontSize: 16, fontWeight: 700,
                  color: selected === q.correct ? '#86efac' : '#fca5a5'
                }}>{selected === q.correct ? '✓ Đúng!' : '✗ Sai!'}</div>
                <button onClick={() => {
                  if (idx < questions.length - 1) { setIdx(i => i+1); setSelected(null); }
                  else { setDone(true); }
                }} style={{
                  width: '100%',
                  background: 'linear-gradient(135deg, #fbbf24, #f59e0b)',
                  color: '#1a0a3a', border: 'none',
                  padding: 14, borderRadius: 10, cursor: 'pointer',
                  fontSize: 15, fontWeight: 700
                }}>{idx < questions.length - 1 ? 'Câu tiếp →' : 'Xem kết quả'}</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========== MAIN APP ==========
    function App() {
      const [progress, setProgress] = useState(loadProgress());
      const [screen, setScreen] = useState('home'); // home, book, chapter, quiz
      const [currentBook, setCurrentBook] = useState(null);
      const [currentChapter, setCurrentChapter] = useState(null);

      useEffect(() => { saveProgress(progress); }, [progress]);

      const markRead = (key) => {
        setProgress(p => ({ ...p, read: { ...p.read, [key]: !p.read[key] } }));
      };

      const navChapter = (dir) => {
        const newNum = currentChapter.num + dir;
        const newCh = currentBook.chapters.find(c => c.num === newNum);
        if (newCh) setCurrentChapter(newCh);
      };

      const finishQuiz = (stars) => {
        setProgress(p => ({
          ...p,
          quizzes: { ...p.quizzes, [currentBook.id]: Math.max(p.quizzes[currentBook.id] || 0, stars) }
        }));
        setScreen('book');
      };

      if (screen === 'home') {
        return <Home progress={progress} onSelectBook={b => { setCurrentBook(b); setScreen('book'); }} />;
      }
      if (screen === 'book') {
        return <BookView
          book={currentBook}
          progress={progress}
          onBack={() => setScreen('home')}
          onSelectChapter={ch => { setCurrentChapter(ch); setScreen('chapter'); }}
          onStartQuiz={() => setScreen('quiz')}
        />;
      }
      if (screen === 'chapter') {
        return <ChapterView
          book={currentBook}
          chapter={currentChapter}
          progress={progress}
          onBack={() => setScreen('book')}
          onMarkRead={markRead}
          onNav={navChapter}
        />;
      }
      if (screen === 'quiz') {
        return <QuizView book={currentBook} onBack={() => setScreen('book')} onFinish={finishQuiz} />;
      }

      // Fallback: go home with back button to game hub
      return <Home progress={progress} onSelectBook={b => { setCurrentBook(b); setScreen('book'); }} />;
    }

    // Home screen needs back-to-hub button too
    const originalHome = Home;

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
