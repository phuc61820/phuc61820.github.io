      const high = loadProgress()[id] || 0;

      useEffect(() => {
        const qs = shuffle(bank).slice(0, Math.min(10, bank.length)).map(q => {
          const correctAnswer = q.a[q.c];
          const shuffledAnswers = shuffle(q.a);
          return { q: q.q, a: shuffledAnswers, c: shuffledAnswers.indexOf(correctAnswer) };
        });
        setQuestions(qs);
      }, []);

      const pick = (i) => {
        if (selected !== null) return;
        setSelected(i);
        const correct = i === questions[idx].c;
        const newScore = correct ? score + 1 : score;
        if (correct) setScore(newScore);
        setTimeout(() => {
          if (idx + 1 >= questions.length) {
            const nh = saveHigh(id, newScore);
            setIsNewHigh(nh);
            setDone(true);
          } else {
            setIdx(idx + 1);
            setSelected(null);
          }
        }, 900);
      };

      const restart = () => {
        const qs = shuffle(bank).slice(0, Math.min(10, bank.length)).map(q => {
          const correctAnswer = q.a[q.c];
          const shuffledAnswers = shuffle(q.a);
          return { q: q.q, a: shuffledAnswers, c: shuffledAnswers.indexOf(correctAnswer) };
        });
        setQuestions(qs);
        setIdx(0); setScore(0); setSelected(null); setDone(false); setIsNewHigh(false);
      };

      if (!questions.length) return <div style={{ padding: 40, textAlign: 'center' }}>Đang tải...</div>;

      if (done) {
        return (
          <div style={{ maxWidth: 700, margin: '0 auto', padding: 24, textAlign: 'center' }}>
            <button onClick={onBack} style={{ background: 'rgba(255,255,255,0.15)', border: 'none', color: 'white', padding: '10px 18px', borderRadius: 10, cursor: 'pointer', fontSize: 15, marginBottom: 20 }}>← Hub</button>
            <div style={{ fontSize: 80, marginBottom: 16 }}>{meta.icon}</div>
            <h1 style={{ fontSize: 32, marginBottom: 12 }}>Hoàn thành!</h1>
            <div style={{ fontSize: 54, fontWeight: 'bold', color: meta.color, margin: '20px 0' }}>{score}/{questions.length}</div>
            {isNewHigh && <div style={{ fontSize: 20, color: '#fde047', marginBottom: 12 }}>🏆 Kỷ lục mới!</div>}
            <div style={{ fontSize: 16, opacity: 0.8, marginBottom: 28 }}>Cao nhất: {Math.max(high, score)}/{questions.length}</div>
            <button onClick={restart} style={{ background: meta.color, border: 'none', color: 'white', padding: '14px 30px', borderRadius: 12, cursor: 'pointer', fontSize: 17, fontWeight: 600, marginRight: 10 }}>Chơi lại</button>
            <button onClick={onBack} style={{ background: 'rgba(255,255,255,0.2)', border: 'none', color: 'white', padding: '14px 30px', borderRadius: 12, cursor: 'pointer', fontSize: 17, fontWeight: 600 }}>Về hub</button>
          </div>
        );
      }

      const Q = questions[idx];
      return (
        <div style={{ maxWidth: 750, margin: '0 auto', padding: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <button onClick={onBack} style={{ background: 'rgba(255,255,255,0.15)', border: 'none', color: 'white', padding: '10px 18px', borderRadius: 10, cursor: 'pointer', fontSize: 15 }}>← Hub</button>
            <div style={{ fontSize: 15, opacity: 0.85 }}>Câu {idx + 1}/{questions.length} · Điểm: {score}</div>
          </div>

          <div style={{ height: 6, background: 'rgba(255,255,255,0.15)', borderRadius: 10, overflow: 'hidden', marginBottom: 22 }}>
            <div style={{ height: '100%', width: `${(idx / questions.length) * 100}%`, background: meta.color, transition: 'width 0.3s' }}></div>
          </div>

          <div style={{ background: 'rgba(255,255,255,0.08)', borderRadius: 18, padding: 28, marginBottom: 18 }}>
            <div style={{ fontSize: 42, textAlign: 'center', marginBottom: 14 }}>{meta.icon}</div>
            <div style={{ fontSize: 22, textAlign: 'center', lineHeight: 1.5, fontWeight: 500 }}>{Q.q}</div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            {Q.a.map((ans, i) => {
              let bg = 'rgba(255,255,255,0.12)';
              if (selected !== null) {
                if (i === Q.c) bg = '#22c55e';
                else if (i === selected) bg = '#ef4444';
                else bg = 'rgba(255,255,255,0.06)';
              }
              return (
                <button key={i} onClick={() => pick(i)} disabled={selected !== null} style={{ background: bg, border: 'none', color: 'white', padding: '18px 14px', borderRadius: 12, cursor: selected === null ? 'pointer' : 'default', fontSize: 16, fontWeight: 500, minHeight: 60, lineHeight: 1.4 }}>{ans}</button>
              );
            })}
          </div>
        </div>
      );
    };

    // ==================== HUB ====================
    const Hub = ({ onPick }) => {
      const progress = loadProgress();
      return (
        <div style={{ maxWidth: 960, margin: '0 auto', padding: 24 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 28, flexWrap: 'wrap', gap: 12 }}>
            <a href="../index.html" style={{ background: 'rgba(255,255,255,0.15)', color: 'white', padding: '10px 18px', borderRadius: 10, textDecoration: 'none', fontSize: 15 }}>← Về trang chính</a>
            <h1 style={{ fontSize: 30, textAlign: 'center', flex: 1, minWidth: 200 }}>❓ Đố Vui Hub</h1>
            <div style={{ width: 120 }}></div>
          </div>
          <p style={{ textAlign: 'center', opacity: 0.8, marginBottom: 26, fontSize: 15 }}>10 trò chơi đố vui — kiến thức tổng hợp</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 16 }}>
            {GAMES.map(g => (
              <button key={g.id} onClick={() => onPick(g.id)} style={{ background: g.color, border: 'none', color: 'white', padding: 20, borderRadius: 16, cursor: 'pointer', textAlign: 'left', minHeight: 170, display: 'flex', flexDirection: 'column', gap: 6 }}>
                <div style={{ fontSize: 42 }}>{g.icon}</div>
                <div style={{ fontSize: 18, fontWeight: 700 }}>{g.name}</div>
                <div style={{ fontSize: 13, opacity: 0.92, flex: 1 }}>{g.desc}</div>
                {progress[g.id] !== undefined && (
                  <div style={{ fontSize: 12, background: 'rgba(0,0,0,0.25)', padding: '4px 8px', borderRadius: 8, alignSelf: 'flex-start' }}>🏆 Cao nhất: {progress[g.id]}</div>
                )}
              </button>
            ))}
          </div>
        </div>
      );
    };

    const App = () => {
      const [route, setRoute] = useState(window.location.hash.slice(1));
      useEffect(() => {
        const onHash = () => setRoute(window.location.hash.slice(1));
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      const pick = (id) => { window.location.hash = id; };
      const back = () => { window.location.hash = ''; };
      const meta = GAMES.find(g => g.id === route);
      if (!meta) return <Hub onPick={pick} />;
      return <QuizGame id={route} meta={meta} onBack={back} />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
