<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bam Vat Bau - Game Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #0f0521, #1c1237, #2d1b5e);
      min-height: 100vh;
      overflow-x: hidden;
    }
    #root {
      min-height: 100vh;
    }
  </style>
  <script src="../js/theme.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Format number helper
    function fmt(n) {
      if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
      if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
      if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
      if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
      return Math.floor(n).toLocaleString();
    }

    // Objects that spawn in the game
    const OBJECTS = [
      { id:'stone',    name:'Đá Cuội',        icon:'🪨', rarity:'Thường',      value:1,        size:60,  spawnRate:600,   duration:3500, color:'#94a3b8', glow:'rgba(148,163,184,0.3)' },
      { id:'wood',     name:'Gỗ Mục',         icon:'🪵', rarity:'Thường',      value:2,        size:58,  spawnRate:700,   duration:3200, color:'#a16207', glow:'rgba(161,98,7,0.3)' },
      { id:'coin',     name:'Đồng Xu',        icon:'🪙', rarity:'Thường',      value:5,        size:55,  spawnRate:800,   duration:3000, color:'#ca8a04', glow:'rgba(202,138,4,0.3)' },
      { id:'shell',    name:'Vỏ Sò',          icon:'🐚', rarity:'Không Phổ Biến',value:15,    size:54,  spawnRate:1200,  duration:2800, color:'#0891b2', glow:'rgba(8,145,178,0.4)' },
      { id:'mushroom', name:'Nấm Thần',       icon:'🍄', rarity:'Không Phổ Biến',value:25,    size:55,  spawnRate:1400,  duration:2500, color:'#dc2626', glow:'rgba(220,38,38,0.4)' },
      { id:'crystal',  name:'Pha Lê',         icon:'🔮', rarity:'Hiếm',         value:80,      size:58,  spawnRate:2000,  duration:2200, color:'#9333ea', glow:'rgba(147,51,234,0.5)' },
      { id:'ruby',     name:'Hồng Ngọc',      icon:'♦️', rarity:'Hiếm',         value:150,     size:56,  spawnRate:2500,  duration:2000, color:'#e11d48', glow:'rgba(225,29,72,0.5)' },
      { id:'emerald',  name:'Ngọc Lục Bảo',   icon:'💚', rarity:'Hiếm',         value:200,     size:56,  spawnRate:3000,  duration:1800, color:'#16a34a', glow:'rgba(22,163,74,0.5)' },
      { id:'silver',   name:'Trứng Bạc',      icon:'🥈', rarity:'Siêu Hiếm',    value:500,     size:62,  spawnRate:4000,  duration:1600, color:'#94a3b8', glow:'rgba(148,163,184,0.6)' },
      { id:'gold',     name:'Trứng Vàng',     icon:'🥚', rarity:'Siêu Hiếm',    value:1500,    size:64,  spawnRate:5000,  duration:1400, color:'#eab308', glow:'rgba(234,179,8,0.7)' },
      { id:'dragon',   name:'Trứng Rồng',     icon:'🐉', rarity:'Huyền Thoại',  value:5000,    size:68,  spawnRate:7000,  duration:1200, color:'#f97316', glow:'rgba(249,115,22,0.7)' },
      { id:'diamond',  name:'Kim Cương',      icon:'💎', rarity:'Huyền Thoại',  value:15000,   size:66,  spawnRate:9000,  duration:1000, color:'#67e8f9', glow:'rgba(103,232,249,0.8)' },
      { id:'rainbow',  name:'Đá Cầu Vồng',   icon:'🌈', rarity:'Thần Thoại',   value:50000,   size:72,  spawnRate:12000, duration:800,  color:'#f0abfc', glow:'rgba(240,171,252,0.8)' },
      { id:'meteor',   name:'Thiên Thạch',    icon:'☄️', rarity:'Thần Thoại',   value:150000,  size:70,  spawnRate:18000, duration:700,  color:'#fbbf24', glow:'rgba(251,191,36,0.9)' },
      { id:'star',     name:'Sao Thần',       icon:'⭐', rarity:'Vũ Trụ',       value:500000,  size:74,  spawnRate:25000, duration:600,  color:'#fde68a', glow:'rgba(253,230,138,1.0)' },
      { id:'blackhole',name:'Hố Đen',         icon:'🌑', rarity:'Vũ Trụ',       value:2000000, size:70,  spawnRate:40000, duration:500,  color:'#6d28d9', glow:'rgba(109,40,217,1.0)' },
      { id:'omega',    name:'Viên Omega',     icon:'Ω',  rarity:'Tối Thượng',   value:9999999, size:78,  spawnRate:60000, duration:400,  color:'#ffffff', glow:'rgba(255,255,255,1.0)' },
    ];

    const RARITY_COLOR = {
      'Thường':'#94a3b8', 'Không Phổ Biến':'#22c55e', 'Hiếm':'#818cf8',
      'Siêu Hiếm':'#f59e0b', 'Huyền Thoại':'#f97316', 'Thần Thoại':'#f0abfc',
      'Vũ Trụ':'#67e8f9', 'Tối Thượng':'#ffffff',
    };

    function ClickerGame({ onBack }) {
      const [money, setMoney]         = useState(0);
      const [totalMoney, setTotalMoney] = useState(0);
      const [items, setItems]         = useState([]); // spawned objects on screen
      const [popups, setPopups]       = useState([]);
      const [stats, setStats]         = useState({}); // {id: {count, totalEarned}}
      const [multiplier, setMultiplier] = useState(1);
      const [upgrades, setUpgrades]   = useState({ clickMult:1, valueMult:1, timeExt:0 });
      const [showShop, setShowShop]   = useState(false);
      const [bestItem, setBestItem]   = useState(null);
      const itemId = useRef(0);
      const popupId = useRef(0);
      const containerRef = useRef(null);

      const UPGRADES_LIST = [
        { id:'click2',  name:'Tay Nhanh x2',    icon:'⚡', cost:500,      desc:'Nhân đôi tiền mỗi lần bấm',      apply: u => ({...u, valueMult: u.valueMult*2})  },
        { id:'click5',  name:'Tay Siêu x5',     icon:'🔥', cost:5000,     desc:'x5 tiền mỗi lần bấm',             apply: u => ({...u, valueMult: u.valueMult*5})  },
        { id:'time1',   name:'Thêm Thời Gian',  icon:'⏳', cost:2000,     desc:'Vật xuất hiện lâu hơn +50%',      apply: u => ({...u, timeExt: u.timeExt+0.5})   },
        { id:'time2',   name:'Đóng Băng Vật',   icon:'❄️', cost:20000,    desc:'Vật xuất hiện lâu hơn +100%',     apply: u => ({...u, timeExt: u.timeExt+1.0})   },
        { id:'click10', name:'Thần Thánh x10',  icon:'✨', cost:50000,    desc:'x10 tiền mỗi lần bấm',            apply: u => ({...u, valueMult: u.valueMult*10}) },
        { id:'click50', name:'Huyền Thoại x50', icon:'💜', cost:500000,   desc:'x50 tiền mỗi lần bấm',            apply: u => ({...u, valueMult: u.valueMult*50}) },
        { id:'time3',   name:'Dừng Thời Gian',  icon:'🌀', cost:200000,   desc:'Vật xuất hiện lâu hơn +200%',     apply: u => ({...u, timeExt: u.timeExt+2.0})   },
        { id:'mega',    name:'Omega Mult x1000',icon:'Ω',  cost:10000000, desc:'x1000 tiền mỗi lần bấm',          apply: u => ({...u, valueMult: u.valueMult*1000})},
      ];
      const [boughtUpgrades, setBoughtUpgrades] = useState([]);

      // Spawn objects
      useEffect(() => {
        const timers = OBJECTS.map(obj => {
          const spawn = () => {
            if (!containerRef.current) return;
            const cw = containerRef.current.offsetWidth  || 340;
            const ch = containerRef.current.offsetHeight || 420;
            const x = Math.random() * (cw - obj.size - 10) + 5;
            const y = Math.random() * (ch - obj.size - 10) + 5;
            const id = itemId.current++;
            const dur = Math.floor(obj.duration * (1 + upgrades.timeExt));
            setItems(prev => [...prev, { ...obj, iid: id, x, y, born: Date.now(), dur }]);
            setTimeout(() => {
              setItems(prev => prev.filter(it => it.iid !== id));
            }, dur);
          };
          spawn();
          const iv = setInterval(spawn, obj.spawnRate);
          return iv;
        });
        return () => timers.forEach(clearInterval);
      }, [upgrades.timeExt]);

      const clickItem = (e, item) => {
        e.stopPropagation();
        const earned = Math.floor(item.value * upgrades.valueMult);
        setMoney(m => m + earned);
        setTotalMoney(t => t + earned);
        setItems(prev => prev.filter(it => it.iid !== item.iid));
        // stat
        setStats(s => ({...s, [item.id]: { count:(s[item.id]?.count||0)+1, total:(s[item.id]?.total||0)+earned }}));
        if (!bestItem || item.value > (bestItem?.value||0)) setBestItem(item);
        // popup
        const pid = popupId.current++;
        const rect = e.currentTarget.getBoundingClientRect();
        const containerRect = containerRef.current.getBoundingClientRect();
        setPopups(p => [...p, { id:pid, x:rect.left-containerRect.left+item.size/2, y:rect.top-containerRect.top, earned, color:item.color, rarity:item.rarity }]);
        setTimeout(() => setPopups(p => p.filter(pp => pp.id !== pid)), 900);
      };

      const buyUpgrade = (upg) => {
        if (money < upg.cost || boughtUpgrades.includes(upg.id)) return;
        setMoney(m => m - upg.cost);
        setBoughtUpgrades(p => [...p, upg.id]);
        setUpgrades(u => upg.apply(u));
      };

      const rarityOrder = [...new Set(OBJECTS.map(o=>o.rarity))];

      return (
        <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f0521,#1c1237,#2d1b5e)',display:'flex',flexDirection:'column',padding:10,gap:8,maxWidth:480,margin:'0 auto'}}>
          {/* Header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
            <h3 style={{margin:0,color:'#c4b5fd',fontSize:14,fontWeight:900}}>🥚 Bam Vat Bau</h3>
            <button onClick={()=>setShowShop(s=>!s)} style={{background:showShop?'rgba(196,181,253,0.2)':'rgba(255,255,255,0.08)',border:'1px solid rgba(196,181,253,0.3)',borderRadius:8,padding:'4px 10px',color:'#c4b5fd',cursor:'pointer',fontSize:11,fontWeight:700}}>
              🛒 Shop {showShop?'▲':'▼'}
            </button>
          </div>

          {/* Money */}
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:28,fontWeight:900,color:'#fbbf24',textShadow:'0 0 20px rgba(251,191,36,0.5)'}}>💰 {fmt(money)}đ</div>
            <div style={{fontSize:10,color:'#64748b'}}>Tổng kiếm được: {fmt(totalMoney)}đ  |  x{fmt(upgrades.valueMult)} mỗi bấm</div>
          </div>

          {/* Shop */}
          {showShop && (
            <div style={{background:'rgba(0,0,0,0.3)',border:'1px solid rgba(196,181,253,0.2)',borderRadius:12,padding:'8px 10px'}}>
              <p style={{margin:'0 0 6px',color:'#c4b5fd',fontSize:11,fontWeight:800}}>🛒 Nâng Cấp</p>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {UPGRADES_LIST.map(upg => {
                  const bought = boughtUpgrades.includes(upg.id);
                  const can = !bought && money >= upg.cost;
                  return (
                    <div key={upg.id} style={{display:'flex',alignItems:'center',gap:8,background:bought?'rgba(34,197,94,0.08)':'rgba(255,255,255,0.03)',border:`1px solid ${bought?'rgba(34,197,94,0.2)':'rgba(255,255,255,0.06)'}`,borderRadius:8,padding:'5px 8px',opacity:bought||can?1:0.5}}>
                      <span style={{fontSize:20}}>{upg.icon}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,fontWeight:700,color:bought?'#4ade80':'#e2e8f0'}}>{upg.name}</div>
                        <div style={{fontSize:9,color:'#64748b'}}>{upg.desc}</div>
                      </div>
                      {bought ? <span style={{fontSize:10,color:'#4ade80',fontWeight:700}}>✅</span> : (
                        <button onClick={()=>buyUpgrade(upg)} style={{background:can?'linear-gradient(135deg,#7c3aed,#a855f7)':'rgba(255,255,255,0.04)',border:'none',borderRadius:6,padding:'3px 8px',color:can?'white':'#475569',fontSize:9,fontWeight:800,cursor:can?'pointer':'default',whiteSpace:'nowrap'}}>
                          {fmt(upg.cost)}d
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Play area */}
          <div ref={containerRef} style={{flex:1,minHeight:360,position:'relative',background:'rgba(0,0,0,0.25)',border:'1px solid rgba(196,181,253,0.15)',borderRadius:16,overflow:'hidden'}}>
            {/* Stars bg */}
            {Array.from({length:20}).map((_,i)=>(
              <div key={i} style={{position:'absolute',left:`${Math.random()*100}%`,top:`${Math.random()*100}%`,width:2,height:2,background:'white',borderRadius:'50%',opacity:Math.random()*0.5+0.1}}/>
            ))}

            {/* Items */}
            {items.map(item => {
              const age = Date.now() - item.born;
              const remaining = Math.max(0, item.dur - age);
              const pct = remaining / item.dur;
              return (
                <div key={item.iid}
                  onClick={e => clickItem(e, item)}
                  style={{
                    position:'absolute', left:item.x, top:item.y,
                    width:item.size, height:item.size,
                    cursor:'pointer', userSelect:'none',
                    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                    animation:'none',
                  }}
                >
                  {/* Glow ring */}
                  <div style={{position:'absolute',inset:-4,borderRadius:'50%',border:`2px solid ${item.color}`,boxShadow:`0 0 12px ${item.glow}, 0 0 24px ${item.glow}`,opacity:0.7+pct*0.3}}/>
                  {/* Timer ring */}
                  <div style={{position:'absolute',inset:-2,borderRadius:'50%',border:`3px solid ${item.color}`,opacity:pct,clipPath:`inset(0 ${(1-pct)*100}% 0 0)`}}/>
                  <span style={{fontSize:item.size*0.55,lineHeight:1,pointerEvents:'none',filter:`drop-shadow(0 0 6px ${item.color})`}}>{item.icon}</span>
                  <span style={{fontSize:8,color:item.color,fontWeight:800,pointerEvents:'none',textShadow:`0 0 4px ${item.color}`}}>{fmt(item.value * upgrades.valueMult)}d</span>
                </div>
              );
            })}

            {/* Popups */}
            {popups.map(p => (
              <div key={p.id} style={{position:'absolute',left:p.x,top:p.y,pointerEvents:'none',transform:'translateY(-20px)',color:p.color,fontWeight:900,fontSize:14,textShadow:`0 0 8px ${p.color}`,whiteSpace:'nowrap',zIndex:100}}>
                +{fmt(p.earned)}d
              </div>
            ))}

            {items.length===0 && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b',fontSize:12}}>Cho vat bau xuat hien... ✨</div>}
          </div>

          {/* Stats */}
          <div style={{background:'rgba(0,0,0,0.2)',border:'1px solid rgba(196,181,253,0.1)',borderRadius:10,padding:'6px 10px'}}>
            <div style={{fontSize:10,color:'#c4b5fd',fontWeight:700,marginBottom:4}}>📊 Thong Ke Bam</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {OBJECTS.filter(o=>stats[o.id]).map(o=>(
                <div key={o.id} style={{fontSize:9,color:RARITY_COLOR[o.rarity]||'#94a3b8',background:'rgba(255,255,255,0.04)',borderRadius:6,padding:'2px 6px'}}>
                  {o.icon} x{stats[o.id]?.count||0}
                </div>
              ))}
              {Object.keys(stats).length===0 && <span style={{fontSize:9,color:'#475569'}}>Bat dau bam de xem thong ke!</span>}
            </div>
            {bestItem && <div style={{fontSize:9,color:'#fbbf24',marginTop:3}}>🏆 Vat hiem nhat: {bestItem.icon} {bestItem.name} ({bestItem.rarity})</div>}
          </div>

          {/* Legend */}
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {rarityOrder.map(r=>(
              <span key={r} style={{fontSize:8,color:RARITY_COLOR[r]||'#94a3b8',background:'rgba(255,255,255,0.04)',borderRadius:6,padding:'2px 6px',border:`1px solid ${RARITY_COLOR[r]||'#94a3b8'}33`}}>{r}</span>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const handleBack = () => {
        window.location.href = '../index.html';
      };

      return <ClickerGame onBack={handleBack} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
