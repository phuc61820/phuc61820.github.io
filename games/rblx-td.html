<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 Tower Defense Hub — Game Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a0a2e; min-height: 100vh; color: white; }
    #root { min-height: 100vh; }
    button { transition: all 0.15s; }
    button:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }
    button:active:not(:disabled) { transform: scale(0.95); }
  </style>
  <script src="../js/theme.js"></script>
</head>
<body>
  <button id="themeToggle" onclick="toggleMode()">☀️</button>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GW = 10, GH = 8, CELL = 56;

    // Generate a path as a list of {x,y} cells
    function makePath(type) {
      const P = [];
      if (type === 'zigzag') {
        // Meadow: simple zigzag
        for (let x = 0; x < GW; x++) P.push({ x, y: 1 });
        for (let y = 1; y <= 3; y++) P.push({ x: GW - 1, y });
        for (let x = GW - 1; x >= 0; x--) P.push({ x, y: 3 });
        for (let y = 3; y <= 5; y++) P.push({ x: 0, y });
        for (let x = 0; x < GW; x++) P.push({ x, y: 5 });
      } else if (type === 'scurve') {
        // Desert: S-curve
        for (let x = 0; x < 4; x++) P.push({ x, y: 1 });
        for (let y = 1; y <= 4; y++) P.push({ x: 3, y });
        for (let x = 3; x <= 7; x++) P.push({ x, y: 4 });
        for (let y = 4; y <= 6; y++) P.push({ x: 7, y });
        for (let x = 7; x < GW; x++) P.push({ x, y: 6 });
      } else if (type === 'spiral') {
        // Mountain: spiral-ish
        for (let x = 0; x < GW; x++) P.push({ x, y: 0 });
        for (let y = 0; y < GH; y++) P.push({ x: GW - 1, y });
        for (let x = GW - 1; x >= 1; x--) P.push({ x, y: GH - 1 });
        for (let y = GH - 1; y >= 2; y--) P.push({ x: 1, y });
        for (let x = 1; x <= 7; x++) P.push({ x, y: 2 });
      } else if (type === 'fork') {
        // Volcano: fork and merge (single thread for simplicity)
        for (let x = 0; x < 3; x++) P.push({ x, y: 3 });
        for (let y = 3; y >= 1; y--) P.push({ x: 2, y });
        for (let x = 2; x <= 6; x++) P.push({ x, y: 1 });
        for (let y = 1; y <= 5; y++) P.push({ x: 6, y });
        for (let x = 6; x < GW; x++) P.push({ x, y: 5 });
      } else if (type === 'wave') {
        // Ocean: wave pattern
        const ys = [3, 2, 1, 2, 3, 4, 5, 4, 3, 2];
        for (let x = 0; x < GW; x++) P.push({ x, y: ys[x] });
      } else if (type === 'turns') {
        // Tundra: straight with turns
        for (let x = 0; x < 3; x++) P.push({ x, y: 2 });
        for (let y = 2; y <= 5; y++) P.push({ x: 2, y });
        for (let x = 2; x < 7; x++) P.push({ x, y: 5 });
        for (let y = 5; y >= 2; y--) P.push({ x: 6, y });
        for (let x = 6; x < GW; x++) P.push({ x, y: 2 });
      } else if (type === 'diagonal') {
        // Space: diagonal zigzag
        for (let i = 0; i < GW; i++) {
          const y = Math.min(GH - 1, Math.max(0, i % 2 === 0 ? Math.floor(i / 2) : Math.floor(i / 2) + 1));
          P.push({ x: i, y: Math.min(GH - 1, i < 4 ? i : (i < 7 ? 7 - i + 1 : i - 3)) });
        }
      } else if (type === 'ushape') {
        // Castle: U-shape
        for (let y = 0; y < 6; y++) P.push({ x: 1, y });
        for (let x = 1; x < 9; x++) P.push({ x, y: 6 });
        for (let y = 6; y >= 0; y--) P.push({ x: 8, y });
      } else if (type === 'grid') {
        // Farm: grid pattern
        for (let x = 0; x < 5; x++) P.push({ x, y: 1 });
        for (let y = 1; y <= 3; y++) P.push({ x: 4, y });
        for (let x = 4; x >= 2; x--) P.push({ x, y: 3 });
        for (let y = 3; y <= 6; y++) P.push({ x: 2, y });
        for (let x = 2; x < GW; x++) P.push({ x, y: 6 });
      } else if (type === 'diamond') {
        // Crystal: diamond
        for (let i = 0; i < 4; i++) P.push({ x: i, y: 3 - i < 0 ? 0 : 3 - i });
        for (let i = 0; i < 4; i++) P.push({ x: 4 + i, y: i });
        for (let i = 0; i < 4; i++) P.push({ x: 7 - i, y: 3 + i > GH - 1 ? GH - 1 : 3 + i });
        // fallback simple line end
        P.push({ x: 8, y: 6 });
        P.push({ x: 9, y: 6 });
      }
      // Dedupe consecutive
      const out = [];
      for (const p of P) {
        if (!out.length || out[out.length - 1].x !== p.x || out[out.length - 1].y !== p.y) out.push(p);
      }
      return out;
    }

    const MAPS = [
      { id: 0, name: 'Đồng Cỏ', emoji: '🌿', bg: '#1f3a1f', cell: '#2d5a2d', path: 'zigzag' },
      { id: 1, name: 'Sa Mạc', emoji: '🏜️', bg: '#3d2a15', cell: '#8b6f47', path: 'scurve' },
      { id: 2, name: 'Núi Cao', emoji: '🏔️', bg: '#2a3040', cell: '#5a6478', path: 'spiral' },
      { id: 3, name: 'Núi Lửa', emoji: '🌋', bg: '#3d1515', cell: '#8b2a2a', path: 'fork' },
      { id: 4, name: 'Đại Dương', emoji: '🌊', bg: '#0f2a3d', cell: '#2a5a8b', path: 'wave' },
      { id: 5, name: 'Băng Giá', emoji: '❄️', bg: '#1a3a4a', cell: '#7aa8c8', path: 'turns' },
      { id: 6, name: 'Vũ Trụ', emoji: '🌌', bg: '#0a0a2a', cell: '#3a2a6a', path: 'diagonal' },
      { id: 7, name: 'Lâu Đài', emoji: '🏰', bg: '#2a2015', cell: '#6b5a3a', path: 'ushape' },
      { id: 8, name: 'Nông Trại', emoji: '🌾', bg: '#2a3015', cell: '#8b8a3a', path: 'grid' },
      { id: 9, name: 'Thủy Tinh', emoji: '💎', bg: '#2a1a3d', cell: '#7a4ac8', path: 'diamond' },
    ];

    const TOWERS = {
      archer: { name: 'Cung', emoji: '🏹', cost: 50, range: 2.2, dmg: 8, cd: 6, splash: 0, slow: 0, color: '#8bc34a' },
      cannon: { name: 'Pháo', emoji: '🔥', cost: 100, range: 2.0, dmg: 25, cd: 14, splash: 1.0, slow: 0, color: '#ff5722' },
      mage:   { name: 'Mage', emoji: '⚡', cost: 150, range: 2.5, dmg: 12, cd: 9, splash: 0, slow: 0.5, color: '#9c27b0' },
    };

    const ENEMIES = {
      grunt: { emoji: '👹', hp: 20, speed: 0.08, gold: 5, color: '#795548' },
      tank:  { emoji: '🛡️', hp: 80, speed: 0.04, gold: 12, color: '#607d8b' },
      boss:  { emoji: '👑', hp: 400, speed: 0.05, gold: 100, color: '#f44336' },
    };

    function loadProgress() {
      try { return JSON.parse(localStorage.getItem('rblxTdProgress') || '{"unlocked":1,"completed":[]}'); }
      catch (e) { return { unlocked: 1, completed: [] }; }
    }
    function saveProgress(p) {
      try { localStorage.setItem('rblxTdProgress', JSON.stringify(p)); } catch (e) {}
    }

    function Hub({ onPick }) {
      const prog = loadProgress();
      return (
        <div style={{ padding: 20, maxWidth: 1100, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <a href="../index.html" style={{ color: '#fff', textDecoration: 'none', background: '#6a4ac8', padding: '10px 18px', borderRadius: 10, fontWeight: 'bold' }}>← Về Hub</a>
            <h1 style={{ fontSize: 32 }}>🏰 Tower Defense Hub</h1>
            <div style={{ width: 100 }}></div>
          </div>
          <p style={{ textAlign: 'center', marginBottom: 20, opacity: 0.8 }}>Hoàn thành map để mở khóa map tiếp theo. Tiến độ: {prog.completed.length}/10</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 16 }}>
            {MAPS.map((m, i) => {
              const unlocked = i < prog.unlocked;
              const done = prog.completed.includes(m.id);
              return (
                <button key={m.id} disabled={!unlocked} onClick={() => onPick(m.id)}
                  style={{ background: unlocked ? m.cell : '#333', color: 'white', border: done ? '3px solid #ffeb3b' : '2px solid rgba(255,255,255,0.2)', borderRadius: 14, padding: 20, cursor: unlocked ? 'pointer' : 'not-allowed', opacity: unlocked ? 1 : 0.5, fontSize: 16, textAlign: 'center' }}>
                  <div style={{ fontSize: 48 }}>{m.emoji}</div>
                  <div style={{ fontWeight: 'bold', margin: '8px 0' }}>Level {i + 1}</div>
                  <div>{m.name}</div>
                  <div style={{ fontSize: 14, marginTop: 6, opacity: 0.8 }}>{unlocked ? (done ? '✅ Hoàn thành' : '🔓 Mở') : '🔒 Khóa'}</div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function Game({ mapId, onExit, onWin }) {
      const map = MAPS[mapId];
      const pathRef = useRef(makePath(map.path));
      const path = pathRef.current;
      const pathSet = useRef(new Set(path.map(p => p.x + ',' + p.y))).current;

      const [gold, setGold] = useState(200);
      const [hp, setHp] = useState(20);
      const [wave, setWave] = useState(0);
      const [towers, setTowers] = useState([]); // {x,y,type,cd}
      const [enemies, setEnemies] = useState([]); // {id,type,t,hp,maxHp,slowT}
      const [projs, setProjs] = useState([]); // {fx,fy,tx,ty,life,color}
      const [selTower, setSelTower] = useState('archer');
      const [status, setStatus] = useState('playing'); // playing|won|lost
      const [waveActive, setWaveActive] = useState(false);
      const spawnQueueRef = useRef([]);
      const idRef = useRef(0);
      const tickRef = useRef(0);

      // Start wave
      function startWave() {
        if (waveActive || status !== 'playing') return;
        const w = wave + 1;
        const q = [];
        if (w === 10) {
          // boss wave
          for (let i = 0; i < 5; i++) q.push({ type: 'grunt', delay: i * 5 });
          q.push({ type: 'boss', delay: 30 });
        } else {
          const n = 5 + w * 2;
          for (let i = 0; i < n; i++) {
            const t = (w >= 3 && i % 4 === 3) ? 'tank' : 'grunt';
            q.push({ type: t, delay: i * (12 - Math.min(8, w)) });
          }
        }
        spawnQueueRef.current = q;
        setWave(w);
        setWaveActive(true);
      }

      // Tick
      useEffect(() => {
        if (status !== 'playing') return;
        const iv = setInterval(() => {
          tickRef.current++;
          const tick = tickRef.current;

          // spawn
          const q = spawnQueueRef.current;
          const nextSpawns = [];
          let spawned = [];
          for (const s of q) {
            s.delay--;
            if (s.delay <= 0) {
              spawned.push({ id: ++idRef.current, type: s.type, t: 0, hp: ENEMIES[s.type].hp, maxHp: ENEMIES[s.type].hp, slowT: 0 });
            } else nextSpawns.push(s);
          }
          spawnQueueRef.current = nextSpawns;

          setEnemies(prevE => {
            let E = [...prevE, ...spawned];
            // move
            E = E.map(e => {
              const sp = ENEMIES[e.type].speed * (e.slowT > 0 ? 0.5 : 1);
              return { ...e, t: e.t + sp, slowT: Math.max(0, e.slowT - 1) };
            });
            // handle reach end
            let dmg = 0;
            E = E.filter(e => {
              if (e.t >= path.length - 1) { dmg++; return false; }
              return true;
            });
            if (dmg > 0) setHp(h => Math.max(0, h - dmg));
            return E;
          });

          // towers fire
          setTowers(prevT => {
            const E = enemiesRef.current;
            const newProjs = [];
            const killedIds = new Set();
            const newTowers = prevT.map(tw => {
              let cd = tw.cd - 1;
              if (cd <= 0 && E.length) {
                const stats = TOWERS[tw.type];
                let best = null, bestD = stats.range * stats.range;
                for (const e of E) {
                  const pos = path[Math.floor(e.t)] || path[path.length - 1];
                  const dx = pos.x - tw.x, dy = pos.y - tw.y;
                  const d = dx * dx + dy * dy;
                  if (d <= bestD) { bestD = d; best = e; }
                }
                if (best) {
                  const bpos = path[Math.floor(best.t)] || path[path.length - 1];
                  newProjs.push({ fx: tw.x, fy: tw.y, tx: bpos.x, ty: bpos.y, life: 3, color: stats.color });
                  // apply damage
                  setEnemies(E2 => {
                    let goldGain = 0;
                    const after = E2.map(e => {
                      let nhp = e.hp;
                      let slowT = e.slowT;
                      if (e.id === best.id) {
                        nhp -= stats.dmg;
                        if (stats.slow) slowT = 40;
                      } else if (stats.splash > 0) {
                        const p1 = path[Math.floor(e.t)] || path[path.length - 1];
                        const dx = p1.x - bpos.x, dy = p1.y - bpos.y;
                        if (dx * dx + dy * dy <= stats.splash * stats.splash) {
                          nhp -= stats.dmg * 0.6;
                        }
                      }
                      return { ...e, hp: nhp, slowT };
                    }).filter(e => {
                      if (e.hp <= 0) { goldGain += ENEMIES[e.type].gold; return false; }
                      return true;
                    });
                    if (goldGain) setGold(g => g + goldGain);
                    return after;
                  });
                  cd = stats.cd;
                }
              }
              return { ...tw, cd };
            });
            if (newProjs.length) setProjs(p => [...p, ...newProjs]);
            return newTowers;
          });

          // decay projectiles
          setProjs(p => p.map(x => ({ ...x, life: x.life - 1 })).filter(x => x.life > 0));
        }, 100);
        return () => clearInterval(iv);
      }, [status]);

      // mirror enemies to ref for tower AI
      const enemiesRef = useRef([]);
      useEffect(() => { enemiesRef.current = enemies; }, [enemies]);

      // wave complete?
      useEffect(() => {
        if (waveActive && spawnQueueRef.current.length === 0 && enemies.length === 0) {
          setWaveActive(false);
          if (wave >= 10) {
            setStatus('won');
            const prog = loadProgress();
            if (!prog.completed.includes(mapId)) prog.completed.push(mapId);
            prog.unlocked = Math.max(prog.unlocked, mapId + 2);
            if (prog.unlocked > 10) prog.unlocked = 10;
            saveProgress(prog);
            onWin && onWin();
          }
        }
      }, [enemies, waveActive, wave]);

      // lose check
      useEffect(() => {
        if (hp <= 0 && status === 'playing') setStatus('lost');
      }, [hp]);

      function placeTower(x, y) {
        if (pathSet.has(x + ',' + y)) return;
        if (towers.some(t => t.x === x && t.y === y)) return;
        const stats = TOWERS[selTower];
        if (gold < stats.cost) return;
        setGold(g => g - stats.cost);
        setTowers(T => [...T, { x, y, type: selTower, cd: 0 }]);
      }

      // Render grid
      const cells = [];
      for (let y = 0; y < GH; y++) {
        for (let x = 0; x < GW; x++) {
          const isPath = pathSet.has(x + ',' + y);
          const t = towers.find(tw => tw.x === x && tw.y === y);
          cells.push(
            <div key={x + '-' + y} onClick={() => !isPath && !t && placeTower(x, y)}
              style={{ position: 'absolute', left: x * CELL, top: y * CELL, width: CELL, height: CELL, background: isPath ? '#c8a060' : map.cell, border: '1px solid rgba(0,0,0,0.3)', cursor: isPath || t ? 'default' : 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 28 }}>
              {t && <div title={TOWERS[t.type].name} style={{ textShadow: '0 0 6px ' + TOWERS[t.type].color }}>{TOWERS[t.type].emoji}</div>}
            </div>
          );
        }
      }

      const startCell = path[0];
      const endCell = path[path.length - 1];

      return (
        <div style={{ padding: 12, maxWidth: 1100, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <button onClick={onExit} style={{ background: '#6a4ac8', border: 'none', color: 'white', padding: '8px 16px', borderRadius: 8, cursor: 'pointer', fontWeight: 'bold' }}>← Rời Map</button>
            <h2>{map.emoji} {map.name} — Level {mapId + 1}</h2>
            <div></div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-around', background: 'rgba(0,0,0,0.4)', padding: 10, borderRadius: 10, marginBottom: 10, fontSize: 18, fontWeight: 'bold', flexWrap: 'wrap', gap: 8 }}>
            <span>💰 {gold}</span>
            <span>❤️ {hp}</span>
            <span>🌊 Sóng {wave}/10</span>
            <span>👹 {enemies.length}</span>
          </div>
          <div style={{ position: 'relative', width: GW * CELL, height: GH * CELL, background: map.bg, margin: '0 auto', borderRadius: 10, overflow: 'hidden', border: '3px solid rgba(255,255,255,0.2)' }}>
            {cells}
            {/* start/end markers */}
            {startCell && <div style={{ position: 'absolute', left: startCell.x * CELL, top: startCell.y * CELL, width: CELL, height: CELL, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, pointerEvents: 'none' }}>🚪</div>}
            {endCell && <div style={{ position: 'absolute', left: endCell.x * CELL, top: endCell.y * CELL, width: CELL, height: CELL, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, pointerEvents: 'none' }}>🏠</div>}
            {/* enemies */}
            {enemies.map(e => {
              const pos = path[Math.floor(e.t)] || path[0];
              const next = path[Math.min(path.length - 1, Math.floor(e.t) + 1)];
              const frac = e.t - Math.floor(e.t);
              const x = pos.x + (next.x - pos.x) * frac;
              const y = pos.y + (next.y - pos.y) * frac;
              const pct = Math.max(0, e.hp / e.maxHp);
              return (
                <div key={e.id} style={{ position: 'absolute', left: x * CELL, top: y * CELL, width: CELL, height: CELL, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none' }}>
                  <div style={{ fontSize: 28, filter: e.slowT > 0 ? 'hue-rotate(180deg) brightness(1.2)' : 'none' }}>{ENEMIES[e.type].emoji}</div>
                  <div style={{ width: CELL - 10, height: 4, background: 'rgba(0,0,0,0.6)', borderRadius: 2, marginTop: -4 }}>
                    <div style={{ width: (pct * 100) + '%', height: '100%', background: pct > 0.5 ? '#4caf50' : pct > 0.25 ? '#ff9800' : '#f44336', borderRadius: 2 }}></div>
                  </div>
                </div>
              );
            })}
            {/* projectiles */}
            {projs.map((p, i) => (
              <div key={i} style={{ position: 'absolute', left: (p.fx + p.tx) / 2 * CELL + CELL / 2 - 6, top: (p.fy + p.ty) / 2 * CELL + CELL / 2 - 6, width: 12, height: 12, background: p.color, borderRadius: '50%', boxShadow: '0 0 10px ' + p.color, pointerEvents: 'none' }}></div>
            ))}
          </div>
          {/* tower bar */}
          <div style={{ display: 'flex', justifyContent: 'center', gap: 10, marginTop: 12, flexWrap: 'wrap' }}>
            {Object.entries(TOWERS).map(([k, v]) => (
              <button key={k} onClick={() => setSelTower(k)}
                style={{ background: selTower === k ? v.color : 'rgba(255,255,255,0.1)', color: 'white', border: selTower === k ? '3px solid white' : '2px solid rgba(255,255,255,0.3)', padding: '10px 16px', borderRadius: 10, cursor: 'pointer', fontSize: 16, fontWeight: 'bold', opacity: gold >= v.cost ? 1 : 0.5 }}>
                <div style={{ fontSize: 28 }}>{v.emoji}</div>
                <div>{v.name}</div>
                <div style={{ fontSize: 13 }}>💰 {v.cost}</div>
              </button>
            ))}
            <button onClick={startWave} disabled={waveActive || status !== 'playing'}
              style={{ background: waveActive ? '#555' : '#4caf50', color: 'white', border: 'none', padding: '10px 20px', borderRadius: 10, cursor: waveActive ? 'not-allowed' : 'pointer', fontSize: 18, fontWeight: 'bold' }}>
              {waveActive ? '⏳ Đang diễn ra' : (wave >= 10 ? '🏆' : '▶️ Bắt đầu sóng ' + (wave + 1))}
            </button>
          </div>
          {status === 'won' && (
            <div style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', background: 'rgba(0,0,0,0.85)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', zIndex: 100 }}>
              <h1 style={{ fontSize: 56 }}>🏆 Chiến Thắng!</h1>
              <p style={{ fontSize: 24, margin: 20 }}>Bạn đã bảo vệ {map.name}!</p>
              <button onClick={onExit} style={{ background: '#4caf50', color: 'white', border: 'none', padding: '14px 30px', borderRadius: 10, fontSize: 20, fontWeight: 'bold', cursor: 'pointer' }}>Về Hub</button>
            </div>
          )}
          {status === 'lost' && (
            <div style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', background: 'rgba(0,0,0,0.85)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', zIndex: 100 }}>
              <h1 style={{ fontSize: 56 }}>💀 Thất Bại</h1>
              <p style={{ fontSize: 24, margin: 20 }}>Map bị phá hủy tới sóng {wave}</p>
              <button onClick={onExit} style={{ background: '#f44336', color: 'white', border: 'none', padding: '14px 30px', borderRadius: 10, fontSize: 20, fontWeight: 'bold', cursor: 'pointer' }}>Về Hub</button>
            </div>
          )}
        </div>
      );
    }

    const HASH_MAP = ['meadow','desert','mountain','volcano','ocean','tundra','space','castle','farm','crystal'];

    function App() {
      const [mapId, setMapId] = useState(null);
      const [, setTick] = useState(0);

      // URL hash routing — load map directly if hash matches
      useEffect(() => {
        const hash = window.location.hash.slice(1).toLowerCase();
        if (!hash) return;
        let idx = HASH_MAP.indexOf(hash);
        if (idx < 0) {
          const n = parseInt(hash, 10);
          if (!isNaN(n) && n >= 0 && n < MAPS.length) idx = n;
        }
        if (idx >= 0) setMapId(idx);
      }, []);

      const exitToHub = () => {
        if (window.location.hash) history.replaceState(null, '', window.location.pathname + window.location.search);
        setMapId(null);
        setTick(t => t + 1);
      };

      return mapId === null
        ? <Hub onPick={setMapId} />
        : <Game mapId={mapId} onExit={exitToHub} onWin={() => setTick(t => t + 1)} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
