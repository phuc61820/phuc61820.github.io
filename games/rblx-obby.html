    // ==================== STORAGE ====================

    };

      try { localStorage.setItem('rblxObbyProgress', JSON.stringify(p)); } catch {}

    // ==================== MENU ====================
    function Menu({ progress, onPick }) {

                      padding: '16px 10px',

    // ==================== GAME ====================
    const WORLD_W = 1450;
    const WORLD_H = 300;
    const VIEW_W = 400;
    const VIEW_H = 300;
    const GROUND_Y = 260;
    const PLAYER_W = 24;
    const PLAYER_H = 28;

    function Game({ levelIdx, onWin, onExit }) {
      const level = LEVELS[levelIdx];
      const [, forceRender] = useState(0);
      const [status, setStatus] = useState('playing'); // playing | won | dead
      const stateRef = useRef({
        px: 20, py: GROUND_Y - PLAYER_H, vx: 0, vy: 0,
        onGround: true, cam: 0, tick: 0
      });
      const keysRef = useRef({ left: false, right: false, jump: false });
      const statusRef = useRef('playing');

      useEffect(() => { statusRef.current = status; }, [status]);

      // Reset on level change
      useEffect(() => {
        stateRef.current = { px: 20, py: GROUND_Y - PLAYER_H, vx: 0, vy: 0, onGround: true, cam: 0, tick: 0 };
        setStatus('playing');
        statusRef.current = 'playing';
      }, [levelIdx]);

      // Input
      useEffect(() => {
        const kd = (e) => {
          if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keysRef.current.left = true;
          if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keysRef.current.right = true;
          if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
            keysRef.current.jump = true;
            e.preventDefault();
          }
        };
        const ku = (e) => {
          if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keysRef.current.left = false;
          if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keysRef.current.right = false;
          if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keysRef.current.jump = false;
        };
        window.addEventListener('keydown', kd);
        window.addEventListener('keyup', ku);
        return () => {
          window.removeEventListener('keydown', kd);
          window.removeEventListener('keyup', ku);
        };
      }, []);

      // Game loop
      useEffect(() => {
        const interval = setInterval(() => {
          if (statusRef.current !== 'playing') {
            forceRender(t => t + 1);
            return;
          }
          const s = stateRef.current;
          const k = keysRef.current;
          s.tick++;

          // Horizontal movement
          const accel = level.slippery ? 0.25 : 1.2;
          const maxSpeed = 4;
          const friction = level.slippery ? 0.96 : 0.75;
          if (k.left) s.vx = Math.max(s.vx - accel, -maxSpeed);
          if (k.right) s.vx = Math.min(s.vx + accel, maxSpeed);
          if (!k.left && !k.right) s.vx *= friction;

          // Jump
          if (k.jump && s.onGround) {
            s.vy = level.jumpV;
            s.onGround = false;
          }

          // Gravity
          s.vy += level.gravity;
          if (s.vy > 14) s.vy = 14;

          // Apply velocity
          s.px += s.vx;
          s.py += s.vy;

          // Clamp bounds
          if (s.px < 0) s.px = 0;
          if (s.px > WORLD_W - PLAYER_W) s.px = WORLD_W - PLAYER_W;

          // Ground collision
          s.onGround = false;
          if (s.py + PLAYER_H >= GROUND_Y) {
            // Check for gap
            let inGap = false;
            for (const o of level.obstacles) {
              if (o.type === 'gap' && s.px + PLAYER_W > o.x && s.px < o.x + o.w) {
                inGap = true; break;
              }
            }
            if (!inGap) {
              s.py = GROUND_Y - PLAYER_H;
              s.vy = 0;
              s.onGround = true;
            } else if (s.py > WORLD_H + 50) {
              setStatus('dead');
              return;
            }
          }

          // Platform collision (only when falling)
          for (const o of level.obstacles) {
            if (o.type === 'platform' || o.type === 'cloud') {
              const prevBottom = s.py + PLAYER_H - s.vy;
              if (
                s.vy >= 0 &&
                s.px + PLAYER_W > o.x &&
                s.px < o.x + o.w &&
                s.py + PLAYER_H >= o.y &&
                prevBottom <= o.y + 2
              ) {
                s.py = o.y - PLAYER_H;
                s.vy = 0;
                s.onGround = true;
              }
            }
          }

          // Hazard collision
          for (const o of level.obstacles) {
            if (['spike','lava','croc','asteroid','wind','scorpion','quicksand','candy','laser','ghost','pumpkin'].includes(o.type)) {
              if (
                s.px + PLAYER_W > o.x + 2 &&
                s.px < o.x + o.w - 2 &&
                s.py + PLAYER_H > o.y &&
                s.py < o.y + o.h
              ) {
                setStatus('dead');
                return;
              }
            }
          }

          // Fall off world
          if (s.py > WORLD_H + 50) {
            setStatus('dead');
            return;
          }

          // Win: reach right edge
          if (s.px >= WORLD_W - PLAYER_W - 10) {
            setStatus('won');
            onWin(levelIdx);
            return;
          }

          // Camera follows player
          s.cam = Math.max(0, Math.min(WORLD_W - VIEW_W, s.px - VIEW_W / 2 + PLAYER_W / 2));

          forceRender(t => t + 1);
        }, 33);
        return () => clearInterval(interval);
      }, [levelIdx]);

      const s = stateRef.current;

      const restart = () => {
        stateRef.current = { px: 20, py: GROUND_Y - PLAYER_H, vx: 0, vy: 0, onGround: true, cam: 0, tick: 0 };
        setStatus('playing');
        statusRef.current = 'playing';
      };

      const nextLevel = () => {
        if (levelIdx < LEVELS.length - 1) {
          onPickNext(levelIdx + 1);
        } else {
          onExit();
        }
      };
      const onPickNext = (i) => {
        stateRef.current = { px: 20, py: GROUND_Y - PLAYER_H, vx: 0, vy: 0, onGround: true, cam: 0, tick: 0 };
        // parent-controlled: use onWin's idx + exit pattern — we instead raise via onExit with hop
        window.__obbyGoto && window.__obbyGoto(i);
      };

      // Touch controls
      const touchStart = (key) => (e) => {
        e.preventDefault();
        keysRef.current[key] = true;
      };
      const touchEnd = (key) => (e) => {
        e.preventDefault();
        keysRef.current[key] = false;
      };

      return (
        <div style={{
          minHeight: '100vh',
          background: '#000',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          padding: '10px',
          overflow: 'hidden'
        }}>
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            width: '100%', maxWidth: '500px', marginBottom: '8px',
            padding: '0 6px'
          }}>
            <button onClick={onExit} style={{
              padding: '6px 14px', background: '#333', color: 'white',
              border: 'none', borderRadius: '6px', cursor: 'pointer', fontWeight: 'bold'
            }}>← Menu</button>
            <div style={{ fontSize: '18px', fontWeight: 'bold' }}>
              {level.emoji} {level.name} — Level {levelIdx + 1}
            </div>
            <button onClick={restart} style={{
              padding: '6px 14px', background: '#c22', color: 'white',
              border: 'none', borderRadius: '6px', cursor: 'pointer', fontWeight: 'bold'
            }}>↻</button>
          </div>

          {/* Game viewport */}
          <div style={{
            position: 'relative',
            width: 'min(95vw, 500px)',
            aspectRatio: `${VIEW_W} / ${VIEW_H}`,
            maxHeight: '60vh',
            background: level.bg,
            border: '4px solid #fff',
            borderRadius: '10px',
            overflow: 'hidden',
            boxShadow: '0 6px 20px rgba(0,0,0,0.6)'
          }}>
            <div style={{
              position: 'absolute',
              width: `${(WORLD_W / VIEW_W) * 100}%`,
              height: '100%',
              left: `${-(s.cam / VIEW_W) * 100}%`,
              top: 0
            }}>
              {/* Ground */}
              <div style={{
                position: 'absolute',
                left: 0, right: 0,
                top: `${(GROUND_Y / VIEW_H) * 100}%`,
                bottom: 0,
                background: level.groundColor
              }} />

              {/* Obstacles */}
              {level.obstacles.map((o, i) => {
                const style = {
                  position: 'absolute',
                  left: `${(o.x / WORLD_W) * 100}%`,
                  top: `${(o.y / VIEW_H) * 100}%`,
                  width: `${(o.w / WORLD_W) * 100}%`,
                  height: `${(o.h / VIEW_H) * 100}%`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 'calc(min(95vw, 500px) / 400 * 18px)'
                };
                if (o.type === 'platform') {
                  return <div key={i} style={{
                    ...style,
                    background: level.platformColor,
                    border: '2px solid rgba(255,255,255,0.3)',
                    borderRadius: '3px'
                  }} />;
                }
                if (o.type === 'cloud') {
                  return <div key={i} style={{
                    ...style,
                    background: 'rgba(255,255,255,0.9)',
                    borderRadius: '15px',
                    boxShadow: '0 0 10px rgba(255,255,255,0.6)'
                  }} />;
                }
                if (o.type === 'gap') {
                  return <div key={i} style={{
                    ...style,
                    top: `${(GROUND_Y / VIEW_H) * 100}%`,
                    height: `${((VIEW_H - GROUND_Y) / VIEW_H) * 100}%`,
                    background: '#000'
                  }} />;
                }
                if (o.type === 'lava') {
                  return <div key={i} style={{
                    ...style,
                    top: `${(GROUND_Y / VIEW_H) * 100}%`,
                    height: `${((VIEW_H - GROUND_Y) / VIEW_H) * 100}%`,
                    background: 'linear-gradient(to bottom, #ff4500, #8b0000)',
                    boxShadow: '0 0 8px #ff4500 inset'
                  }}>
                    <span style={{ fontSize: 'calc(min(95vw, 500px) / 400 * 16px)' }}>🔥</span>
                  </div>;
                }
                if (o.type === 'quicksand') {
                  return <div key={i} style={{
                    ...style,
                    top: `${(GROUND_Y / VIEW_H) * 100}%`,
                    height: `${((VIEW_H - GROUND_Y) / VIEW_H) * 100}%`,
                    background: '#c8a060'
                  }} />;
                }
                if (o.type === 'laser') {
                  return <div key={i} style={{
                    ...style,
                    background: '#ff00ff',
                    boxShadow: '0 0 12px #ff00ff, 0 0 24px #ff00ff'
                  }} />;
                }
                // Hazard emojis
                const emojiMap = {
                  spike: '⚡', croc: '🐊', asteroid: '☄️', wind: '💨',
                  scorpion: '🦂', candy: '🍬', ghost: '👻', pumpkin: '🎃'
                };
                return <div key={i} style={{
                  ...style,
                  fontSize: `calc(min(95vw, 500px) / 400 * ${o.h}px)`
                }}>{emojiMap[o.type] || '⚠️'}</div>;
              })}

              {/* Goal flag */}
              <div style={{
                position: 'absolute',
                left: `${((WORLD_W - 40) / WORLD_W) * 100}%`,
                top: `${((GROUND_Y - 50) / VIEW_H) * 100}%`,
                width: `${(30 / WORLD_W) * 100}%`,
                height: `${(50 / VIEW_H) * 100}%`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 'calc(min(95vw, 500px) / 400 * 32px)'
              }}>🏁</div>

              {/* Player */}
              <div style={{
                position: 'absolute',
                left: `${(s.px / WORLD_W) * 100}%`,
                top: `${(s.py / VIEW_H) * 100}%`,
                width: `${(PLAYER_W / WORLD_W) * 100}%`,
                height: `${(PLAYER_H / VIEW_H) * 100}%`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 'calc(min(95vw, 500px) / 400 * 24px)',
                textShadow: '0 0 4px rgba(0,0,0,0.8)',
                transform: s.vx < 0 ? 'scaleX(-1)' : 'scaleX(1)'
              }}>{level.playerEmoji}</div>
            </div>

            {/* Death overlay */}
            {status === 'dead' && (
              <div style={{
                position: 'absolute', inset: 0,
                background: 'rgba(0,0,0,0.75)',
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                gap: '12px'
              }}>
                <div style={{ fontSize: '40px' }}>💀</div>
                <div style={{ fontSize: '22px', fontWeight: 'bold' }}>Thua rồi!</div>
                <button onClick={restart} style={{
                  padding: '10px 24px', background: '#ff4500', color: 'white',
                  border: 'none', borderRadius: '8px', cursor: 'pointer',
                  fontSize: '16px', fontWeight: 'bold'
                }}>↻ Thử lại</button>
              </div>
            )}

            {/* Win overlay */}
            {status === 'won' && (
              <div style={{
                position: 'absolute', inset: 0,
                background: 'rgba(0,0,0,0.8)',
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                gap: '12px'
              }}>
                <div style={{ fontSize: '48px' }}>🏆</div>
                <div style={{ fontSize: '24px', fontWeight: 'bold', color: 'gold' }}>Hoàn thành!</div>
                <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap', justifyContent: 'center' }}>
                  <button onClick={restart} style={{
                    padding: '10px 18px', background: '#555', color: 'white',
                    border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold'
                  }}>Chơi lại</button>
                  {levelIdx < LEVELS.length - 1 && (
                    <button onClick={() => window.__obbyGoto && window.__obbyGoto(levelIdx + 1)} style={{
                      padding: '10px 18px', background: '#4caf50', color: 'white',
                      border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold'
                    }}>Màn kế tiếp →</button>
                  )}
                  <button onClick={onExit} style={{
                    padding: '10px 18px', background: '#2196f3', color: 'white',
                    border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold'
                  }}>Menu</button>
                </div>
              </div>
            )}
          </div>

          {/* Touch controls */}
          <div style={{
            marginTop: '14px',
            width: 'min(95vw, 500px)',
            display: 'flex', justifyContent: 'space-between',
            gap: '8px'
          }}>
            <div style={{ display: 'flex', gap: '8px' }}>
              <button
                onTouchStart={touchStart('left')} onTouchEnd={touchEnd('left')}
                onMouseDown={touchStart('left')} onMouseUp={touchEnd('left')} onMouseLeave={touchEnd('left')}
                style={{
                  width: '60px', height: '60px', fontSize: '28px',
                  background: '#444', color: 'white', border: '2px solid #888',
                  borderRadius: '12px', cursor: 'pointer', userSelect: 'none'
                }}>←</button>
              <button
                onTouchStart={touchStart('right')} onTouchEnd={touchEnd('right')}
                onMouseDown={touchStart('right')} onMouseUp={touchEnd('right')} onMouseLeave={touchEnd('right')}
                style={{
                  width: '60px', height: '60px', fontSize: '28px',
                  background: '#444', color: 'white', border: '2px solid #888',
                  borderRadius: '12px', cursor: 'pointer', userSelect: 'none'
                }}>→</button>
            </div>
            <button
              onTouchStart={touchStart('jump')} onTouchEnd={touchEnd('jump')}
              onMouseDown={touchStart('jump')} onMouseUp={touchEnd('jump')} onMouseLeave={touchEnd('jump')}
              style={{
                width: '90px', height: '60px', fontSize: '22px',
                background: '#4caf50', color: 'white', border: '2px solid #6c6',
                borderRadius: '12px', cursor: 'pointer', fontWeight: 'bold', userSelect: 'none'
              }}>↑ NHẢY</button>
          </div>
        </div>
      );
    }

    // ==================== APP ====================
    function App() {
      const [screen, setScreen] = useState('menu'); // menu | game
      const [currentLevel, setCurrentLevel] = useState(0);
      const [progress, setProgress] = useState(loadProgress());

      // URL hash routing — load level directly if hash matches
      useEffect(() => {
        const resolveHash = () => {
          const hash = window.location.hash.slice(1).toLowerCase();
          if (!hash) return;
          const idx = LEVELS.findIndex(l => String(l.id) === hash || l.name.toLowerCase() === hash);
          if (idx >= 0) {
            setCurrentLevel(idx);
            setScreen('game');
          }
        };
        resolveHash();
      }, []);

      useEffect(() => {
        window.__obbyGoto = (i) => {
          setCurrentLevel(i);
          setScreen('game');
        };
      }, []);

      const onWin = (idx) => {
        const next = { ...progress, [idx]: true };
        setProgress(next);
        saveProgress(next);
      };

      if (screen === 'menu') {
        return <Menu progress={progress} onPick={(i) => {
          setCurrentLevel(i);
          setScreen('game');
        }} />;
      }
      return <Game
        levelIdx={currentLevel}
        onWin={onWin}
        onExit={() => {
          if (window.location.hash) history.replaceState(null, '', window.location.pathname + window.location.search);
          setScreen('menu');
        }}
      />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
