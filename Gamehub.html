];

const MINE_H=35, MINE_W=12, CELL_M=32;

function generateMineLayer(depth) {
  return Array(MINE_W).fill(null).map(()=>{
    const r=Math.random();
    let acc=0;
    for(const m of [...MINERALS].reverse()){
      if(depth>=m.depth[0]&&depth<=m.depth[1]){
        acc+=m.rarity;
        if(r<acc) return {mineral:m, hp:3+Math.floor(depth/3), maxHp:3+Math.floor(depth/3)};
      }
    }
    return {mineral:MINERALS[1], hp:2, maxHp:2}; // stone default
  });
}

function MiningGame({ onBack }) {
  const [money, setMoney]         = useState(1e50);
  const [totalEarned, setTotalEarned] = useState(0);
  const [pickaxeIdx, setPickaxeIdx] = useState(0);
  const [workers, setWorkers]   = useState({});
  const [depth, setDepth]       = useState(0); // current player row
  const [mine, setMine]         = useState(()=>Array.from({length:MINE_H},(_,r)=>generateMineLayer(r)));
  const [inventory, setInventory] = useState({}); // {mineralId: count}
  const [tab, setTab]           = useState('mine');
  const [digging, setDigging]   = useState(null); // {row,col}
  const [digProgress, setDigProgress] = useState(0);
  const [log, setLog]           = useState([]);
  const [totalMined, setTotalMined] = useState(0);
  const mineRef = useRef(mine);
  useEffect(()=>{ mineRef.current=mine; },[mine]);
  const addLog = m=>setLog(p=>[m,...p].slice(0,10));

  const pickaxe = PICKAXES[pickaxeIdx];

  // Passive income from workers
  useEffect(()=>{
    const iv=setInterval(()=>{
      const totalPassive=Object.entries(workers).reduce((s,[wid,cnt])=>{
        const w=MINE_WORKERS.find(x=>x.id===wid); return s+(w?w.passive*cnt:0);
      },0);
      if(!totalPassive) return;
      // Auto-mine based on current depth
      let earned=0;
      const d=depth;
      const availMinerals=MINERALS.filter(m=>m.depth[0]<=d);
      const pick=availMinerals[Math.floor(Math.random()*availMinerals.length)]||MINERALS[0];
      const qty=Math.min(totalPassive, totalPassive);
      earned=pick.value*qty*0.1;
      setMoney(m=>m+earned);
      setTotalEarned(t=>t+earned);
      setInventory(inv=>({...inv,[pick.id]:(inv[pick.id]||0)+Math.floor(qty*0.1)}));
      addLog(`⛏️ Phu mỏ khai thác ${Math.floor(qty*0.1)} ${pick.icon}${pick.name}`);
    },5000);
    return()=>clearInterval(iv);
  },[workers,depth]);

  // Dig timer
  useEffect(()=>{
    if(!digging) return;
    const {row,col}=digging;
    const cell=mineRef.current[row]?.[col];
    if(!cell||cell.hp<=0){setDigging(null);setDigProgress(0);return;}
    const speed=pickaxe.speed;
    const iv=setInterval(()=>{
      setDigProgress(p=>{
        const np=p+10;
        if(np>=100){
          // Deal damage
          setMine(prev=>{
            const nm=prev.map(r=>[...r]);
            const c=nm[row][col];
            if(!c){setDigging(null);setDigProgress(0);return prev;}
            const newHp=c.hp-pickaxe.dmg;
            if(newHp<=0){
              // Collect mineral
              const m=c.mineral;
              setInventory(inv=>({...inv,[m.id]:(inv[m.id]||0)+1}));
              setTotalMined(t=>t+1);
              addLog(`✅ Đào được ${m.icon}${m.name}! (+${m.value}₫ khi bán)`);
              nm[row][col]=null;
              if(row>depth) setDepth(row);
              setDigging(null);
              return nm;
            }
            nm[row][col]={...c,hp:newHp};
            return nm;
          });
          setDigProgress(0);
          return 0;
        }
        return np;
      });
    }, speed/10);
    return()=>clearInterval(iv);
  },[digging,pickaxe]);

  const clickCell=(row,col)=>{
    if(digging) return;
    const cell=mine[row]?.[col];
    if(!cell) return;
    // Can only dig adjacent to dug cells or top
    const accessible=(row===0)||(row>0&&mine[row-1]?.some(c=>c===null))||mine[row]?.slice(0,col).some(c=>c===null)||mine[row]?.slice(col+1).some(c=>c===null);
    if(!accessible){addLog('❌ Chưa đào tới! Đào các ô phía trên trước.');return;}
    setDigging({row,col});
    setDigProgress(0);
  };

  const sellAll=()=>{
    let total=0;
    Object.entries(inventory).forEach(([mid,qty])=>{const m=MINERALS.find(x=>x.id===mid);if(m)total+=m.value*qty;});
    if(!total){addLog('❌ Không có gì để bán');return;}
    setMoney(p=>p+total);
    setTotalEarned(t=>t+total);
    setInventory({});
    addLog(`💰 Bán tất cả khoáng sản: +${total.toLocaleString()}₫`);
  };

  const buyPickaxe=()=>{
    if(pickaxeIdx>=PICKAXES.length-1){addLog('🏆 Đã có cuốc tốt nhất!');return;}
    const next=PICKAXES[pickaxeIdx+1];
    if(money<next.cost){addLog(`❌ Cần ${next.cost.toLocaleString()}₫`);return;}
    setMoney(m=>m-next.cost);
    setPickaxeIdx(i=>i+1);
    addLog(`⛏️ Nâng cấp lên ${next.icon}${next.name}!`);
  };

  const hireWorker=(w)=>{
    if(money<w.cost){addLog(`❌ Cần ${w.cost.toLocaleString()}₫`);return;}
    setMoney(m=>m-w.cost);
    setWorkers(p=>({...p,[w.id]:(p[w.id]||0)+1}));
    addLog(`${w.icon} Thuê ${w.name}!`);
  };

  const inventoryValue=Object.entries(inventory).reduce((s,[mid,qty])=>{const m=MINERALS.find(x=>x.id===mid);return s+(m?m.value*qty:0);},0);
  const totalWorkerPassive=Object.entries(workers).reduce((s,[wid,cnt])=>{const w=MINE_WORKERS.find(x=>x.id===wid);return s+(w?w.passive*cnt:0);},0);

  // Visible rows centered around depth
  const visStart=Math.max(0,depth-3);
  const visEnd=Math.min(MINE_H-1,visStart+10);

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#1c0a00,#3d1a00)',display:'flex',flexDirection:'column',padding:10,gap:8}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
        <h3 style={{margin:0,color:'#f59e0b',fontSize:14,fontWeight:900}}>⛏️ Đào Mỏ Tỷ Phú</h3>
        <div style={{textAlign:'right'}}><div style={{color:'#fbbf24',fontWeight:900,fontSize:14}}>💰 {money.toLocaleString()}₫</div><div style={{fontSize:9,color:'#64748b'}}>Sâu: {depth}m</div></div>
      </div>

      {/* Stats */}
      <div style={{display:'flex',gap:5}}>
        {[
          {v:pickaxe.icon+pickaxe.name,l:'⛏️ Cuốc'},
          {v:totalMined,l:'🪨 Đã Đào'},
          {v:`+${(inventoryValue).toLocaleString()}`,l:'💎 Kho Hàng'},
          {v:`${totalWorkerPassive}/5s`,l:'👷 Phu Mỏ'},
        ].map((s,i)=>(
          <div key={i} style={{flex:1,background:'rgba(245,158,11,0.06)',border:'1px solid rgba(245,158,11,0.1)',borderRadius:8,padding:'4px',textAlign:'center'}}>
            <div style={{color:'#f59e0b',fontWeight:900,fontSize:10}}>{s.v}</div>
            <div style={{color:'#64748b',fontSize:8}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:4}}>
        {[['mine','⛏️ Mỏ'],['inventory','💎 Kho'],['upgrade','🔨 Nâng Cấp'],['workers','👷 Phu Mỏ']].map(([id,l])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:tab===id?'rgba(245,158,11,0.15)':'rgba(255,255,255,0.04)',border:`1px solid ${tab===id?'rgba(245,158,11,0.4)':'rgba(255,255,255,0.07)'}`,borderRadius:8,padding:'5px 0',color:tab===id?'#f59e0b':'#64748b',fontSize:10,fontWeight:700,cursor:'pointer'}}>{l}</button>
        ))}
      </div>

      {/* Mine view */}
      {tab==='mine'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
          {/* Digging progress */}
          {digging&&(
            <div style={{background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.25)',borderRadius:8,padding:'6px 10px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style={{color:'#f59e0b',fontSize:11,fontWeight:700}}>⛏️ Đang đào...</span>
                <span style={{color:'#f59e0b',fontSize:11}}>{digProgress}%</span>
              </div>
              <div style={{height:8,borderRadius:4,background:'rgba(255,255,255,0.08)'}}>
                <div style={{height:'100%',borderRadius:4,background:'linear-gradient(90deg,#f59e0b,#ef4444)',width:`${digProgress}%`,transition:'width 0.1s'}}/>
              </div>
            </div>
          )}
          <p style={{margin:0,fontSize:10,color:'#64748b'}}>Bấm vào ô để đào • Hàng {visStart+1}–{visEnd+1} / {MINE_H} (sâu {visStart}–{visEnd}m)</p>
          {/* Mine grid */}
          <div style={{overflowX:'auto',overflowY:'auto',maxHeight:350}}>
            <div style={{display:'inline-flex',flexDirection:'column',gap:1}}>
              {mine.slice(visStart,visEnd+1).map((row,ri)=>{
                const absRow=visStart+ri;
                return(
                  <div key={absRow} style={{display:'flex',gap:1,alignItems:'center'}}>
                    <span style={{fontSize:8,color:'#475569',width:22,flexShrink:0,textAlign:'right'}}>{absRow}m</span>
                    {row.map((cell,c)=>{
                      const isDigging=digging?.row===absRow&&digging?.col===c;
                      return(
                        <div key={c} onClick={()=>clickCell(absRow,c)}
                          style={{
                            width:CELL_M,height:CELL_M,
                            background:cell?`${cell.mineral.color}cc`:'rgba(0,0,0,0.6)',
                            border:`1px solid ${isDigging?'#fbbf24':cell?cell.mineral.color+'66':'rgba(0,0,0,0.3)'}`,
                            borderRadius:3,cursor:cell?'pointer':'default',
                            display:'flex',alignItems:'center',justifyContent:'center',
                            fontSize:16,userSelect:'none',
                            boxShadow:isDigging?'0 0 10px #fbbf24':'none',
                            position:'relative',
                          }}>
                          {cell?(
                            <>
                              {cell.mineral.icon}
                              {/* HP bar */}
                              <div style={{position:'absolute',bottom:1,left:1,right:1,height:3,borderRadius:1,background:'rgba(0,0,0,0.4)'}}>
                                <div style={{height:'100%',borderRadius:1,background:'#22c55e',width:`${(cell.hp/cell.maxHp)*100}%`}}/>
                              </div>
                            </>
                          ):(<span style={{fontSize:10,opacity:0.3}}>✓</span>)}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={()=>setDepth(d=>Math.max(0,d-1))} style={{flex:1,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,padding:'6px',color:'#e2e8f0',fontSize:12,cursor:'pointer'}}>⬆ Lên</button>
            <button onClick={()=>setDepth(d=>Math.min(MINE_H-1,d+1))} style={{flex:1,background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.25)',borderRadius:8,padding:'6px',color:'#f59e0b',fontSize:12,cursor:'pointer'}}>⬇ Xuống Sâu</button>
          </div>
        </div>
      )}

      {/* Inventory */}
      {tab==='inventory'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:11,color:'#e2e8f0',fontWeight:700}}>Kho: {inventoryValue.toLocaleString()}₫</span>
            <button onClick={sellAll} style={{background:'linear-gradient(135deg,#22c55e,#16a34a)',border:'none',borderRadius:8,padding:'5px 14px',color:'white',fontSize:11,fontWeight:800,cursor:'pointer'}}>💰 Bán Tất Cả</button>
          </div>
          {MINERALS.map(m=>{
            const qty=inventory[m.id]||0;
            if(!qty) return null;
            return(<div key={m.id} style={{background:`${m.color}18`,border:`1px solid ${m.color}44`,borderRadius:10,padding:'7px 12px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:26}}>{m.icon}</span>
              <div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>{m.name}</div><div style={{fontSize:9,color:'#64748b'}}>×{qty} • {m.value.toLocaleString()}₫/cái</div></div>
              <span style={{color:'#fbbf24',fontWeight:800,fontSize:11}}>{(m.value*qty).toLocaleString()}₫</span>
            </div>);
          })}
          {!Object.values(inventory).some(v=>v>0)&&<div style={{textAlign:'center',color:'#475569',padding:30}}>Chưa có gì. Đào mỏ đi! ⛏️</div>}
        </div>
      )}

      {/* Upgrade pickaxe */}
      {tab==='upgrade'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          <p style={{margin:'0 0 4px',fontSize:10,color:'#64748b'}}>Cuốc hiện tại: {pickaxe.icon}{pickaxe.name} (Sát thương ×{pickaxe.dmg}, tốc độ {pickaxe.speed}ms)</p>
          {PICKAXES.map((p,i)=>{
            const isCurrent=i===pickaxeIdx;
            const isOwned=i<pickaxeIdx;
            const isNext=i===pickaxeIdx+1;
            return(<div key={p.id} style={{background:isCurrent?'rgba(245,158,11,0.12)':isOwned?'rgba(34,197,94,0.06)':'rgba(0,0,0,0.2)',border:`1px solid ${isCurrent?'rgba(245,158,11,0.4)':isOwned?'rgba(34,197,94,0.15)':'rgba(255,255,255,0.04)'}`,borderRadius:10,padding:'8px 12px',display:'flex',alignItems:'center',gap:10,opacity:i>pickaxeIdx+1?0.4:1}}>
              <span style={{fontSize:28}}>{p.icon}</span>
              <div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:isCurrent?'#f59e0b':isOwned?'#22c55e':'#64748b'}}>{p.name} {isCurrent?'← Đang dùng':isOwned?'✅':''}</div><div style={{fontSize:9,color:'#64748b'}}>{p.desc} • Sát thương: {p.dmg} • Speed: {p.speed}ms</div></div>
              {isNext&&<button onClick={buyPickaxe} disabled={money<p.cost} style={{background:money>=p.cost?'linear-gradient(135deg,#f59e0b,#d97706)':'rgba(255,255,255,0.04)',border:'none',borderRadius:8,padding:'5px 10px',color:money>=p.cost?'white':'#475569',fontSize:10,fontWeight:800,cursor:money>=p.cost?'pointer':'default',whiteSpace:'nowrap'}}>{p.cost.toLocaleString()}₫</button>}
            </div>);
          })}
        </div>
      )}

      {/* Workers */}
      {tab==='workers'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          <p style={{margin:'0 0 4px',fontSize:10,color:'#64748b'}}>Phu mỏ tự động khai thác mỗi 5s</p>
          {MINE_WORKERS.map(w=>{
            const count=workers[w.id]||0;
            const canBuy=money>=w.cost;
            return(<div key={w.id} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:10,padding:'8px 12px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:28}}>{w.icon}</span>
              <div style={{flex:1}}><div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>{w.name}</span><span style={{color:'#f59e0b',fontSize:10}}>×{count}</span></div><div style={{fontSize:9,color:'#64748b'}}>{w.desc}</div></div>
              <button onClick={()=>hireWorker(w)} disabled={!canBuy} style={{background:canBuy?'linear-gradient(135deg,#f59e0b,#d97706)':'rgba(255,255,255,0.04)',border:'none',borderRadius:8,padding:'5px 10px',color:canBuy?'#1a0a00':'#475569',fontSize:10,fontWeight:800,cursor:canBuy?'pointer':'default',whiteSpace:'nowrap'}}>{w.cost.toLocaleString()}₫</button>
            </div>);
          })}
        </div>
      )}

      {/* Log */}
      <div style={{background:'rgba(0,0,0,0.4)',borderRadius:8,padding:'5px 8px',maxHeight:55,overflowY:'auto'}}>
        {log.slice(0,3).map((l,i)=><div key={i} style={{fontSize:9,color:'#64748b',lineHeight:1.6}}>{l}</div>)}
        {!log.length&&<div style={{fontSize:9,color:'#475569'}}>Bắt đầu đào mỏ! ⛏️</div>}
      </div>
    </div>
  );
}

// ===================== NHÀ MÁY NƯỚC NGỌT =====================
const SODA_RECIPES = [
  { id:'cola',    name:'Cola Đỏ',         icon:'🥤', ing:{sugar:5,water:10,flavor:2},  time:3,  price:30,   tier:1, desc:'Nước ngọt cổ điển' },

  { id:'orange',  name:'Cam Soda',         icon:'🍊', ing:{sugar:5,water:8,orange:4},    time:5,  price:70,   tier:1, desc:'Hương cam tươi mát' },
  { id:'grape',   name:'Nho Tím',          icon:'🍇', ing:{sugar:6,water:10,grape:5},    time:6,  price:100,  tier:2, desc:'Vị nho ngọt đậm' },
  { id:'energy',  name:'Energy Bomb',      icon:'⚡', ing:{sugar:10,water:5,caffeine:3}, time:8,  price:200,  tier:2, desc:'Tăng lực siêu mạnh' },
  { id:'tropical',name:'Tropical Mix',     icon:'🌺', ing:{sugar:8,water:12,tropical:6}, time:10, price:350,  tier:2, desc:'Hỗn hợp nhiệt đới' },

  { id:'cosmic',  name:'Cosmic Blast',     icon:'🌌', ing:{sugar:20,water:20,cosmic:5},  time:30, price:50000,tier:4, desc:'Vị vũ trụ huyền bí' },
];
const SODA_INGS = [
  {id:'sugar',   name:'Đường',       icon:'🍬', base:2,   mult:1.2},
  {id:'water',   name:'Nước',        icon:'💧', base:1,   mult:1.1},
  {id:'flavor',  name:'Hương Liệu',  icon:'🧪', base:5,   mult:1.3},
  {id:'lemon',   name:'Chanh',       icon:'🍋', base:4,   mult:1.25},
  {id:'orange',  name:'Cam',         icon:'🍊', base:4,   mult:1.25},
  {id:'grape',   name:'Nho',         icon:'🍇', base:5,   mult:1.3},
  {id:'caffeine',name:'Caffeine',    icon:'☕', base:10,  mult:1.4},
  {id:'tropical',name:'Trái Cây Nhiệt Đới',icon:'🥭',base:8,mult:1.35},
  {id:'mineral', name:'Khoáng Chất', icon:'💠', base:15,  mult:1.5},
  {id:'gold',    name:'Vàng Thực Phẩm',icon:'🏆',base:50, mult:1.8},
  {id:'cosmic',  name:'Chất Vũ Trụ', icon:'🌌', base:200, mult:2.0},
];
const SODA_MACHINES = [
  {id:'mixer',   name:'Máy Trộn',      icon:'🔄', cost:1000,   mult:1.4, desc:'Tự động SX Cola, Chanh, Cam'},
  {id:'bottler', name:'Máy Đóng Chai', icon:'🍾', cost:8000,   mult:1.5, desc:'Tự động tier 2'},
  {id:'lab',     name:'Phòng Lab',     icon:'🔬', cost:50000,  mult:1.6, desc:'Tự động tier 3'},
  {id:'cosmic_m',name:'Máy Vũ Trụ',   icon:'🌌', cost:5000000,mult:2.0, desc:'Tự động tất cả × 2'},
];
function fmtW(n){if(!isFinite(n)||n>1e99)return'∞';if(n>=1e12)return(n/1e12).toFixed(1)+'T';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n).toLocaleString();}

function SodaFactory({ onBack }) {
  const [money, setMoney]         = useState(1e50);
  const [totalEarned, setTotalEarned] = useState(0);
  const [ings, setIngs]         = useState({});
  const [ingCounts, setIngCounts] = useState({});
  const [inventory, setInventory] = useState({});
  const [machines, setMachines] = useState({});
  const [making, setMaking]     = useState(null);
  const [makeProgress, setMakeProgress] = useState(0);
  const [tab, setTab]           = useState('brew');
  const [log, setLog]           = useState([]);
  const [brand, setBrand]       = useState('Cola Factory');
  const [brandBonus, setBrandBonus] = useState(1);
  const addLog = m=>setLog(p=>[m,...p].slice(0,10));

  const ingCost=(ing)=>Math.floor(ing.base*Math.pow(ing.mult,ingCounts[ing.id]||0));
  const canBrew=(rec)=>Object.entries(rec.ing).every(([id,qty])=>(ings[id]||0)>=qty);
  const machineMult=()=>{ let m=1; Object.entries(machines).forEach(([id,c])=>{const mc=SODA_MACHINES.find(x=>x.id===id);if(mc)m*=Math.pow(mc.mult,c);}); return Math.min(m,50); };

  useEffect(()=>{
    if(!making) return;
    const rec=SODA_RECIPES.find(r=>r.id===making);
    if(!rec) return;
    const iv=setInterval(()=>{
      setMakeProgress(p=>{
        if(p>=100){
          setInventory(inv=>({...inv,[rec.id]:(inv[rec.id]||0)+1}));
          addLog(`✅ ${rec.icon}${rec.name} hoàn thành!`);
          setMaking(null); setMakeProgress(0); return 0;
        }
        return p+10;
      });
    },rec.time*100);
    return()=>clearInterval(iv);
  },[making]);

  useEffect(()=>{
    const iv=setInterval(()=>{
      Object.entries(machines).forEach(([mid,cnt])=>{
        if(!cnt) return;
        const mc=SODA_MACHINES.find(x=>x.id===mid);
        const tierRecs=SODA_RECIPES.filter(r=>mid==='cosmic_m'||(mid==='mixer'&&r.tier===1)||(mid==='bottler'&&r.tier===2)||(mid==='lab'&&r.tier===3));
        tierRecs.forEach(rec=>{
          if(canBrew(rec)){
            setIngs(prev=>{const n={...prev};Object.entries(rec.ing).forEach(([id,qty])=>n[id]=(n[id]||0)-qty);return n;});
            setInventory(inv=>({...inv,[rec.id]:(inv[rec.id]||0)+cnt}));
          }
        });
      });
    },5000);
    return()=>clearInterval(iv);
  },[machines,ings]);

  const brew=(rec)=>{
    if(making){addLog('⚠️ Đang pha chế!');return;}
    if(!canBrew(rec)){addLog(`❌ Thiếu nguyên liệu cho ${rec.name}`);return;}
    setIngs(prev=>{const n={...prev};Object.entries(rec.ing).forEach(([id,qty])=>n[id]=(n[id]||0)-qty);return n;});
    setMaking(rec.id); setMakeProgress(0);
    addLog(`🥤 Đang pha ${rec.icon}${rec.name}...`);
  };

  const buyIng=(ing,qty=1)=>{
    let total=0,cur=ingCounts[ing.id]||0;
    for(let i=0;i<qty;i++) total+=ingCost({...ing,id:ing.id,base:ing.base,mult:ing.mult});
    if(money<total){addLog(`❌ Cần ${fmtW(total)}₫`);return;}
    setMoney(m=>m-total);
    setIngs(p=>({...p,[ing.id]:(p[ing.id]||0)+qty}));
    setIngCounts(p=>({...p,[ing.id]:(p[ing.id]||0)+qty}));
    addLog(`📦 Mua ${qty}x ${ing.icon}${ing.name}`);
  };

  const sellAll=()=>{
    let total=0;
    Object.entries(inventory).forEach(([id,qty])=>{const r=SODA_RECIPES.find(x=>x.id===id);if(r)total+=r.price*qty*brandBonus*machineMult();});
    total=Math.floor(total);
    if(!total){addLog('❌ Kho trống');return;}
    setMoney(m=>m+total);setTotalEarned(t=>t+total);setInventory({});
    addLog(`💰 Bán hết nước ngọt: +${fmtW(total)}₫`);
  };

  const buyMachine=(mc)=>{
    const cnt=machines[mc.id]||0;
    const cost=Math.floor(mc.cost*Math.pow(1.5,cnt));
    if(money<cost){addLog(`❌ Cần ${fmtW(cost)}₫`);return;}
    setMoney(m=>m-cost);setMachines(p=>({...p,[mc.id]:(p[mc.id]||0)+1}));
    addLog(`${mc.icon} Mua ${mc.name}!`);
  };

  const upgradeBrand=()=>{
    const cost=Math.floor(5000*brandBonus*brandBonus);
    if(money<cost){addLog(`❌ Cần ${fmtW(cost)}₫`);return;}
    setMoney(m=>m-cost);setBrandBonus(b=>b*1.5);
    addLog(`🏆 Nâng cấp thương hiệu! Giá bán ×${(brandBonus*1.5).toFixed(1)}`);
  };

  const invValue=Object.entries(inventory).reduce((s,[id,qty])=>{const r=SODA_RECIPES.find(x=>x.id===id);return s+(r?r.price*qty*brandBonus*machineMult():0);},0);

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#3b0000,#7c0000)',display:'flex',flexDirection:'column',padding:10,gap:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
        <h3 style={{margin:0,color:'#fca5a5',fontSize:13,fontWeight:900}}>🥤 {brand}</h3>
        <div style={{textAlign:'right'}}><div style={{color:'#fbbf24',fontWeight:900,fontSize:13}}>💰 {fmtW(money)}₫</div><div style={{fontSize:9,color:'#64748b'}}>×{brandBonus.toFixed(1)} thương hiệu</div></div>
      </div>
      <div style={{display:'flex',gap:4}}>
        {[['brew','🥤 Pha Chế'],['ings','🧪 Nguyên Liệu'],['sell','💰 Bán Hàng'],['machine','⚙️ Máy']].map(([id,l])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:tab===id?'rgba(252,165,165,0.15)':'rgba(255,255,255,0.04)',border:`1px solid ${tab===id?'rgba(252,165,165,0.4)':'rgba(255,255,255,0.07)'}`,borderRadius:8,padding:'5px 0',color:tab===id?'#fca5a5':'#64748b',fontSize:9,fontWeight:700,cursor:'pointer'}}>{l}</button>
        ))}
      </div>
      {making&&<div style={{background:'rgba(252,165,165,0.1)',border:'1px solid rgba(252,165,165,0.25)',borderRadius:8,padding:'6px 10px'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{color:'#fca5a5',fontSize:11}}>🥤 Đang pha chế...</span><span style={{color:'#fca5a5',fontSize:11}}>{makeProgress}%</span></div><div style={{height:6,borderRadius:3,background:'rgba(255,255,255,0.08)'}}><div style={{height:'100%',borderRadius:3,background:'linear-gradient(90deg,#ef4444,#f97316)',width:`${makeProgress}%`,transition:'width 0.3s'}}/></div></div>}
      {tab==='brew'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          {[1,2,3,4].map(tier=>{
            const recs=SODA_RECIPES.filter(r=>r.tier===tier);
            if(!recs.length) return null;
            return(<div key={tier}><div style={{fontSize:9,color:['#94a3b8','#4ade80','#f59e0b','#a855f7'][tier-1],fontWeight:800,marginBottom:3}}>TIER {tier}</div>
            {recs.map(rec=>{
              const ok=canBrew(rec);
              return(<div key={rec.id} style={{background:ok?'rgba(252,165,165,0.07)':'rgba(0,0,0,0.2)',border:`1px solid ${ok?'rgba(252,165,165,0.2)':'rgba(255,255,255,0.04)'}`,borderRadius:10,padding:'7px 10px',display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <span style={{fontSize:26}}>{rec.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,fontWeight:700,color:ok?'#e2e8f0':'#64748b'}}>{rec.name}</div>
                  <div style={{fontSize:8,color:'#64748b',display:'flex',gap:4,flexWrap:'wrap'}}>
                    {Object.entries(rec.ing).map(([id,qty])=>{const ing=SODA_INGS.find(x=>x.id===id);const have=(ings[id]||0)>=qty;return <span key={id} style={{color:have?'#5eead4':'#f87171'}}>{ing?.icon}{id}:{ings[id]||0}/{qty}</span>;})}
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:9,color:'#fbbf24'}}>{fmtW(Math.floor(rec.price*brandBonus*machineMult()))}₫</div>
                  <button onClick={()=>brew(rec)} disabled={!ok||!!making} style={{background:ok&&!making?'linear-gradient(135deg,#ef4444,#dc2626)':'rgba(255,255,255,0.04)',border:'none',borderRadius:7,padding:'3px 8px',color:ok&&!making?'white':'#475569',fontSize:9,fontWeight:800,cursor:ok&&!making?'pointer':'default'}}>{rec.time}s</button>
                </div>
              </div>);
            })}</div>);
          })}
        </div>
      )}
      {tab==='ings'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
          {SODA_INGS.map(ing=>{
            const c1=ingCost(ing),c10=Array.from({length:10}).reduce((s,_,i)=>s+ingCost({...ing,base:ing.base*Math.pow(ing.mult,i+(ingCounts[ing.id]||0))}),0);
            const h1=money>=c1,h10=money>=c10;
            return(<div key={ing.id} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:9,padding:'6px 10px',display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:22}}>{ing.icon}</span>
              <div style={{flex:1}}><div style={{fontSize:10,fontWeight:700,color:'#e2e8f0'}}>{ing.name}</div><div style={{fontSize:8,color:'#5eead4'}}>Có: {ings[ing.id]||0}</div></div>
              <div style={{display:'flex',gap:4}}>
                <button onClick={()=>buyIng(ing,1)} disabled={!h1} style={{background:h1?'rgba(252,165,165,0.2)':'rgba(255,255,255,0.03)',border:`1px solid ${h1?'#fca5a5':'rgba(255,255,255,0.05)'}`,borderRadius:6,padding:'3px 7px',color:h1?'#fca5a5':'#475569',fontSize:8,fontWeight:700,cursor:h1?'pointer':'default'}}>×1 {fmtW(c1)}₫</button>
                <button onClick={()=>buyIng(ing,10)} disabled={!h10} style={{background:h10?'rgba(252,165,165,0.2)':'rgba(255,255,255,0.03)',border:`1px solid ${h10?'#fca5a5':'rgba(255,255,255,0.05)'}`,borderRadius:6,padding:'3px 7px',color:h10?'#fca5a5':'#475569',fontSize:8,fontWeight:700,cursor:h10?'pointer':'default'}}>×10 {fmtW(c10)}₫</button>
              </div>
            </div>);
          })}
        </div>
      )}
      {tab==='sell'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:11,color:'#e2e8f0',fontWeight:700}}>Kho: {fmtW(Math.floor(invValue))}₫</span>
            <div style={{display:'flex',gap:6}}>
              <button onClick={upgradeBrand} style={{background:'rgba(251,191,36,0.15)',border:'1px solid rgba(251,191,36,0.3)',borderRadius:8,padding:'4px 10px',color:'#fbbf24',fontSize:10,cursor:'pointer',fontWeight:700}}>🏆 Brand ({fmtW(Math.floor(5000*brandBonus*brandBonus))}₫)</button>
              <button onClick={sellAll} style={{background:'linear-gradient(135deg,#22c55e,#16a34a)',border:'none',borderRadius:8,padding:'4px 12px',color:'white',fontSize:11,fontWeight:800,cursor:'pointer'}}>💰 Bán Hết</button>
            </div>
          </div>
          {SODA_RECIPES.map(r=>{const qty=inventory[r.id]||0;if(!qty) return null;return(<div key={r.id} style={{background:'rgba(34,197,94,0.07)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:10,padding:'7px 12px',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:26}}>{r.icon}</span><div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>{r.name}</div><div style={{fontSize:9,color:'#64748b'}}>×{qty} • {fmtW(Math.floor(r.price*brandBonus*machineMult()))}₫/chai</div></div>
            <div style={{color:'#22c55e',fontWeight:800,fontSize:11}}>+{fmtW(Math.floor(r.price*qty*brandBonus*machineMult()))}₫</div>
          </div>);})}
          {!Object.values(inventory).some(v=>v>0)&&<div style={{textAlign:'center',color:'#475569',padding:30}}>Kho trống! Pha chế đi! 🥤</div>}
        </div>
      )}
      {tab==='machine'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          {SODA_MACHINES.map(mc=>{const cnt=machines[mc.id]||0;const cost=Math.floor(mc.cost*Math.pow(1.5,cnt));const canBuy=money>=cost;return(<div key={mc.id} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:10,padding:'8px 12px',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:28}}>{mc.icon}</span><div style={{flex:1}}><div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>{mc.name}</span><span style={{color:'#fca5a5',fontSize:10}}>×{cnt}</span></div><div style={{fontSize:9,color:'#64748b'}}>{mc.desc}</div></div>
            <button onClick={()=>buyMachine(mc)} disabled={!canBuy} style={{background:canBuy?'linear-gradient(135deg,#ef4444,#dc2626)':'rgba(255,255,255,0.04)',border:'none',borderRadius:8,padding:'5px 10px',color:canBuy?'white':'#475569',fontSize:9,fontWeight:800,cursor:canBuy?'pointer':'default',whiteSpace:'nowrap'}}>{fmtW(cost)}₫</button>
          </div>);})}
        </div>
      )}
      <div style={{background:'rgba(0,0,0,0.3)',borderRadius:8,padding:'4px 8px',maxHeight:50,overflowY:'auto'}}>
        {log.slice(0,2).map((l,i)=><div key={i} style={{fontSize:9,color:'#64748b',lineHeight:1.6}}>{l}</div>)}
      </div>
    </div>
  );
}

  {id:'steel',    name:'Thép',        icon:'⚙️', base:10,  mult:1.25},
  {id:'copper',   name:'Đồng',        icon:'🟤', base:8,   mult:1.2 },
  {id:'wood',     name:'Gỗ',          icon:'🪵', base:5,   mult:1.15},

  {id:'explosive',name:'Thuốc Nổ',   icon:'💣', base:40,  mult:1.4 },
  {id:'rocket',   name:'Rocket',      icon:'🚀', base:100, mult:1.5 },

function WeaponsFactory({ onBack }) {
  const [money, setMoney]         = useState(1e50);
  const [totalEarned, setTotalEarned] = useState(0);
  const [mats, setMats]         = useState({});
  const [matCounts, setMatCounts] = useState({});
  const [inventory, setInventory] = useState({});
  const [making, setMaking]     = useState(null);
  const [makeProgress, setMakeProgress] = useState(0);
  const [contracts, setContracts] = useState([]); // active army contracts
  const [tab, setTab]           = useState('factory');
  const [log, setLog]           = useState([]);
  const [research, setResearch] = useState(1); // research multiplier
  const contractId = useRef(0);
  const addLog = m=>setLog(p=>[m,...p].slice(0,10));

  const canMake=(prod)=>Object.entries(prod.mat).every(([id,qty])=>(mats[id]||0)>=qty);
  const matCost=(mat,cnt)=>Math.floor(mat.base*Math.pow(mat.mult,cnt));
  const calcBuyCost=(mat,qty)=>Array.from({length:qty}).reduce((s,_,i)=>s+matCost(mat,(matCounts[mat.id]||0)+i),0);

  useEffect(()=>{
    if(!making) return;
    const prod=WEAPONS_PRODUCTS.find(p=>p.id===making);
    if(!prod) return;
    const iv=setInterval(()=>{
      setMakeProgress(p=>{
        if(p>=100){
          setInventory(inv=>({...inv,[prod.id]:(inv[prod.id]||0)+1}));
          addLog(`✅ ${prod.icon}${prod.name} hoàn thành!`);
          setMaking(null); setMakeProgress(0); return 0;
        }
        return p+Math.max(1,10/research);
      });
    }, prod.time*100/research);
    return()=>clearInterval(iv);
  },[making,research]);

  // Contracts - random army orders
  useEffect(()=>{
    const iv=setInterval(()=>{
      if(contracts.length<3){
        const prod=WEAPONS_PRODUCTS[Math.floor(Math.random()*WEAPONS_PRODUCTS.length)];
        const qty=Math.floor(Math.random()*5)+1;
        const bonus=Math.random()<0.2?3:1.5;
        contracts.push({id:contractId.current++,prod,qty,bonus,timeLeft:120});
        setContracts([...contracts]);
        addLog(`📋 HĐ mới: ${prod.icon}${prod.name} ×${qty} (×${bonus.toFixed(1)} giá)`);
      }
      setContracts(prev=>prev.map(c=>({...c,timeLeft:c.timeLeft-10})).filter(c=>c.timeLeft>0));
    },10000);
    return()=>clearInterval(iv);
  },[contracts]);

  const startMake=(prod)=>{
    if(making){addLog('⚠️ Đang sản xuất!');return;}
    if(!canMake(prod)){addLog(`❌ Thiếu vật liệu`);return;}
    setMats(prev=>{const n={...prev};Object.entries(prod.mat).forEach(([id,qty])=>n[id]=(n[id]||0)-qty);return n;});
    setMaking(prod.id); setMakeProgress(0);
    addLog(`🔨 SX ${prod.icon}${prod.name}...`);
  };

  const buyMat=(mat,qty)=>{
    const cost=calcBuyCost(mat,qty);
    if(money<cost){addLog(`❌ Cần ${fmtW(cost)}₫`);return;}
    setMoney(m=>m-cost);
    setMats(p=>({...p,[mat.id]:(p[mat.id]||0)+qty}));
    setMatCounts(p=>({...p,[mat.id]:(p[mat.id]||0)+qty}));
    addLog(`📦 Mua ${qty}x ${mat.icon}${mat.name}`);
  };

  const fulfillContract=(c)=>{
    const {prod,qty,bonus}=c;
    if((inventory[prod.id]||0)<qty){addLog(`❌ Cần ${qty}x ${prod.name}`);return;}
    const earned=Math.floor(prod.price*qty*bonus*research);
    setInventory(inv=>({...inv,[prod.id]:(inv[prod.id]||0)-qty}));
    setMoney(m=>m+earned);setTotalEarned(t=>t+earned);
    setContracts(prev=>prev.filter(x=>x.id!==c.id));
    addLog(`💰 Hoàn thành HĐ ${prod.icon} ×${qty}: +${fmtW(earned)}₫`);
  };

  const sellProduct=(prod)=>{
    const qty=inventory[prod.id]||0;
    if(!qty){addLog('❌ Kho trống');return;}
    const earned=Math.floor(prod.price*qty*research);
    setMoney(m=>m+earned);setTotalEarned(t=>t+earned);
    setInventory(inv=>({...inv,[prod.id]:0}));
    addLog(`💰 Bán ${qty}x ${prod.icon}${prod.name}: +${fmtW(earned)}₫`);
  };

  const doResearch=()=>{
    const cost=Math.floor(50000*research*research);
    if(money<cost){addLog(`❌ Cần ${fmtW(cost)}₫`);return;}
    setMoney(m=>m-cost);setResearch(r=>r*1.3);
    addLog(`🔬 R&D nâng cấp! SX nhanh hơn ×${(research*1.3).toFixed(1)}`);
  };

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#1a1a00,#2d2d00)',display:'flex',flexDirection:'column',padding:10,gap:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
        <h3 style={{margin:0,color:'#fde047',fontSize:13,fontWeight:900}}>🔫 Nhà Máy Xe & Súng</h3>
        <div style={{textAlign:'right'}}><div style={{color:'#fbbf24',fontWeight:900,fontSize:13}}>💰 {fmtW(money)}₫</div><div style={{fontSize:9,color:'#64748b'}}>R&D ×{research.toFixed(1)}</div></div>
      </div>
      <div style={{display:'flex',gap:4}}>
        {[['factory','🔨 SX'],['materials','📦 VL'],['contracts','📋 HĐ'],['sell','💰 Bán']].map(([id,l])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:tab===id?'rgba(253,224,71,0.15)':'rgba(255,255,255,0.04)',border:`1px solid ${tab===id?'rgba(253,224,71,0.4)':'rgba(255,255,255,0.07)'}`,borderRadius:8,padding:'5px 0',color:tab===id?'#fde047':'#64748b',fontSize:9,fontWeight:700,cursor:'pointer'}}>{l}</button>
        ))}
      </div>
      {making&&<div style={{background:'rgba(253,224,71,0.1)',border:'1px solid rgba(253,224,71,0.25)',borderRadius:8,padding:'6px 10px'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{color:'#fde047',fontSize:11}}>🔨 Đang SX...</span><span style={{color:'#fde047',fontSize:11}}>{Math.floor(makeProgress)}%</span></div><div style={{height:6,borderRadius:3,background:'rgba(255,255,255,0.08)'}}><div style={{height:'100%',borderRadius:3,background:'linear-gradient(90deg,#fde047,#f97316)',width:`${makeProgress}%`,transition:'width 0.2s'}}/></div></div>}
      {tab==='factory'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:10,color:'#64748b'}}>R&D ×{research.toFixed(1)} — SX nhanh hơn</span>
            <button onClick={doResearch} style={{background:'rgba(59,130,246,0.15)',border:'1px solid rgba(59,130,246,0.3)',borderRadius:8,padding:'3px 10px',color:'#60a5fa',fontSize:9,cursor:'pointer',fontWeight:700}}>🔬 Nghiên Cứu ({fmtW(Math.floor(50000*research*research))}₫)</button>
          </div>
          {[1,2,3,4,5].map(tier=>{
            const prods=WEAPONS_PRODUCTS.filter(p=>p.tier===tier);
            const colors=['#94a3b8','#4ade80','#f59e0b','#f87171','#a855f7'];
            return(<div key={tier}><div style={{fontSize:9,color:colors[tier-1],fontWeight:800,marginBottom:3}}>TIER {tier}</div>
            {prods.map(prod=>{
              const ok=canMake(prod);
              return(<div key={prod.id} style={{background:ok?'rgba(253,224,71,0.07)':'rgba(0,0,0,0.2)',border:`1px solid ${ok?'rgba(253,224,71,0.2)':'rgba(255,255,255,0.04)'}`,borderRadius:10,padding:'7px 10px',display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <span style={{fontSize:24}}>{prod.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,fontWeight:700,color:ok?'#e2e8f0':'#64748b'}}>{prod.name}</div>
                  <div style={{fontSize:8,color:'#64748b',display:'flex',gap:3,flexWrap:'wrap'}}>
                    {Object.entries(prod.mat).map(([id,qty])=>{const m=WEAPON_MATS.find(x=>x.id===id);const h=(mats[id]||0)>=qty;return <span key={id} style={{color:h?'#5eead4':'#f87171'}}>{m?.icon}{id}:{mats[id]||0}/{qty}</span>;})}
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:8,color:'#fbbf24'}}>{fmtW(Math.floor(prod.price*research))}₫</div>
                  <button onClick={()=>startMake(prod)} disabled={!ok||!!making} style={{background:ok&&!making?'linear-gradient(135deg,#fde047,#d97706)':'rgba(255,255,255,0.04)',border:'none',borderRadius:7,padding:'3px 7px',color:ok&&!making?'#1a1a00':'#475569',fontSize:8,fontWeight:800,cursor:ok&&!making?'pointer':'default'}}>{Math.ceil(prod.time/research)}s</button>
                </div>
              </div>);
            })}</div>);
          })}
        </div>
      )}
      {tab==='materials'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
          {WEAPON_MATS.map(mat=>{
            const c1=matCost(mat,matCounts[mat.id]||0);
            const c10=calcBuyCost(mat,10);
            const h1=money>=c1,h10=money>=c10;
            return(<div key={mat.id} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:9,padding:'6px 10px',display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:22}}>{mat.icon}</span>
              <div style={{flex:1}}><div style={{fontSize:10,fontWeight:700,color:'#e2e8f0'}}>{mat.name}</div><div style={{fontSize:8,color:'#5eead4'}}>Có: {mats[mat.id]||0}</div></div>
              <div style={{display:'flex',gap:4}}>
                <button onClick={()=>buyMat(mat,1)} disabled={!h1} style={{background:h1?'rgba(253,224,71,0.15)':'rgba(255,255,255,0.03)',border:`1px solid ${h1?'#fde047':'rgba(255,255,255,0.05)'}`,borderRadius:6,padding:'3px 7px',color:h1?'#fde047':'#475569',fontSize:8,fontWeight:700,cursor:h1?'pointer':'default'}}>×1 {fmtW(c1)}₫</button>
                <button onClick={()=>buyMat(mat,10)} disabled={!h10} style={{background:h10?'rgba(253,224,71,0.15)':'rgba(255,255,255,0.03)',border:`1px solid ${h10?'#fde047':'rgba(255,255,255,0.05)'}`,borderRadius:6,padding:'3px 7px',color:h10?'#fde047':'#475569',fontSize:8,fontWeight:700,cursor:h10?'pointer':'default'}}>×10 {fmtW(c10)}₫</button>
              </div>
            </div>);
          })}
        </div>
      )}
      {tab==='contracts'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          <p style={{margin:0,fontSize:10,color:'#64748b'}}>Hợp đồng quân đội — tự động mới sau 10s</p>
          {!contracts.length&&<div style={{textAlign:'center',color:'#475569',padding:30}}>Đang chờ hợp đồng...</div>}
          {contracts.map(c=>{
            const canFulfill=(inventory[c.prod.id]||0)>=c.qty;
            return(<div key={c.id} style={{background:canFulfill?'rgba(253,224,71,0.1)':'rgba(0,0,0,0.2)',border:`1px solid ${canFulfill?'rgba(253,224,71,0.3)':'rgba(255,255,255,0.05)'}`,borderRadius:10,padding:'8px 12px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:26}}>{c.prod.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>{c.prod.name} ×{c.qty}</div>
                <div style={{fontSize:9,color:'#64748b'}}>Kho: {inventory[c.prod.id]||0}/{c.qty} • ×{c.bonus.toFixed(1)} giá • {c.timeLeft}s</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:9,color:'#fbbf24',fontWeight:700}}>{fmtW(Math.floor(c.prod.price*c.qty*c.bonus*research))}₫</div>
                <button onClick={()=>fulfillContract(c)} disabled={!canFulfill} style={{background:canFulfill?'linear-gradient(135deg,#22c55e,#16a34a)':'rgba(255,255,255,0.04)',border:'none',borderRadius:7,padding:'3px 8px',color:canFulfill?'white':'#475569',fontSize:9,fontWeight:800,cursor:canFulfill?'pointer':'default'}}>Giao Hàng</button>
              </div>
            </div>);
          })}
        </div>
      )}
      {tab==='sell'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          {WEAPONS_PRODUCTS.map(prod=>{const qty=inventory[prod.id]||0;if(!qty) return null;return(<div key={prod.id} onClick={()=>sellProduct(prod)} style={{background:'rgba(34,197,94,0.07)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:10,padding:'7px 12px',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
            <span style={{fontSize:24}}>{prod.icon}</span><div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>{prod.name}</div><div style={{fontSize:9,color:'#64748b'}}>×{qty} • {fmtW(Math.floor(prod.price*research))}₫/cái</div></div>
            <div style={{color:'#22c55e',fontWeight:800,fontSize:11}}>+{fmtW(Math.floor(prod.price*qty*research))}₫</div>
          </div>);})}
          {!Object.values(inventory).some(v=>v>0)&&<div style={{textAlign:'center',color:'#475569',padding:30}}>Kho trống! Sản xuất vũ khí đi! 🔫</div>}
        </div>
      )}
      <div style={{background:'rgba(0,0,0,0.3)',borderRadius:8,padding:'4px 8px',maxHeight:50,overflowY:'auto'}}>
        {log.slice(0,2).map((l,i)=><div key={i} style={{fontSize:9,color:'#64748b',lineHeight:1.6}}>{l}</div>)}
      </div>
    </div>
  );
}

  {id:'silk',      name:'Lụa Cao Cấp',   icon:'✨', base:20,   mult:1.35},
  {id:'button',    name:'Cúc Áo',         icon:'⚪', base:2,    mult:1.15},
  {id:'leather',   name:'Da Thuộc',       icon:'🟤', base:25,   mult:1.3},
  {id:'wool',      name:'Len Merino',     icon:'🐑', base:15,   mult:1.3},
  {id:'lining',    name:'Vải Lót',        icon:'🪡', base:10,   mult:1.25},
  {id:'lace',      name:'Ren Bỉ',        icon:'🌺', base:30,   mult:1.4},
  {id:'nylon',     name:'Vải Nylon',      icon:'💠', base:8,    mult:1.2},
  {id:'elastic',   name:'Thun Co Dãn',   icon:'🔄', base:5,    mult:1.2},
  {id:'gold_thread',name:'Chỉ Vàng',    icon:'🟡', base:200,  mult:1.6},
  {id:'diamond_button',name:'Cúc Kim Cương',icon:'💎',base:1000,mult:1.8},
  {id:'exotic',    name:'Vật Liệu Hiếm', icon:'🌌', base:50000,mult:2.5},
];

const CLOTHING_MACHINES = [
  {id:'sewing',   name:'Máy May',         icon:'🪡', cost:2000,    mult:1.4, tier:1, desc:'Tự động may tier 1'},
  {id:'cutter',   name:'Máy Cắt Vải',    icon:'✂️', cost:10000,   mult:1.5, tier:2, desc:'Tự động tier 2'},
  {id:'embroid',  name:'Máy Thêu',        icon:'🌸', cost:80000,   mult:1.6, tier:3, desc:'Tự động tier 3+'},
  {id:'robot_tailor',name:'Robot Thợ May',icon:'🤖',cost:5000000, mult:2.0, tier:0, desc:'Tự động tất cả ×2'},
];

const FASHION_BRANDS = [
  {id:'local',   name:'Thương Hiệu Địa Phương',  mult:1.0,  unlock:0},
  {id:'national',name:'Thương Hiệu Quốc Gia',     mult:2.0,  unlock:50000},
  {id:'regional',name:'Thương Hiệu Khu Vực',      mult:5.0,  unlock:500000},
  {id:'global',  name:'Thương Hiệu Toàn Cầu',     mult:15.0, unlock:10000000},
  {id:'luxury',  name:'Nhãn Hiệu Luxury',          mult:50.0, unlock:500000000},
  {id:'legend',  name:'Huyền Thoại Thời Trang',   mult:200.0,unlock:50000000000},
];

function fmtC(n){if(!isFinite(n)||n>1e99)return'∞';if(n>=1e12)return(n/1e12).toFixed(1)+'T';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n).toLocaleString();}

function ClothingFactory({ onBack }) {
  const [money, setMoney]       = useState(1e50);
  const [totalEarned, setTotalEarned] = useState(0);
  const [mats, setMats]         = useState({});
  const [matCounts, setMatCounts] = useState({});
  const [inventory, setInventory] = useState({});
  const [machines, setMachines] = useState({});
  const [making, setMaking]     = useState(null);
  const [makeProgress, setMakeProgress] = useState(0);
  const [brandIdx, setBrandIdx] = useState(0);
  const [tab, setTab]           = useState('sew');
  const [log, setLog]           = useState([]);
  const [fame, setFame]         = useState(0); // fashion fame points
  const [season, setSeason]     = useState('Xuân Hè'); // fashion season
  const addLog = m=>setLog(p=>[m,...p].slice(0,10));

  const brand = FASHION_BRANDS[brandIdx];
  const brandMult = brand.mult;
  const machineMult = () => { let m=1; Object.entries(machines).forEach(([id,c])=>{const mc=CLOTHING_MACHINES.find(x=>x.id===id);if(mc)m*=Math.pow(mc.mult,c);}); return Math.min(m,100); };
  const canMake = (prod) => Object.entries(prod.mat).every(([id,qty])=>(mats[id]||0)>=qty);
  const matCost = (mat,cnt) => Math.floor(mat.base*Math.pow(mat.mult,cnt));
  const calcBuy = (mat,qty) => Array.from({length:qty}).reduce((s,_,i)=>s+matCost(mat,(matCounts[mat.id]||0)+i),0);

  // Making timer
  useEffect(()=>{
    if(!making) return;
    const prod=CLOTHING_PRODUCTS.find(p=>p.id===making);
    if(!prod) return;
    const iv=setInterval(()=>{
      setMakeProgress(p=>{
        if(p>=100){
          setInventory(inv=>({...inv,[prod.id]:(inv[prod.id]||0)+1}));
          setFame(f=>f+prod.tier*10);
          addLog(`✅ ${prod.icon}${prod.name} hoàn thành! +${prod.tier*10} danh tiếng`);
          setMaking(null); setMakeProgress(0); return 0;
        }
        return p+10;
      });
    }, prod.time*100);
    return()=>clearInterval(iv);
  },[making]);

  // Machine auto-production every 8s
  useEffect(()=>{
    const iv=setInterval(()=>{
      Object.entries(machines).forEach(([mid,cnt])=>{
        if(!cnt) return;
        const mc=CLOTHING_MACHINES.find(x=>x.id===mid);
        const prods=CLOTHING_PRODUCTS.filter(p=>mc.tier===0||p.tier<=mc.tier);
        prods.forEach(prod=>{
          for(let i=0;i<cnt;i++){
            if(canMake(prod)){
              setMats(prev=>{const n={...prev};Object.entries(prod.mat).forEach(([id,qty])=>n[id]=(n[id]||0)-qty);return n;});
              setInventory(inv=>({...inv,[prod.id]:(inv[prod.id]||0)+1}));
            }
          }
        });
      });
    },8000);
    return()=>clearInterval(iv);
  },[machines,mats]);

  // Brand unlock check
  useEffect(()=>{
    const nextIdx=FASHION_BRANDS.findIndex(b=>b.unlock>totalEarned)-1;
    const maxBrand=FASHION_BRANDS.filter(b=>totalEarned>=b.unlock).length-1;
    if(maxBrand>brandIdx){
      setBrandIdx(maxBrand);
      addLog(`🎉 Mở khoá thương hiệu: ${FASHION_BRANDS[maxBrand].name}! ×${FASHION_BRANDS[maxBrand].mult}`);
    }
  },[totalEarned]);

  const startMake=(prod)=>{
    if(making){addLog('⚠️ Đang may!');return;}
    if(!canMake(prod)){addLog(`❌ Thiếu vật liệu`);return;}
    setMats(prev=>{const n={...prev};Object.entries(prod.mat).forEach(([id,qty])=>n[id]=(n[id]||0)-qty);return n;});
    setMaking(prod.id); setMakeProgress(0);
    addLog(`✂️ Đang may ${prod.icon}${prod.name}...`);
  };

  const buyMat=(mat,qty)=>{
    const cost=calcBuy(mat,qty);
    if(money<cost){addLog(`❌ Cần ${fmtC(cost)}₫`);return;}
    setMoney(m=>m-cost);
    setMats(p=>({...p,[mat.id]:(p[mat.id]||0)+qty}));
    setMatCounts(p=>({...p,[mat.id]:(p[mat.id]||0)+qty}));
  };

  const sellAll=()=>{
    let total=0;
    Object.entries(inventory).forEach(([id,qty])=>{
      const p=CLOTHING_PRODUCTS.find(x=>x.id===id);
      if(p) total+=p.price*qty*brandMult*machineMult();
    });
    total=Math.floor(total);
    if(!total){addLog('❌ Kho trống');return;}
    setMoney(m=>m+total);setTotalEarned(t=>t+total);setInventory({});
    addLog(`💰 Bán hết: +${fmtC(total)}₫`);
  };

  const buyMachine=(mc)=>{
    const cnt=machines[mc.id]||0;
    const cost=Math.floor(mc.cost*Math.pow(1.6,cnt));
    if(money<cost){addLog(`❌ Cần ${fmtC(cost)}₫`);return;}
    setMoney(m=>m-cost);setMachines(p=>({...p,[mc.id]:(p[mc.id]||0)+1}));
    addLog(`${mc.icon} Mua ${mc.name} thứ ${cnt+1}!`);
  };

  const invValue=Object.entries(inventory).reduce((s,[id,qty])=>{const p=CLOTHING_PRODUCTS.find(x=>x.id===id);return s+(p?p.price*qty*brandMult*machineMult():0);},0);
  const TIER_COLORS={1:'#94a3b8',2:'#4ade80',3:'#f59e0b',4:'#f0abfc',5:'#fbbf24'};

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#1a0a30,#2d1b69)',display:'flex',flexDirection:'column',padding:10,gap:8}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
        <div style={{textAlign:'center'}}>
          <div style={{color:'#d8b4fe',fontWeight:900,fontSize:13}}>👗 {brand.name}</div>
          <div style={{fontSize:9,color:'#64748b'}}>×{brandMult} giá • ⭐{fmtC(fame)} danh tiếng</div>
        </div>
        <div style={{textAlign:'right'}}><div style={{color:'#fbbf24',fontWeight:900,fontSize:13}}>💰 {fmtC(money)}₫</div><div style={{fontSize:9,color:'#64748b'}}>Kho: {fmtC(Math.floor(invValue))}₫</div></div>
      </div>

      {/* Brand progress */}
      <div style={{background:'rgba(216,180,254,0.06)',border:'1px solid rgba(216,180,254,0.15)',borderRadius:8,padding:'5px 10px'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
          <span style={{fontSize:9,color:'#d8b4fe',fontWeight:700}}>{brand.name}</span>
          {brandIdx<FASHION_BRANDS.length-1&&<span style={{fontSize:9,color:'#64748b'}}>Tiếp: {fmtC(FASHION_BRANDS[brandIdx+1].unlock)}₫</span>}
        </div>
        <div style={{display:'flex',gap:2}}>
          {FASHION_BRANDS.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=brandIdx?'#a855f7':'rgba(255,255,255,0.08)'}}/>)}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:4}}>
        {[['sew','✂️ May'],['mats','🧵 Vải'],['sell','💰 Bán'],['machine','⚙️ Máy']].map(([id,l])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:tab===id?'rgba(216,180,254,0.15)':'rgba(255,255,255,0.04)',border:`1px solid ${tab===id?'rgba(216,180,254,0.4)':'rgba(255,255,255,0.07)'}`,borderRadius:8,padding:'5px 0',color:tab===id?'#d8b4fe':'#64748b',fontSize:10,fontWeight:700,cursor:'pointer'}}>{l}</button>
        ))}
      </div>

      {/* Making progress */}
      {making&&(
        <div style={{background:'rgba(216,180,254,0.08)',border:'1px solid rgba(216,180,254,0.2)',borderRadius:8,padding:'6px 10px'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
            <span style={{color:'#d8b4fe',fontSize:11}}>✂️ Đang may...</span>
            <span style={{color:'#d8b4fe',fontSize:11}}>{makeProgress}%</span>
          </div>
          <div style={{height:6,borderRadius:3,background:'rgba(255,255,255,0.08)'}}>
            <div style={{height:'100%',borderRadius:3,background:'linear-gradient(90deg,#a855f7,#ec4899)',width:`${makeProgress}%`,transition:'width 0.2s'}}/>
          </div>
        </div>
      )}

      {/* Sew tab */}
      {tab==='sew'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
          {[1,2,3,4,5].map(tier=>{
            const prods=CLOTHING_PRODUCTS.filter(p=>p.tier===tier);
            return(<div key={tier}><div style={{fontSize:9,color:TIER_COLORS[tier],fontWeight:800,marginBottom:3}}>TIER {tier}</div>
            {prods.map(prod=>{
              const ok=canMake(prod);
              const sellPrc=Math.floor(prod.price*brandMult*machineMult());
              return(<div key={prod.id} style={{background:ok?'rgba(168,85,247,0.08)':'rgba(0,0,0,0.2)',border:`1px solid ${ok?'rgba(168,85,247,0.25)':'rgba(255,255,255,0.04)'}`,borderRadius:10,padding:'7px 10px',display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <span style={{fontSize:26}}>{prod.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,fontWeight:700,color:ok?'#e2e8f0':'#64748b'}}>{prod.name}</div>
                  <div style={{fontSize:8,color:'#64748b',display:'flex',gap:3,flexWrap:'wrap'}}>
                    {Object.entries(prod.mat).map(([id,qty])=>{const m=CLOTHING_MATS.find(x=>x.id===id);const h=(mats[id]||0)>=qty;return<span key={id} style={{color:h?'#5eead4':'#f87171'}}>{m?.icon}{id.slice(0,4)}:{mats[id]||0}/{qty}</span>;})}
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:9,color:'#fbbf24',fontWeight:700}}>{fmtC(sellPrc)}₫</div>
                  <div style={{fontSize:8,color:'#64748b'}}>kho:{inventory[prod.id]||0}</div>
                  <button onClick={()=>startMake(prod)} disabled={!ok||!!making} style={{background:ok&&!making?'linear-gradient(135deg,#a855f7,#7c3aed)':'rgba(255,255,255,0.04)',border:'none',borderRadius:6,padding:'3px 8px',color:ok&&!making?'white':'#475569',fontSize:8,fontWeight:800,cursor:ok&&!making?'pointer':'default',marginTop:2}}>{prod.time}s</button>
                </div>
              </div>);
            })}</div>);
          })}
        </div>
      )}

      {/* Materials tab */}
      {tab==='mats'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
          {CLOTHING_MATS.map(mat=>{
            const c1=matCost(mat,matCounts[mat.id]||0);
            const c10=calcBuy(mat,10);
            const h1=money>=c1,h10=money>=c10;
            return(<div key={mat.id} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:9,padding:'6px 10px',display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:22}}>{mat.icon}</span>
              <div style={{flex:1}}><div style={{fontSize:10,fontWeight:700,color:'#e2e8f0'}}>{mat.name}</div><div style={{fontSize:8,color:'#5eead4'}}>Có: {mats[mat.id]||0}</div></div>
              <div style={{display:'flex',gap:4}}>
                <button onClick={()=>buyMat(mat,1)} disabled={!h1} style={{background:h1?'rgba(168,85,247,0.2)':'rgba(255,255,255,0.03)',border:`1px solid ${h1?'#a855f7':'rgba(255,255,255,0.05)'}`,borderRadius:6,padding:'3px 7px',color:h1?'#d8b4fe':'#475569',fontSize:8,fontWeight:700,cursor:h1?'pointer':'default',whiteSpace:'nowrap'}}>×1 {fmtC(c1)}₫</button>
                <button onClick={()=>buyMat(mat,10)} disabled={!h10} style={{background:h10?'rgba(168,85,247,0.2)':'rgba(255,255,255,0.03)',border:`1px solid ${h10?'#a855f7':'rgba(255,255,255,0.05)'}`,borderRadius:6,padding:'3px 7px',color:h10?'#d8b4fe':'#475569',fontSize:8,fontWeight:700,cursor:h10?'pointer':'default',whiteSpace:'nowrap'}}>×10 {fmtC(c10)}₫</button>
              </div>
            </div>);
          })}
        </div>
      )}

      {/* Sell tab */}
      {tab==='sell'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:11,color:'#d8b4fe',fontWeight:700}}>Hệ số: ×{brandMult} thương hiệu × ×{machineMult().toFixed(1)} máy</div><div style={{fontSize:9,color:'#64748b'}}>Tổng thu: {fmtC(totalEarned)}₫</div></div>
            <button onClick={sellAll} style={{background:'linear-gradient(135deg,#22c55e,#16a34a)',border:'none',borderRadius:8,padding:'6px 14px',color:'white',fontSize:11,fontWeight:800,cursor:'pointer'}}>💰 Bán Hết</button>
          </div>
          {CLOTHING_PRODUCTS.map(prod=>{const qty=inventory[prod.id]||0;if(!qty)return null;const val=Math.floor(prod.price*qty*brandMult*machineMult());return(<div key={prod.id} style={{background:'rgba(34,197,94,0.07)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:10,padding:'7px 12px',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:24}}>{prod.icon}</span>
            <div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>{prod.name}</div><div style={{fontSize:9,color:'#64748b'}}>×{qty} • {fmtC(Math.floor(prod.price*brandMult*machineMult()))}₫/cái</div></div>
            <div style={{color:'#22c55e',fontWeight:800,fontSize:11}}>+{fmtC(val)}₫</div>
          </div>);})}
          {!Object.values(inventory).some(v=>v>0)&&<div style={{textAlign:'center',color:'#475569',padding:30}}>Kho trống! May đồ đi! ✂️</div>}
        </div>
      )}

      {/* Machines tab */}
      {tab==='machine'&&(
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
          <p style={{margin:'0 0 4px',fontSize:10,color:'#64748b'}}>Máy tự động may mỗi 8 giây</p>
          {CLOTHING_MACHINES.map(mc=>{
            const cnt=machines[mc.id]||0;
            const cost=Math.floor(mc.cost*Math.pow(1.6,cnt));
            const canBuy=money>=cost;
            return(<div key={mc.id} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:10,padding:'8px 12px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:28}}>{mc.icon}</span>
              <div style={{flex:1}}><div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>{mc.name}</span><span style={{color:'#d8b4fe',fontSize:10}}>×{cnt}</span></div><div style={{fontSize:9,color:'#64748b'}}>{mc.desc}</div></div>
              <button onClick={()=>buyMachine(mc)} disabled={!canBuy} style={{background:canBuy?'linear-gradient(135deg,#a855f7,#7c3aed)':'rgba(255,255,255,0.04)',border:'none',borderRadius:8,padding:'5px 10px',color:canBuy?'white':'#475569',fontSize:9,fontWeight:800,cursor:canBuy?'pointer':'default',whiteSpace:'nowrap'}}>{fmtC(cost)}₫</button>
            </div>);
          })}
          <div style={{background:'rgba(216,180,254,0.05)',border:'1px solid rgba(216,180,254,0.1)',borderRadius:10,padding:'10px',marginTop:4}}>
            <div style={{fontSize:10,color:'#d8b4fe',fontWeight:700,marginBottom:6}}>🏆 Thương Hiệu (tự mở khoá)</div>
            {FASHION_BRANDS.map((b,i)=>(
              <div key={b.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',opacity:i>brandIdx?0.4:1}}>
                <span style={{fontSize:10,color:i<=brandIdx?'#d8b4fe':'#475569',fontWeight:i===brandIdx?700:400}}>{i===brandIdx?'▶ ':''}{b.name}</span>
                <span style={{fontSize:9,color:'#fbbf24'}}>×{b.mult} — {i===0?'Miễn phí':fmtC(b.unlock)+'₫'}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Log */}
      <div style={{background:'rgba(0,0,0,0.3)',borderRadius:8,padding:'4px 8px',maxHeight:50,overflowY:'auto'}}>
        {log.slice(0,2).map((l,i)=><div key={i} style={{fontSize:9,color:'#64748b',lineHeight:1.6}}>{l}</div>)}
        {!log.length&&<div style={{fontSize:9,color:'#475569'}}>Bắt đầu may đồ! ✂️</div>}
      </div>
    </div>
  );
}

  { id:'math',     name:'Làm Toán Siêu Tốc',   icon:'🧮',  desc:'Giải toán nhanh nhất có thể! Nhiều cấp độ, tăng dần khó!',   bg:'linear-gradient(135deg,#0f4c75,#1b6ca8)', border:'#38bdf8' },
  { id:'water',    name:'Nhà Máy Nước',         icon:'💧',  desc:'Xây nhà máy, bơm nước, đóng chai, bán hàng làm giàu!',       bg:'linear-gradient(135deg,#0c4a6e,#0369a1)', border:'#7dd3fc' },
  { id:'clicker',  name:'Bấm Vật Báu',          icon:'🥚',  desc:'Bấm trứng, kim cương, vật hiếm để kiếm tiền! Càng hiếm càng giàu!', bg:'linear-gradient(135deg,#1c1237,#4c1d95)', border:'#c4b5fd' },
  { id:'cooking',  name:'Đầu Bếp Huyền Thoại', icon:'👨‍🍳', desc:'Nấu món đúng công thức, phục vụ khách trước khi họ bỏ đi!', bg:'linear-gradient(135deg,#78350f,#d97706)', border:'#fde68a' },
  { id:'clothing', name:'Công Ty May Đồ',        icon:'👗', desc:'Cắt vải, may đồ, ra mắt thương hiệu thời trang triệu đô!',  bg:'linear-gradient(135deg,#2d1b69,#7e22ce)', border:'#d8b4fe' },
  { id:'soda',    name:'Nhà Máy Nước Ngọt',     icon:'🥤', desc:'Pha chế, đóng chai, ra mắt thương hiệu, thống trị thị trường!', bg:'linear-gradient(135deg,#7c0000,#b91c1c)', border:'#fca5a5' },
  { id:'weapons', name:'Nhà Máy Xe & Súng',     icon:'🔫', desc:'SX xe tăng, súng máy, rocket, vũ khí hạt nhân! Bán cho quân đội!', bg:'linear-gradient(135deg,#1a1a00,#3d3d00)', border:'#fde047' },
  { id:'mining',  name:'Đào Mỏ Tỷ Phú',         icon:'⛏️', desc:'Đào đất tìm khoáng sản! Nâng cấp cuốc, thuê phu mỏ làm giàu!', bg:'linear-gradient(135deg,#1c1007,#3d2607)', border:'#f59e0b' },
  { id:'bank',    name:'Ngân Hàng Tỷ Phú',      icon:'🏦', desc:'Cho vay tiền, thu lãi, mở chi nhánh, thống trị tài chính!', bg:'linear-gradient(135deg,#0a1a0a,#052e16)', border:'#22c55e'  },
  { id:'dino',    name:'Sở Thú Khủng Long',      icon:'🦕', desc:'Tìm trứng, ấp khủng long, xây chuồng, bán vé tham quan!',  bg:'linear-gradient(135deg,#1a0a00,#2d1810)', border:'#a3e635'  },
  { id:'lego',    name:'Xếp Lego',               icon:'🧱', desc:'Đặt gạch Lego xây công trình! Càng hoành tráng càng nhiều điểm!', bg:'linear-gradient(135deg,#1c0a2e,#3b0764)', border:'#f0abfc' },
  { id:'chess',   name:'Cờ Vua',               icon:'♟️', desc:'Chơi cờ vua vs AI! 3 độ khó: Dễ, Trung, Khó.',            bg:'linear-gradient(135deg,#1a1a1a,#3d3d3d)', border:'#e2e8f0' },
  { id:'racing',  name:'Đua Xe Siêu Tốc',       icon:'🏎️', desc:'Lái xe né chướng ngại vật, thu thập nitro, phá kỷ lục!',   bg:'linear-gradient(135deg,#1a0a00,#7c2d12)', border:'#fb923c' },
  { id:'school',  name:'Trường Học Vũ Trụ',     icon:'🏫', desc:'Tuyển học sinh, thuê giáo viên, nâng cấp trường lên Đại Học!', bg:'linear-gradient(135deg,#1e3a5f,#1d4ed8)', border:'#93c5fd' },
  { id:'hotel',   name:'Khách Sạn Huyền Thoại', icon:'🏨', desc:'Xây phòng, thuê nhân viên, đón khách VIP kiếm tiền tỷ!',   bg:'linear-gradient(135deg,#1e1b4b,#312e81)', border:'#a5b4fc' },
  { id:'factory', name:'Công Ty Vạn Năng',      icon:'🏭', desc:'Xây dây chuyền SX từ búa → robot → vũ khí hạt nhân!',      bg:'linear-gradient(135deg,#1c1917,#44403c)', border:'#a8a29e' },
  { id:'fishing',  name:'Câu Cá Vạn Cân',      icon:'🎣',  desc:'125 map, 39 loài cá, thuyền viên, chiến đấu đêm...',        bg:'linear-gradient(135deg,#0c1929,#0a3060)', border:'#5eead4' },
];

function App() {
  const [unlocked, setUnlocked] = useState(false);
  const [input, setInput]       = useState('');
  const [shake, setShake]       = useState(false);
  const [attempts, setAttempts] = useState(0);
  const [password, setPassword] = useState('12345');
  const [showChangePw, setShowChangePw] = useState(false);
  const [newPw, setNewPw]       = useState('');
  const [newPw2, setNewPw2]     = useState('');
  const [pwMsg, setPwMsg]       = useState('');

  const submit = () => {
    if (input === password) {
      setUnlocked(true);
    } else {
      setShake(true);
      setAttempts(a => a + 1);
      setInput('');
      setTimeout(() => setShake(false), 500);
    }
  };

  const changePassword = () => {
    if (!newPw) { setPwMsg('❌ Mật khẩu không được trống!'); return; }
    if (newPw !== newPw2) { setPwMsg('❌ Mật khẩu xác nhận không khớp!'); return; }
    setPassword(newPw);
    setNewPw(''); setNewPw2('');
    setShowChangePw(false);
    setPwMsg('');
    alert('✅ Đổi mật khẩu thành công! Mật khẩu mới: ' + newPw);
  };

  if (unlocked) return (
    <div style={{position:'relative'}}>
      <GameHub />
      {/* Change password button floating */}
      <button
        onClick={()=>setShowChangePw(true)}
        style={{position:'fixed',bottom:16,right:16,zIndex:9999,background:'rgba(79,70,229,0.85)',border:'1px solid #7c3aed',borderRadius:30,padding:'8px 14px',color:'white',fontSize:11,fontWeight:700,cursor:'pointer',backdropFilter:'blur(8px)',boxShadow:'0 4px 20px rgba(79,70,229,0.4)'}}
      >🔑 Đổi MK</button>
      {showChangePw && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:10000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'linear-gradient(160deg,#1e1b4b,#312e81)',border:'2px solid #7c3aed',borderRadius:20,padding:24,width:'100%',maxWidth:340,display:'flex',flexDirection:'column',gap:12}}>
            <h3 style={{margin:0,color:'#c4b5fd',fontSize:18,fontWeight:900,textAlign:'center'}}>🔑 Đổi Mật Khẩu</h3>
            <input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="Mật khẩu mới..." style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(196,181,253,0.3)',borderRadius:10,padding:'10px 14px',color:'white',fontSize:15,outline:'none',textAlign:'center',letterSpacing:3}}/>
            <input type="password" value={newPw2} onChange={e=>setNewPw2(e.target.value)} placeholder="Xác nhận mật khẩu..." style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(196,181,253,0.3)',borderRadius:10,padding:'10px 14px',color:'white',fontSize:15,outline:'none',textAlign:'center',letterSpacing:3}}/>
            {pwMsg && <p style={{margin:0,color:'#f87171',fontSize:12,textAlign:'center'}}>{pwMsg}</p>}
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{setShowChangePw(false);setNewPw('');setNewPw2('');setPwMsg('');}} style={{flex:1,background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:10,padding:'10px',color:'#94a3b8',fontSize:13,cursor:'pointer'}}>Huỷ</button>
              <button onClick={changePassword} style={{flex:1,background:'linear-gradient(135deg,#7c3aed,#4f46e5)',border:'none',borderRadius:10,padding:'10px',color:'white',fontSize:13,fontWeight:800,cursor:'pointer'}}>✅ Lưu</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0c1929,#0a0a1e)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20,padding:20}}>
      <div style={{fontSize:64}}>🔐</div>
      <h2 style={{margin:0,color:'#e2e8f0',fontSize:22,fontWeight:900,letterSpacing:2}}>GAME HUB</h2>
      <p style={{margin:0,color:'#64748b',fontSize:13}}>Nhập mật khẩu để vào</p>
      <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%',maxWidth:280,transform:shake?'translateX(-8px)':'none',transition:'transform 0.1s'}}>
        <input
          type="password"
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&submit()}
          placeholder="Nhập mật khẩu..."
          autoFocus
          style={{background:'rgba(255,255,255,0.07)',border:`2px solid ${shake?'#ef4444':'rgba(255,255,255,0.15)'}`,borderRadius:12,padding:'12px 16px',color:'white',fontSize:18,outline:'none',textAlign:'center',letterSpacing:4}}
        />
        <button onClick={submit} style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)',border:'none',borderRadius:12,padding:'12px',color:'white',fontSize:15,fontWeight:800,cursor:'pointer'}}>🔓 Vào Game</button>
      </div>
      {attempts>0 && <p style={{margin:0,color:'#f87171',fontSize:12,fontWeight:700}}>❌ Sai mật khẩu! ({attempts} lần thử)</p>}
    </div>
  );
}

function GameHub() {
  const [currentGame, setCurrentGame] = useState(null);

  if (currentGame === 'snake')    return <SnakeGame     onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'butterfly') return <ButterflyGame onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'cards')    return <CardGame      onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'uno')      return <UnoGame       onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'animal')   return <AnimalTapGame onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'tap')      return <TapGame       onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'math')     return <MathGame      onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'water')    return <WaterFactory  onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'clicker')  return <ClickerGame   onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'cooking')  return <CookingGame   onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'clothing') return <ClothingFactory onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'soda')     return <SodaFactory   onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'weapons')  return <WeaponsFactory onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'mining')   return <MiningGame    onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'bank')     return <BankGame      onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'dino')     return <DinoZooGame   onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'lego')     return <LegoGame      onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'chess')    return <ChessGame     onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'racing')   return <RacingGame    onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'school')   return <SchoolGame    onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'hotel')    return <HotelGame     onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'factory')  return <FactoryGame   onBack={()=>setCurrentGame(null)} />;
  if (currentGame === 'fishing')  return <FishingGame   onBack={()=>setCurrentGame(null)} />;

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0c1929,#0a0a1e)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{marginBottom:32,textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:8}}>🎮</div>
        <h1 style={{margin:0,fontSize:28,fontWeight:900,color:'#e2e8f0',letterSpacing:2}}>GAME HUB</h1>
        <p style={{margin:'6px 0 0',color:'#64748b',fontSize:13}}>Chọn trò chơi bạn muốn</p>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:14,width:'100%',maxWidth:420}}>
        {GAMES.map(g => (
          <button key={g.id} onClick={()=>setCurrentGame(g.id)} style={{
            background:g.bg, border:`2px solid ${g.border}33`,
            borderRadius:16, padding:'16px 20px',
            display:'flex', alignItems:'center', gap:16,
            cursor:'pointer', textAlign:'left',
            boxShadow:`0 4px 24px rgba(0,0,0,0.3)`,
            transition:'transform 0.15s, box-shadow 0.15s',
          }}
          onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow=`0 8px 32px rgba(0,0,0,0.4), 0 0 20px ${g.border}33`;}}
          onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='0 4px 24px rgba(0,0,0,0.3)';}}>
            <span style={{fontSize:40,flexShrink:0}}>{g.icon}</span>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:18,fontWeight:800,color:'white'}}>{g.name}</p>
              <p style={{margin:'3px 0 0',fontSize:12,color:'rgba(255,255,255,0.6)'}}>{g.desc}</p>
            </div>
            <span style={{color:`${g.border}`,fontSize:20}}>▶</span>
          </button>
        ))}
      </div>
      <p style={{color:'#1e293b',fontSize:11,marginTop:24}}>v2.0 — 4 games in 1</p>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
