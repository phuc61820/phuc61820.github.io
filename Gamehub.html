      </div>

      {/* Recipe book */}
      <div style={{background:'rgba(0,0,0,0.2)',borderRadius:10,padding:'8px 10px'}}>
        <p style={{margin:'0 0 6px',color:'#fcd34d',fontSize:11,fontWeight:700}}>📖 Sổ Công Thức</p>
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4}}>
          {RECIPES.map(r=>(
            <div key={r.id} style={{background:'rgba(255,255,255,0.04)',border:`1px solid ${r.color}33`,borderRadius:8,padding:'5px 8px',flexShrink:0,minWidth:90}}>
              <div style={{fontSize:16,textAlign:'center'}}>{r.icon}</div>
              <div style={{fontSize:9,color:r.color,fontWeight:700,textAlign:'center'}}>{r.name}</div>
              <div style={{fontSize:11,textAlign:'center'}}>{r.steps.map(s=>INGREDIENTS.find(i=>i.id===s)?.icon).join('')}</div>
              <div style={{fontSize:8,color:'#64748b',textAlign:'center'}}>+{r.reward}đ</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


// ===================== UNO GAME =====================
const UNO_COLORS = ['red','yellow','green','blue'];
const UNO_COLOR_HEX = { red:'#ef4444', yellow:'#eab308', green:'#22c55e', blue:'#3b82f6', wild:'#7c3aed' };
const UNO_COLOR_BG  = { red:'#450a0a', yellow:'#422006', green:'#052e16', blue:'#0c1a4a', wild:'#1e1b4b' };
const UNO_COLOR_VI  = { red:'Đỏ', yellow:'Vàng', green:'Xanh Lá', blue:'Xanh Dương' };

function makeUnoDeck() {
  const deck = [];
  let id = 0;
  for (const color of UNO_COLORS) {
    deck.push({ id:id++, color, value:'0', type:'number' });
    for (const v of ['1','2','3','4','5','6','7','8','9','skip','reverse','draw2']) {
      for (let x=0;x<2;x++) deck.push({ id:id++, color, value:v, type: v==='skip'||v==='reverse'||v==='draw2'?'action':'number' });
    }
  }
  for (let x=0;x<4;x++) {
    deck.push({ id:id++, color:'wild', value:'wild', type:'wild' });
    deck.push({ id:id++, color:'wild', value:'wild4', type:'wild' });
  }
  return deck;
}
function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function cardLabel(card) {
  if (card.value==='skip') return '⊘';
  if (card.value==='reverse') return '⇄';
  if (card.value==='draw2') return '+2';
  if (card.value==='wild') return '🌈';
  if (card.value==='wild4') return '+4';
  return card.value;
}

function UnoCard({ card, onClick, selected, small, faceDown }) {
  const color = faceDown ? '#1e1b4b' : (UNO_COLOR_HEX[card.color] || '#7c3aed');
  const bg    = faceDown ? '#312e81' : (UNO_COLOR_BG[card.color]  || '#1e1b4b');
  const w = small ? 36 : 52;
  const h = small ? 52 : 76;
  return (
    <div onClick={onClick} style={{
      width:w, height:h, borderRadius:8, flexShrink:0,
      background: faceDown ? 'linear-gradient(135deg,#312e81,#1e1b4b)' : `linear-gradient(135deg,${bg},${bg}dd)`,
      border:`2px solid ${selected?'#fbbf24':color}`,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      cursor: onClick ? 'pointer' : 'default',
      boxShadow: selected ? `0 0 16px #fbbf24, 0 4px 12px rgba(0,0,0,0.5)` : '0 3px 8px rgba(0,0,0,0.4)',
      transform: selected ? 'translateY(-10px)' : 'none',
      transition:'all 0.15s',
      position:'relative', overflow:'hidden',
    }}>
      {!faceDown && <>
        <div style={{position:'absolute',top:3,left:5,fontSize:small?8:10,fontWeight:900,color,lineHeight:1}}>{cardLabel(card)}</div>
        <div style={{fontSize:small?16:24,fontWeight:900,color, textShadow:`0 0 10px ${color}88`}}>{cardLabel(card)}</div>
        <div style={{position:'absolute',bottom:3,right:5,fontSize:small?8:10,fontWeight:900,color,lineHeight:1,transform:'rotate(180deg)'}}>{cardLabel(card)}</div>
        {card.color!=='wild' && <div style={{position:'absolute',inset:0,borderRadius:6,border:`3px solid ${color}44`}}/>}
      </>}
      {faceDown && <div style={{fontSize:small?12:18,color:'#818cf8'}}>🎴</div>}
    </div>
  );
}

function UnoGame({ onBack }) {
  const [phase, setPhase]         = useState('menu');
  const [deck, setDeck]           = useState([]);
  const [playerHand, setPlayerHand] = useState([]);
  const [cpuHands, setCpuHands]   = useState([[],[],[]]);
  const [discard, setDiscard]     = useState([]);
  const [turn, setTurn]           = useState(0); // 0=player, 1-3=cpu
  const [direction, setDirection] = useState(1);
  const [selected, setSelected]   = useState(null);
  const [msg, setMsg]             = useState('');
  const [msgType, setMsgType]     = useState('ok');
  const [winner, setWinner]       = useState(null);
  const [wildPick, setWildPick]   = useState(false);
  const [pendingCard, setPendingCard] = useState(null);
  const [unoAlert, setUnoAlert]   = useState('');
  const [playerMustCallUno, setPlayerMustCallUno] = useState(false);
  const deckRef = useRef([]);

  const showMsg = (txt, type='ok', dur=2000) => {
    setMsg(txt); setMsgType(type);
    setTimeout(()=>setMsg(''), dur);
  };

  const drawFromDeck = (deckArr, n=1) => {
    let d = [...deckArr];
    const drawn = [];
    for (let i=0;i<n;i++) {
      if (d.length===0) return { drawn, deck: d };
      drawn.push(d.pop());
    }
    return { drawn, deck: d };
  };

  const canPlay = (card, top, activeColor) => {
    if (!top) return true;
    if (card.type==='wild') return true;
    if (card.color===activeColor) return true;
    if (card.value===top.value) return true;
    return false;
  };

  const startGame = () => {
    const d = shuffleArr(makeUnoDeck());
    const ph = d.splice(0,7);
    const c1 = d.splice(0,7), c2=d.splice(0,7), c3=d.splice(0,7);
    // First discard - avoid special cards
    let startIdx = d.findIndex(c=>c.type==='number');
    if (startIdx===-1) startIdx=0;
    const [startCard] = d.splice(startIdx,1);
    setDeck(d); deckRef.current=d;
    setPlayerHand(ph); setCpuHands([c1,c2,c3]);
    setDiscard([startCard]); setTurn(0); setDirection(1);
    setSelected(null); setWinner(null); setWildPick(false);
    setPendingCard(null); setPlayerMustCallUno(false);
    setPhase('playing');
    showMsg('Ván mới bắt đầu! Bạn đi trước 🎴','ok',1500);
  };

  const top       = discard[discard.length-1];
  const activeColor = top ? (top.activeColor || top.color) : 'red';

  // Play a card
  const playCard = (card, hand, setHand, isPlayer) => {
    if (!canPlay(card, top, activeColor)) return false;
    const newHand = hand.filter(c=>c.id!==card.id);

    if (card.type==='wild') {
      if (isPlayer) { setPendingCard(card); setWildPick(true); setPlayerHand(newHand); return true; }
      // CPU picks most common color in hand
      const colorCount = {};
      newHand.forEach(c=>{ if(c.color!=='wild') colorCount[c.color]=(colorCount[c.color]||0)+1; });
      const best = UNO_COLORS.reduce((a,b)=>(colorCount[b]||0)>(colorCount[a]||0)?b:a, 'red');
      const newCard = {...card, activeColor: best};
      setDiscard(p=>[...p, newCard]);
      setHand(newHand);
      if (card.value==='wild4') return { effect:'draw4', color:best, hand:newHand };
      return { effect:null, hand:newHand };
    }

    setDiscard(p=>[...p, card]);
    setHand(newHand);
    return { effect: card.value==='draw2'?'draw2': card.value==='skip'?'skip': card.value==='reverse'?'reverse':null, hand:newHand };
  };

  const nextTurn = (cur, dir, skip=false) => {
    const n = (cur + dir*(skip?2:1) + 4) % 4;
    return n;
  };

  const checkWin = (hand, name) => {
    if (hand.length===0) { setWinner(name); setPhase('result'); return true; }
    return false;
  };

  const applyEffect = (effect, nextT, dir, newDeck, cpus, setCpus) => {
    let nd=[...newDeck], nc=[...cpus.map(h=>[...h])];
    if (effect==='draw2') {
      if (nextT===0) {
        const {drawn,deck:d2}=drawFromDeck(nd,2); nd=d2;
        setPlayerHand(p=>[...p,...drawn]);
        showMsg('Bạn rút 2 lá! ✌️','bad');
      } else {
        const {drawn,deck:d2}=drawFromDeck(nd,2); nd=d2;
        nc[nextT-1]=[...nc[nextT-1],...drawn];
        showMsg(`CPU ${nextT} rút 2 lá!`,'ok');
      }
      nextT = nextTurn(nextT,dir,true);
    } else if (effect==='draw4') {
      if (nextT===0) {
        const {drawn,deck:d2}=drawFromDeck(nd,4); nd=d2;
        setPlayerHand(p=>[...p,...drawn]);
        showMsg('Bạn rút 4 lá! 😱','bad');
      } else {
        const {drawn,deck:d2}=drawFromDeck(nd,4); nd=d2;
        nc[nextT-1]=[...nc[nextT-1],...drawn];
        showMsg(`CPU ${nextT} rút 4 lá!`,'ok');
      }
      nextT = nextTurn(nextT,dir,true);
    } else if (effect==='skip') {
      nextT = nextTurn(nextT,dir,true);
      showMsg(nextT===0?'Bạn bị skip!':'Skip!', nextT===0?'bad':'ok');
    } else if (effect==='reverse') {
      dir = -dir;
      nextT = nextTurn(nextT,dir);
      showMsg('Đảo chiều! ⇄','ok');
    }
    setCpus(nc);
    setDeck(nd); deckRef.current=nd;
    return { nextT, dir };
  };

  const playerPlay = () => {
    if (turn!==0||!selected||wildPick) return;
    const card = playerHand.find(c=>c.id===selected);
    if (!card||!canPlay(card,top,activeColor)) { showMsg('Lá này không đánh được!','bad'); return; }
    setSelected(null);
    if (card.type==='wild') {
      const newHand=playerHand.filter(c=>c.id!==card.id);
      setPlayerHand(newHand); setPendingCard(card); setWildPick(true);
      return;
    }
    const newHand=playerHand.filter(c=>c.id!==card.id);
    setDiscard(p=>[...p,card]);
    setPlayerHand(newHand);
    if (checkWin(newHand,'Bạn')) return;
    if (newHand.length===1) setPlayerMustCallUno(true);
    let nextT=nextTurn(0,direction), dir=direction;
    const eff=card.value==='draw2'?'draw2':card.value==='skip'?'skip':card.value==='reverse'?'reverse':null;
    let nc=[...cpuHands.map(h=>[...h])];
    if (eff) {
      let nd=[...deck];
      if (eff==='draw2') {
        const {drawn,deck:d2}=drawFromDeck(nd,2); nd=d2;
        if (nextT===0){setPlayerHand(p=>[...p,...drawn]);}
        else {nc[nextT-1]=[...nc[nextT-1],...drawn]; showMsg(`CPU ${nextT} rút 2 lá!`);}
        nextT=nextTurn(nextT,dir,true);
      } else if (eff==='skip') {
        if (nextT===0) showMsg('Lượt bạn bị skip!','bad');
        else showMsg(`CPU ${nextT} bị skip!`,'ok');
        nextT=nextTurn(nextT,dir,true);
      } else if (eff==='reverse') {
        dir=-direction; setDirection(dir);
        nextT=nextTurn(0,dir); showMsg('Đảo chiều! ⇄');
      }
      setDeck(nd); deckRef.current=nd;
    }
    setCpuHands(nc);
    if (nextT===0) { setTurn(0); showMsg('Lượt bạn lại!','ok'); }
    else { setTurn(nextT); setTimeout(()=>doCpuTurn(nextT, dir, nc), 900); }
  };

  const pickWildColor = (color) => {
    if (!pendingCard) return;
    const card={...pendingCard, activeColor:color};
    setDiscard(p=>[...p,card]);
    const newHand=[...playerHand];
    if (checkWin(newHand,'Bạn')) { setWildPick(false); return; }
    setWildPick(false); setPendingCard(null);
    const isW4=pendingCard.value==='wild4';
    let nextT=nextTurn(0,direction), dir=direction;
    let nc=[...cpuHands.map(h=>[...h])], nd=[...deck];
    if (isW4) {
      if (nextT===0){const {drawn,deck:d2}=drawFromDeck(nd,4);nd=d2;setPlayerHand(p=>[...p,...drawn]);}
      else {const {drawn,deck:d2}=drawFromDeck(nd,4);nd=d2;nc[nextT-1]=[...nc[nextT-1],...drawn];}
      nextT=nextTurn(nextT,dir,true);
    }
    setCpuHands(nc); setDeck(nd); deckRef.current=nd;
    if (nextT===0) { setTurn(0); showMsg(`Bạn chọn ${UNO_COLOR_VI[color]}!`); }
    else { setTurn(nextT); setTimeout(()=>doCpuTurn(nextT,dir,nc),900); }
  };

  const doCpuTurn = (cpuIdx, dir, hands) => {
    const hand=[...hands[cpuIdx-1]];
    const top2=discard[discard.length-1];
    const ac=top2?(top2.activeColor||top2.color):'red';
    const playable=hand.filter(c=>canPlay(c,top2,ac));
    let nd=[...deckRef.current];

    if (playable.length===0) {
      const {drawn,deck:d}=drawFromDeck(nd,1); nd=d; deckRef.current=nd;
      const newHand=[...hand,...drawn];
      hands=hands.map((h,i)=>i===cpuIdx-1?newHand:h);
      setCpuHands(hands.map(h=>[...h])); setDeck(nd);
      const canPlayDrawn=drawn[0]&&canPlay(drawn[0],top2,ac);
      if (canPlayDrawn) {
        const c=drawn[0]; const nh=newHand.filter(x=>x.id!==c.id);
        let nc={...c}; if(c.type==='wild'){const best=UNO_COLORS.reduce((a,b)=>{const ct=nh.filter(x=>x.color===b).length;return ct>nh.filter(x=>x.color===a).length?b:a},'red');nc.activeColor=best;}
        setDiscard(p=>[...p,nc]);
        hands=hands.map((h,i)=>i===cpuIdx-1?nh:h);
        setCpuHands(hands.map(h=>[...h]));
        if (checkWin(nh,`CPU ${cpuIdx}`)) return;
        if (nh.length===1) showMsg(`CPU ${cpuIdx}: UNO! 🔴`,'bad');
        const eff=nc.value==='draw2'?'draw2':nc.value==='wild4'?'draw4':nc.value==='skip'?'skip':nc.value==='reverse'?'reverse':null;
        advanceTurn(cpuIdx,dir,eff,hands,nd,nc.activeColor||nc.color);
      } else {
        showMsg(`CPU ${cpuIdx} rút bài...`,'ok');
        advanceTurn(cpuIdx,dir,null,hands,nd,ac);
      }
      return;
    }
    // pick best card: prefer action/wild if cpu has many cards, else number
    const card = playable.find(c=>c.type==='action')||playable.find(c=>c.type==='wild')||playable[0];
    const nh=hand.filter(c=>c.id!==card.id);
    let nc={...card};
    if (card.type==='wild'){const best=UNO_COLORS.reduce((a,b)=>{const ct=nh.filter(x=>x.color===b).length;return ct>nh.filter(x=>x.color===a).length?b:a},'red');nc.activeColor=best;}
    setDiscard(p=>[...p,nc]);
    hands=hands.map((h,i)=>i===cpuIdx-1?nh:h);
    setCpuHands(hands.map(h=>[...h]));
    if (checkWin(nh,`CPU ${cpuIdx}`)) return;
    if (nh.length===1) { showMsg(`CPU ${cpuIdx}: UNO! 🔴`,'bad'); setUnoAlert(`CPU ${cpuIdx}`); setTimeout(()=>setUnoAlert(''),1500); }
    const eff=nc.value==='draw2'?'draw2':nc.value==='wild4'?'draw4':nc.value==='skip'?'skip':nc.value==='reverse'?'reverse':null;
    advanceTurn(cpuIdx,dir,eff,hands,nd,nc.activeColor||nc.color);
  };

  const advanceTurn = (from, dir, eff, hands, nd, ac) => {
    let nextT=nextTurn(from,dir);
    if (eff==='draw2'||eff==='draw4') {
      const n=eff==='draw2'?2:4;
      if (nextT===0){const {drawn,deck:d}=drawFromDeck(nd,n);nd=d;setPlayerHand(p=>[...p,...drawn]);showMsg(`Bạn rút ${n} lá!`,'bad');}
      else {const {drawn,deck:d}=drawFromDeck(nd,n);nd=d;hands=hands.map((h,i)=>i===nextT-1?[...h,...drawn]:h);setCpuHands(hands.map(h=>[...h]));showMsg(`CPU ${nextT} rút ${n} lá!`);}
      nextT=nextTurn(nextT,dir,true);
    } else if (eff==='skip') {
      if (nextT===0) showMsg('Lượt bạn bị skip!','bad');
      else showMsg(`CPU ${nextT} bị skip!`,'ok');
      nextT=nextTurn(nextT,dir,true);
    } else if (eff==='reverse') {
      dir=-dir; setDirection(dir); nextT=nextTurn(from,dir);
      showMsg('Đảo chiều! ⇄');
    }
    setDeck(nd); deckRef.current=nd;
    setTurn(nextT);
    if (nextT!==0) setTimeout(()=>doCpuTurn(nextT,dir,hands),900);
  };

  const drawCard = () => {
    if (turn!==0) return;
    const {drawn,deck:nd}=drawFromDeck(deck,1);
    if (!drawn.length){showMsg('Hết bài rút!','bad');return;}
    setDeck(nd); deckRef.current=nd;
    const newHand=[...playerHand,...drawn];
    setPlayerHand(newHand);
    setPlayerMustCallUno(false);
    showMsg(`Rút: ${cardLabel(drawn[0])} (${UNO_COLOR_VI[drawn[0].color]||'Wild'})`,'ok');
    // can play it?
    if (canPlay(drawn[0],top,activeColor)) {
      showMsg(`Rút được lá có thể đánh!`,'ok');
    } else {
      // pass turn
      const nextT=nextTurn(0,direction);
      setTurn(nextT);
      setTimeout(()=>doCpuTurn(nextT,direction,cpuHands),900);
    }
  };

  const callUno = () => {
    if (playerHand.length===1) {
      showMsg('UNO! 🔴','ok');
      setPlayerMustCallUno(false);
      setUnoAlert('Bạn');
      setTimeout(()=>setUnoAlert(''),1500);
    }
  };

  if (phase==='menu') return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f0c29,#302b63,#24243e)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20,padding:20}}>
      <div style={{fontSize:64}}>🎴</div>
      <h2 style={{margin:0,color:'#818cf8',fontSize:28,fontWeight:900,letterSpacing:3}}>UNO</h2>
      <div style={{background:'rgba(0,0,0,0.3)',borderRadius:14,padding:'14px 20px',maxWidth:340,textAlign:'center'}}>
        <p style={{color:'#c7d2fe',fontSize:13,margin:'0 0 8px',fontWeight:700}}>Cách chơi:</p>
        <p style={{color:'#a5b4fc',fontSize:12,margin:'0 0 4px'}}>🃏 Đánh lá cùng màu hoặc cùng số</p>
        <p style={{color:'#a5b4fc',fontSize:12,margin:'0 0 4px'}}>⊘ Skip — bỏ lượt người tiếp theo</p>
        <p style={{color:'#a5b4fc',fontSize:12,margin:'0 0 4px'}}>⇄ Reverse — đảo chiều chơi</p>
        <p style={{color:'#a5b4fc',fontSize:12,margin:'0 0 4px'}}>+2 Draw Two — người tiếp rút 2</p>
        <p style={{color:'#a5b4fc',fontSize:12,margin:'0 0 4px'}}>🌈 Wild — chọn màu bất kỳ</p>
        <p style={{color:'#a5b4fc',fontSize:12,margin:'0 0 4px'}}>+4 Wild Draw 4 — chọn màu + rút 4</p>
        <p style={{color:'#f87171',fontSize:12,margin:'8px 0 0',fontWeight:700}}>⚠️ Còn 1 lá phải hô UNO!</p>
      </div>
      <div style={{display:'flex',gap:10}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:10,padding:'10px 20px',color:'#94a3b8',fontSize:14,cursor:'pointer'}}>← Quay lại</button>
        <button onClick={startGame} style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)',border:'none',borderRadius:10,padding:'10px 28px',color:'white',fontSize:16,fontWeight:800,cursor:'pointer'}}>🎴 Bắt đầu!</button>
      </div>
    </div>
  );

  if (phase==='result') return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f0c29,#302b63)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,padding:20}}>
      <div style={{fontSize:64}}>{winner==='Bạn'?'🏆':'😢'}</div>
      <h2 style={{margin:0,color:winner==='Bạn'?'#fbbf24':'#f87171',fontSize:24,fontWeight:900}}>{winner} THẮNG!</h2>
      <div style={{display:'flex',gap:10,marginTop:8}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:10,padding:'10px 20px',color:'#94a3b8',fontSize:14,cursor:'pointer'}}>← Hub</button>
        <button onClick={startGame} style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)',border:'none',borderRadius:10,padding:'10px 28px',color:'white',fontSize:15,fontWeight:800,cursor:'pointer'}}>🔄 Ván mới</button>
      </div>
    </div>
  );

  const topColor = UNO_COLOR_HEX[activeColor]||'#7c3aed';

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f0c29,#1e1b4b)',display:'flex',flexDirection:'column',padding:10,gap:8,maxWidth:520,margin:'0 auto'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
        <h3 style={{margin:0,color:'#818cf8',fontSize:16,fontWeight:900}}>🎴 UNO</h3>
        <div style={{fontSize:11,color:'#64748b'}}>🃏 {deck.length} lá còn</div>
      </div>

      {/* UNO alert */}
      {unoAlert && <div style={{textAlign:'center',background:'rgba(239,68,68,0.3)',border:'1px solid #ef4444',borderRadius:10,padding:'6px',color:'#f87171',fontWeight:900,fontSize:16,animation:'none'}}>🔴 {unoAlert}: UNO!</div>}

      {/* Message */}
      {msg && <div style={{textAlign:'center',padding:'5px 10px',borderRadius:8,fontSize:12,fontWeight:700,background:msgType==='ok'?'rgba(99,102,241,0.2)':'rgba(239,68,68,0.2)',color:msgType==='ok'?'#a5b4fc':'#f87171'}}>{msg}</div>}

      {/* CPU hands */}
      <div style={{display:'flex',gap:8,justifyContent:'space-around'}}>
        {cpuHands.map((hand,i)=>(
          <div key={i} style={{background:turn===i+1?'rgba(99,102,241,0.15)':'rgba(0,0,0,0.2)',border:`1px solid ${turn===i+1?'#818cf8':'rgba(255,255,255,0.05)'}`,borderRadius:10,padding:'6px 10px',flex:1,textAlign:'center'}}>
            <div style={{fontSize:10,color:turn===i+1?'#818cf8':'#64748b',fontWeight:700,marginBottom:4}}>CPU {i+1} {turn===i+1?'⬅️ đang đi':''}</div>
            <div style={{display:'flex',gap:2,justifyContent:'center',flexWrap:'wrap'}}>
              {hand.map((c,j)=><UnoCard key={j} card={c} faceDown small />)}
            </div>
            <div style={{fontSize:9,color:'#64748b',marginTop:3}}>{hand.length} lá</div>
          </div>
        ))}
      </div>

      {/* Discard pile + active color */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:'#64748b',marginBottom:4}}>Bài vừa đánh</div>
          {top && <UnoCard card={top} />}
        </div>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:'#64748b',marginBottom:4}}>Màu hiện tại</div>
          <div style={{width:52,height:52,borderRadius:12,background:topColor,border:'3px solid white',boxShadow:`0 0 20px ${topColor}88`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'white'}}>
            {UNO_COLOR_VI[activeColor]||'Wild'}
          </div>
        </div>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:'#64748b',marginBottom:4}}>Rút bài</div>
          <div onClick={turn===0?drawCard:undefined} style={{width:52,height:76,borderRadius:8,background:'linear-gradient(135deg,#312e81,#1e1b4b)',border:'2px solid #818cf8',cursor:turn===0?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,boxShadow:'0 3px 8px rgba(0,0,0,0.4)'}}>🎴</div>
        </div>
      </div>

      {/* Wild color picker */}
      {wildPick && (
        <div style={{background:'rgba(124,58,237,0.2)',border:'1px solid #7c3aed',borderRadius:12,padding:'10px',textAlign:'center'}}>
          <p style={{margin:'0 0 8px',color:'#c4b5fd',fontSize:12,fontWeight:700}}>Chọn màu cho lá Wild:</p>
          <div style={{display:'flex',gap:8,justifyContent:'center'}}>
            {UNO_COLORS.map(c=>(
              <button key={c} onClick={()=>pickWildColor(c)} style={{width:50,height:50,borderRadius:10,background:UNO_COLOR_HEX[c],border:'2px solid white',cursor:'pointer',fontWeight:700,color:'white',fontSize:11,boxShadow:`0 0 12px ${UNO_COLOR_HEX[c]}`}}>
                {UNO_COLOR_VI[c]}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Player hand */}
      <div style={{background:'rgba(0,0,0,0.2)',border:`2px solid ${turn===0?'#818cf8':'rgba(255,255,255,0.05)'}`,borderRadius:12,padding:'10px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{fontSize:12,color:turn===0?'#818cf8':'#64748b',fontWeight:700}}>
            {turn===0?'✨ Lượt của bạn!':'⏳ Đợi CPU...'} ({playerHand.length} lá)
          </span>
          <div style={{display:'flex',gap:6}}>
            {playerHand.length===1 && (
              <button onClick={callUno} style={{background:'linear-gradient(135deg,#ef4444,#b91c1c)',border:'none',borderRadius:8,padding:'4px 10px',color:'white',fontSize:12,fontWeight:900,cursor:'pointer',boxShadow:'0 0 12px rgba(239,68,68,0.5)'}}>🔴 UNO!</button>
            )}
            {selected!==null && turn===0 && (
              <button onClick={playerPlay} style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)',border:'none',borderRadius:8,padding:'4px 12px',color:'white',fontSize:12,fontWeight:800,cursor:'pointer'}}>▶ Đánh</button>
            )}
          </div>
        </div>
        <div style={{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'center'}}>
          {playerHand.map(card=>{
            const playable = turn===0 && canPlay(card,top,activeColor);
            return (
              <div key={card.id} onClick={()=>turn===0&&playable&&setSelected(selected===card.id?null:card.id)}
                style={{opacity:turn===0&&!playable?0.4:1, cursor:turn===0&&playable?'pointer':'default'}}>
                <UnoCard card={card} selected={selected===card.id} />
              </div>
            );
          })}
        </div>
        <p style={{margin:'6px 0 0',fontSize:9,color:'#475569',textAlign:'center'}}>Nhấn lá để chọn, nhấn lại để bỏ chọn. Lá mờ = không đánh được.</p>
      </div>
    </div>
  );
}

// ===================== TOÁN SIÊU TỐC =====================
function MathGame({ onBack }) {
  const LEVELS = [
    { name:'Dễ 🌱',     ops:['+','-'],          range:[1,20],   time:15, pts:10  },
    { name:'Vừa 🌿',    ops:['+','-','×'],       range:[1,50],   time:12, pts:20  },
    { name:'Khó 🌳',    ops:['+','-','×','÷'],   range:[1,100],  time:10, pts:35  },
    { name:'Ác 🔥',     ops:['+','-','×','÷'],   range:[1,200],  time:8,  pts:55  },
    { name:'Huyền Thoại ⚡',ops:['+','-','×','÷'],range:[1,999], time:6,  pts:80  },
  ];

  const [phase, setPhase]       = useState('menu'); // menu | playing | result
  const [levelIdx, setLevelIdx] = useState(0);
  const [question, setQuestion] = useState(null);
  const [input, setInput]       = useState('');
  const [score, setScore]       = useState(0);
  const [streak, setStreak]     = useState(0);
  const [best, setBest]         = useState(0);
  const [timeLeft, setTimeLeft] = useState(15);
  const [totalQ, setTotalQ]     = useState(0);
  const [correct, setCorrect]   = useState(0);
  const [feedback, setFeedback] = useState(null); // {ok, text}
  const [combo, setCombo]       = useState(0);
  const inputRef = useRef(null);
  const timerRef = useRef(null);

  const level = LEVELS[levelIdx];

  const genQuestion = (lv) => {
    const ops = lv.ops;
    const [min, max] = lv.range;
    const op = ops[Math.floor(Math.random()*ops.length)];
    let a = Math.floor(Math.random()*(max-min+1))+min;
    let b = Math.floor(Math.random()*(max-min+1))+min;
    let ans;
    if (op==='+') { ans = a+b; }
    else if (op==='-') { if (a<b)[a,b]=[b,a]; ans=a-b; }
    else if (op==='×') { a=Math.floor(Math.random()*12)+1; b=Math.floor(Math.random()*12)+1; ans=a*b; }
    else { // ÷
      b = Math.floor(Math.random()*11)+2;
      ans = Math.floor(Math.random()*12)+1;
      a = b*ans;
    }
    return { a, b, op, ans };
  };

  const startGame = () => {
    setScore(0); setStreak(0); setTotalQ(0); setCorrect(0);
    setCombo(0); setInput(''); setFeedback(null);
    const q = genQuestion(level);
    setQuestion(q);
    setTimeLeft(level.time);
    setPhase('playing');
    setTimeout(()=>inputRef.current?.focus(),100);
  };

  // Timer
  useEffect(() => {
    if (phase!=='playing') return;
    timerRef.current = setInterval(()=>{
      setTimeLeft(t=>{
        if (t<=1) {
          clearInterval(timerRef.current);
          // wrong - time up
          setFeedback({ok:false, text:'⏰ Hết giờ!'});
          setStreak(0); setCombo(0);
          setTimeout(()=>{
            const q=genQuestion(level);
            setQuestion(q); setTimeLeft(level.time); setInput(''); setFeedback(null);
            setTotalQ(p=>p+1);
            setTimeout(()=>inputRef.current?.focus(),50);
          },700);
          return level.time;
        }
        return t-1;
      });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[phase, question]);

  const submit = () => {
    if (!question||input==='') return;
    const userAns = parseInt(input,10);
    const ok = userAns===question.ans;
    clearInterval(timerRef.current);
    if (ok) {
      const timeBonus = Math.floor(timeLeft/level.time*level.pts);
      const comboBonus = combo>=3?Math.floor(level.pts*0.5*(combo-2)):0;
      const earned = level.pts + timeBonus + comboBonus;
      setScore(p=>{const ns=p+earned;setBest(b=>Math.max(b,ns));return ns;});
      setStreak(p=>p+1); setCombo(p=>p+1); setCorrect(p=>p+1);
      setFeedback({ok:true, text:`✅ +${earned}đ${comboBonus>0?` 🔥COMBO x${combo+1}!`:''} (nhanh +${timeBonus})`});
    } else {
      setStreak(0); setCombo(0);
      setFeedback({ok:false, text:`❌ Sai! Đáp án: ${question.ans}`});
    }
    setTotalQ(p=>p+1);
    setTimeout(()=>{
      const q=genQuestion(level);
      setQuestion(q); setTimeLeft(level.time); setInput(''); setFeedback(null);
      setTimeout(()=>inputRef.current?.focus(),50);
    },ok?600:900);
  };

  const handleKey = (e) => {
    if (e.key==='Enter') submit();
  };

  const numPad = ['7','8','9','4','5','6','1','2','3','','0','⌫'];

  const pressNum = (v) => {
    if (v==='⌫') { setInput(p=>p.slice(0,-1)); return; }
    if (v==='-' && input==='') { setInput('-'); return; }
    if (input.length>6) return;
    setInput(p=>p+v);
  };

  const pct = timeLeft/level.time;
  const barColor = pct>0.5?'#22c55e':pct>0.25?'#f59e0b':'#ef4444';

  if (phase==='menu') return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f1e3c,#0f4c75)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,padding:20}}>
      <div style={{fontSize:56}}>🧮</div>
      <h2 style={{margin:0,color:'#38bdf8',fontSize:24,fontWeight:900}}>Làm Toán Siêu Tốc</h2>
      <p style={{color:'#7dd3fc',fontSize:12,margin:0,textAlign:'center'}}>Giải đúng càng nhanh càng nhiều điểm!<br/>Trả lời liên tiếp để nhận COMBO bonus 🔥</p>

      <div style={{width:'100%',maxWidth:380}}>
        <p style={{color:'#7dd3fc',fontSize:12,fontWeight:700,margin:'0 0 8px'}}>Chọn cấp độ:</p>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {LEVELS.map((lv,i)=>(
            <button key={i} onClick={()=>setLevelIdx(i)} style={{
              background: levelIdx===i?'rgba(56,189,248,0.2)':'rgba(255,255,255,0.04)',
              border:`2px solid ${levelIdx===i?'#38bdf8':'rgba(255,255,255,0.08)'}`,
              borderRadius:12, padding:'10px 16px', cursor:'pointer',
              display:'flex',justifyContent:'space-between',alignItems:'center',
            }}>
              <span style={{color:levelIdx===i?'#38bdf8':'#94a3b8',fontWeight:700,fontSize:13}}>{lv.name}</span>
              <span style={{color:'#64748b',fontSize:11}}>
                {lv.ops.join(' ')} &nbsp;|&nbsp; ⏱{lv.time}s &nbsp;|&nbsp; +{lv.pts}đ/câu
              </span>
            </button>
          ))}
        </div>
      </div>

      <div style={{display:'flex',gap:10}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:10,padding:'10px 20px',color:'#94a3b8',fontSize:14,cursor:'pointer'}}>← Quay lại</button>
        <button onClick={startGame} style={{background:'linear-gradient(135deg,#0ea5e9,#0284c7)',border:'none',borderRadius:10,padding:'10px 28px',color:'white',fontSize:15,fontWeight:800,cursor:'pointer'}}>🧮 Bắt đầu!</button>
      </div>
      {best>0 && <p style={{color:'#fbbf24',fontSize:13,margin:0}}>🏆 Kỷ lục: {best}đ</p>}
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f1e3c,#0f4c75)',display:'flex',flexDirection:'column',alignItems:'center',padding:16,gap:10}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',maxWidth:400}}>
        <button onClick={()=>{clearInterval(timerRef.current);setPhase('menu');}} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
        <span style={{color:'#38bdf8',fontWeight:800,fontSize:13}}>{level.name}</span>
        <span style={{color:'#fbbf24',fontWeight:800,fontSize:15}}>💰 {score}</span>
      </div>

      {/* Stats bar */}
      <div style={{display:'flex',gap:12,width:'100%',maxWidth:400,justifyContent:'center'}}>
        <span style={{color:'#5eead4',fontSize:12}}>✅ {correct}/{totalQ}</span>
        <span style={{color:combo>=3?'#f97316':'#64748b',fontSize:12,fontWeight:combo>=3?800:400}}>🔥 Combo: {combo}</span>
        <span style={{color:'#f87171',fontSize:12}}>🏆 Best: {best}</span>
      </div>

      {/* Timer bar */}
      <div style={{width:'100%',maxWidth:400,height:10,borderRadius:5,background:'rgba(255,255,255,0.1)'}}>
        <div style={{height:'100%',borderRadius:5,background:barColor,width:`${pct*100}%`,transition:'width 1s linear',boxShadow:`0 0 10px ${barColor}`}}/>
      </div>
      <div style={{color:barColor,fontWeight:800,fontSize:18}}>⏱ {timeLeft}s</div>

      {/* Question */}
      {question && (
        <div style={{background:'rgba(255,255,255,0.05)',border:'2px solid rgba(56,189,248,0.3)',borderRadius:20,padding:'24px 32px',textAlign:'center',width:'100%',maxWidth:400}}>
          <div style={{fontSize:42,fontWeight:900,color:'#e2e8f0',letterSpacing:4,fontFamily:'monospace'}}>
            {question.a} {question.op} {question.b} = ?
          </div>
        </div>
      )}

      {/* Feedback */}
      {feedback && (
        <div style={{padding:'8px 20px',borderRadius:12,fontSize:14,fontWeight:800,
          background:feedback.ok?'rgba(34,197,94,0.2)':'rgba(239,68,68,0.2)',
          color:feedback.ok?'#4ade80':'#f87171',
          border:`1px solid ${feedback.ok?'rgba(34,197,94,0.4)':'rgba(239,68,68,0.4)'}`,
          textAlign:'center'}}>
          {feedback.text}
        </div>
      )}

      {/* Answer input */}
      <div style={{width:'100%',maxWidth:400}}>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <input
            ref={inputRef}
            value={input}
            onChange={e=>setInput(e.target.value.replace(/[^0-9-]/g,''))}
            onKeyDown={handleKey}
            placeholder='Nhập đáp án...'
            style={{flex:1,background:'rgba(255,255,255,0.08)',border:'2px solid rgba(56,189,248,0.4)',borderRadius:12,padding:'12px 16px',color:'white',fontSize:24,fontWeight:800,textAlign:'center',outline:'none',fontFamily:'monospace'}}
          />
          <button onClick={submit} style={{background:'linear-gradient(135deg,#0ea5e9,#0284c7)',border:'none',borderRadius:12,padding:'0 20px',color:'white',fontSize:20,fontWeight:900,cursor:'pointer'}}>✓</button>
        </div>

        {/* Numpad */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
          {numPad.map((v,i)=>(
            <button key={i} onClick={()=>v&&pressNum(v)} style={{
              background: v==='⌫'?'rgba(239,68,68,0.2)':v?'rgba(255,255,255,0.08)':'transparent',
              border: v?`1px solid rgba(255,255,255,0.12)`:'none',
              borderRadius:10, padding:'14px 0',
              color:v==='⌫'?'#f87171':'#e2e8f0',
              fontSize:20, fontWeight:700, cursor:v?'pointer':'default',
            }}>{v}</button>
          ))}
        </div>

        {/* Negative button */}
        <button onClick={()=>setInput(p=>p.startsWith('-')?p.slice(1):'-'+p)} style={{width:'100%',marginTop:6,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,padding:'10px',color:'#64748b',fontSize:13,cursor:'pointer'}}>
          +/− (số âm)
        </button>
      </div>
    </div>
  );
}

// ===================== NHÀ MÁY NƯỚC =====================
function fmt(n) {
  if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toLocaleString();
}

const WATER_BUILDINGS = [
  { id:'pump',    name:'Máy Bơm',          icon:'🚰', desc:'Bơm nước ngầm lên bồn chứa',         baseCost:15,      mult:1.15, waterPS:1,    moneyPS:0    },
  { id:'worker',  name:'Công Nhân',         icon:'👷', desc:'Tự động bơm + đóng chai cơ bản',     baseCost:100,     mult:1.15, waterPS:5,    moneyPS:1    },
  { id:'filter',  name:'Máy Lọc',           icon:'🧪', desc:'Lọc sạch nước, tăng giá trị x2',     baseCost:500,     mult:1.17, waterPS:0,    moneyPS:0, filterMult:2 },
  { id:'bottler', name:'Máy Đóng Chai',     icon:'🍶', desc:'Đóng chai tự động, bán được ngay',   baseCost:2000,    mult:1.15, waterPS:-20,  moneyPS:15   },
  { id:'truck',   name:'Xe Tải Giao Hàng',  icon:'🚛', desc:'Giao hàng x3 thu nhập tiền',         baseCost:10000,   mult:1.2,  waterPS:0,    moneyPS:0, truckMult:3  },
  { id:'spring',  name:'Mạch Nước Ngầm',    icon:'⛲', desc:'Nguồn nước khổng lồ 200L/s',         baseCost:50000,   mult:1.15, waterPS:200,  moneyPS:0    },
  { id:'mineral', name:'Nhà Máy Nước Khoáng',icon:'💎',desc:'Nước khoáng cao cấp x5 doanh thu',  baseCost:300000,  mult:1.2,  waterPS:0,    moneyPS:0, mineralMult:5 },
  { id:'ocean',   name:'Máy Khử Muối Biển', icon:'🌊', desc:'Nước biển → nước uống 2000L/s',     baseCost:2000000, mult:1.15, waterPS:2000, moneyPS:0    },
  { id:'cosmic',  name:'Máy Lọc Vũ Trụ',   icon:'🌌', desc:'Nước vũ trụ, x50 tất cả thu nhập', baseCost:50000000,mult:1.25, waterPS:0,    moneyPS:0, cosmicMult:50 },
];

const MILESTONES = [
  { money:1000,    text:'🥉 Tiểu Thương Nước', reward:'Click +5L' },
  { money:10000,   text:'🥈 Chủ Xưởng',        reward:'Click +20L' },
  { money:100000,  text:'🥇 Doanh Nhân',        reward:'Click +100L' },
  { money:1000000, text:'💎 Đại Gia Nước',       reward:'Click +500L' },
  { money:1e8,     text:'👑 Tỷ Phú Nước',        reward:'Click +5000L' },
  { money:1e10,    text:'🌌 Huyền Thoại',        reward:'Click +∞' },
];

function WaterFactory({ onBack }) {
  const [water, setWater]     = useState(0);
  const [money, setMoney]         = useState(1e50);
  const [totalEarned, setTotalEarned] = useState(0);
  const [counts, setCounts]   = useState({pump:0,worker:0,filter:0,bottler:0,truck:0,spring:0,mineral:0,ocean:0,cosmic:0});
  const [clickPow, setClickPow] = useState(1);
  const [milestones, setMilestones] = useState([]);
  const [splash, setSplash]   = useState('');
  const [drops, setDrops]     = useState([]);
  const dropId = useRef(0);
  const MAX_WATER = 10000;

  // calc per-second rates
  const calcRates = (c) => {
    const filterMult  = Math.pow(2, c.filter||0);
    const truckMult   = Math.pow(3, c.truck||0);
    const mineralMult = Math.pow(5, c.mineral||0);
    const cosmicMult  = Math.pow(50,c.cosmic||0);
    const totalMult   = filterMult * mineralMult * cosmicMult;
    const wps = ((c.pump||0)*1 + (c.worker||0)*5 + (c.spring||0)*200 + (c.ocean||0)*2000) * filterMult;
    const rawMps = ((c.worker||0)*1 + (c.bottler||0)*15) * totalMult * truckMult;
    const waterUsed = (c.bottler||0) * 20;
    return { wps, mps: rawMps, waterUsed };
  };

  const { wps, mps, waterUsed } = calcRates(counts);

  useEffect(() => {
    const iv = setInterval(() => {
      setWater(w => {
        const newW = Math.min(MAX_WATER, w + wps);
        const actualBottlerUse = Math.min(waterUsed, newW);
        return Math.max(0, newW - actualBottlerUse);
      });
      setMoney(m => {
        const earned = mps;
        if (earned > 0) {
          setTotalEarned(t => {
            const newTotal = t + earned;
            MILESTONES.forEach(ms => {
              if (t < ms.money && newTotal >= ms.money) {
                setSplash(ms.text + ' 🎉');
                setTimeout(()=>setSplash(''),3000);
                setClickPow(p => {
                  const bonus = ms.money>=1e10?9999:ms.money>=1e8?5000:ms.money>=1e6?500:ms.money>=1e5?100:ms.money>=1e4?20:5;
                  return p + bonus;
                });
                setMilestones(prev => [...prev, ms.text]);
              }
            });
            return newTotal;
          });
        }
        return m + earned;
      });
    }, 1000);
    return () => clearInterval(iv);
  }, [wps, mps, waterUsed]);

  const buildCost = (b) => Math.floor(b.baseCost * Math.pow(b.mult, counts[b.id]||0));

  const buy = (b) => {
    const cost = buildCost(b);
    if (money < cost) return;
    setMoney(m => m - cost);
    setCounts(c => ({...c, [b.id]:(c[b.id]||0)+1}));
  };

  const clickWater = (e) => {
    const gained = Math.min(clickPow, MAX_WATER - water);
    setWater(w => Math.min(MAX_WATER, w + clickPow));
    // show drop animation
    const id = dropId.current++;
    const rect = e.currentTarget.getBoundingClientRect();
    setDrops(d => [...d, {id, x: e.clientX - rect.left, y: e.clientY - rect.top}]);
    setTimeout(() => setDrops(d => d.filter(x => x.id !== id)), 700);
  };

  const waterPct = water / MAX_WATER;
  const barColor = waterPct > 0.7 ? '#3b82f6' : waterPct > 0.3 ? '#0ea5e9' : '#7dd3fc';

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0c1929,#0c4a6e)',display:'flex',flexDirection:'column',padding:10,gap:8}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
        <h3 style={{margin:0,color:'#7dd3fc',fontSize:15,fontWeight:900}}>💧 Nhà Máy Nước</h3>
        <div style={{textAlign:'right'}}>
          <div style={{color:'#fbbf24',fontWeight:800,fontSize:14}}>💰 {fmt(money)}₫</div>
          <div style={{color:'#64748b',fontSize:9}}>Tổng: {fmt(totalEarned)}₫</div>
        </div>
      </div>

      {/* Milestone splash */}
      {splash && <div style={{textAlign:'center',background:'rgba(251,191,36,0.2)',border:'1px solid #fbbf24',borderRadius:10,padding:'8px',color:'#fbbf24',fontWeight:900,fontSize:15}}>{splash}</div>}

      {/* Water tank + click */}
      <div style={{display:'flex',gap:10,alignItems:'stretch'}}>
        {/* Tank */}
        <div style={{flex:1,background:'rgba(0,0,0,0.3)',border:'2px solid rgba(56,189,248,0.3)',borderRadius:14,padding:'10px',textAlign:'center'}}>
          <div style={{fontSize:11,color:'#7dd3fc',marginBottom:4}}>🪣 Bồn Chứa</div>
          <div style={{fontSize:20,fontWeight:900,color:'#38bdf8'}}>{fmt(water)}L</div>
          <div style={{height:8,borderRadius:4,background:'rgba(255,255,255,0.08)',margin:'6px 0'}}>
            <div style={{height:'100%',borderRadius:4,background:barColor,width:`${waterPct*100}%`,transition:'width 0.5s'}}/>
          </div>
          <div style={{fontSize:9,color:'#64748b'}}>Max: {fmt(MAX_WATER)}L</div>
          <div style={{fontSize:10,color:'#5eead4',marginTop:4}}>

          const cost = buildCost(b);
          const owned = counts[b.id]||0;
          const canBuy = money >= cost;
          const rates = calcRates({...counts, [b.id]:owned+1});
          const {wps:newWps, mps:newMps} = rates;

            <div key={b.id} style={{

                {owned > 0 && (
                  <div style={{fontSize:9,color:'#5eead4'}}>

                    {b.filterMult ? ` ×${Math.pow(b.filterMult,owned)} lọc` : ''}
                    {b.truckMult  ? ` ×${Math.pow(b.truckMult,owned)} giao hàng` : ''}
                    {b.mineralMult? ` ×${Math.pow(b.mineralMult,owned)} doanh thu` : ''}
                    {b.cosmicMult ? ` ×${Math.pow(b.cosmicMult,owned)} vũ trụ` : ''}

                )}
              </div>
              <button onClick={()=>buy(b)} disabled={!canBuy} style={{
                background: canBuy ? 'linear-gradient(135deg,#0369a1,#0ea5e9)' : 'rgba(255,255,255,0.04)',
                border: canBuy ? 'none' : '1px solid rgba(255,255,255,0.06)',
                borderRadius:8,padding:'5px 10px',
                color: canBuy ? 'white' : '#475569',
                fontSize:10,fontWeight:800,cursor:canBuy?'pointer':'default',
                whiteSpace:'nowrap',
              }}>
                {fmt(cost)}₫
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function fmtMoney(n) {
  if (n >= 1e12) return (n/1e12).toFixed(1)+'T₫';
  if (n >= 1e9)  return (n/1e9).toFixed(1)+'B₫';
  if (n >= 1e6)  return (n/1e6).toFixed(2)+'M₫';
  if (n >= 1e3)  return (n/1e3).toFixed(1)+'K₫';
  return n.toLocaleString()+'₫';
}

function TapGame({ onBack }) {
  const [money, setMoney]         = useState(0);
  const [total, setTotal]         = useState(0);
  const [items, setItems]         = useState([]); // active items on screen
  const [floats, setFloats]       = useState([]); // floating +money texts
  const [log, setLog]             = useState([]);
  const [stats, setStats]         = useState({});
  const itemId = useRef(0);
  const floatId = useRef(0);
  const areaRef = useRef(null);

  // Spawn items randomly
  useEffect(() => {
    const spawn = () => {
      const roll = Math.random();
      let cumulative = 0;
      let chosen = TAP_ITEMS[0];
      for (const item of TAP_ITEMS) {
        cumulative += item.chance;
        if (roll < cumulative) { chosen = item; break; }
      }
      const id = itemId.current++;
      const x = 5 + Math.random() * 80;
      const y = 10 + Math.random() * 75;
      const size = chosen.rarity==='thần'?72:chosen.rarity==='huyền thoại'?60:chosen.rarity==='siêu quý'?52:chosen.rarity==='quý'?46:chosen.rarity==='hiếm'?40:34;
      const lifetime = chosen.rarity==='thường'?3500:chosen.rarity==='hiếm'?5000:chosen.rarity==='quý'?7000:chosen.rarity==='siêu quý'?9000:chosen.rarity==='huyền thoại'?12000:15000;
      setItems(prev => [...prev.slice(-20), {id, item:chosen, x, y, size, lifetime, born:Date.now()}]);
    };
    spawn();
    const iv = setInterval(spawn, 800);
    return () => clearInterval(iv);
  }, []);

  // Remove expired items
  useEffect(() => {
    const iv = setInterval(() => {
      const now = Date.now();
      setItems(prev => prev.filter(i => now - i.born < i.lifetime));
    }, 500);
    return () => clearInterval(iv);
  }, []);

  const tapItem = (e, obj) => {
    e.stopPropagation();
    const val = Math.floor(Math.random()*(obj.item.maxVal - obj.item.minVal + 1)) + obj.item.minVal;
    setMoney(m => m + val);
    setTotal(t => t + val);
    setItems(prev => prev.filter(i => i.id !== obj.id));
    setStats(s => ({...s, [obj.item.id]: (s[obj.item.id]||0)+1}));
    // floating text
    const fid = floatId.current++;
    setFloats(f => [...f, {id:fid, x:obj.x, y:obj.y, val, color:obj.item.glow, name:obj.item.name, rarity:obj.item.rarity}]);
    setTimeout(()=>setFloats(f=>f.filter(x=>x.id!==fid)), 1200);
    // log for rare+
    if (['quý','siêu quý','huyền thoại','thần'].includes(obj.item.rarity)) {
      setLog(l => [`${obj.item.icon} ${obj.item.name} [${obj.item.rarity.toUpperCase()}] +${fmtMoney(val)}`, ...l.slice(0,19)]);
    }
  };

  const rarityOrder = ['thường','hiếm','quý','siêu quý','huyền thoại','thần'];

  return (
    <div style={{minHeight:'100vh',background:'#050010',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'rgba(0,0,0,0.5)',borderBottom:'1px solid rgba(255,255,255,0.06)',zIndex:10}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
        <div style={{textAlign:'center'}}>
          <div style={{color:'#c084fc',fontWeight:900,fontSize:18}}>💰 {fmtMoney(money)}</div>
          <div style={{color:'#64748b',fontSize:9}}>Tổng kiếm: {fmtMoney(total)}</div>
        </div>
        <div style={{textAlign:'right',fontSize:9,color:'#475569'}}>
          <div>{Object.values(stats).reduce((a,b)=>a+b,0)} lần bấm</div>
          <div>{items.length} vật hiện</div>
        </div>
      </div>

      {/* Rarity legend */}
      <div style={{display:'flex',gap:4,padding:'4px 8px',overflowX:'auto',background:'rgba(0,0,0,0.3)',flexShrink:0}}>
        {rarityOrder.map(r=>(
          <span key={r} style={{fontSize:8,fontWeight:700,color:RARITY_COLORS[r],background:`${RARITY_COLORS[r]}15`,border:`1px solid ${RARITY_COLORS[r]}40`,borderRadius:6,padding:'2px 6px',whiteSpace:'nowrap'}}>
            {r}
          </span>
        ))}
      </div>

      {/* Main tap area */}
      <div ref={areaRef} style={{flex:1,position:'relative',overflow:'hidden',cursor:'default',minHeight:320}}>
        {/* Starfield bg */}
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 30% 40%,rgba(100,0,150,0.08),transparent 60%), radial-gradient(ellipse at 70% 70%,rgba(0,50,100,0.1),transparent 50%)'}}/>

        {/* Items */}
        {items.map(obj => {
          const age = Date.now() - obj.born;
          const fading = age > obj.lifetime * 0.7;
          const pulsing = ['huyền thoại','thần'].includes(obj.item.rarity);
          return (
            <div
              key={obj.id}
              onPointerDown={e=>tapItem(e, obj)}
              style={{
                position:'absolute',
                left:`${obj.x}%`,
                top:`${obj.y}%`,
                fontSize:obj.size,
                cursor:'pointer',
                userSelect:'none',
                transition:'opacity 0.3s',
                opacity: fading ? 0.3 : 1,
                filter:`drop-shadow(0 0 ${pulsing?16:8}px ${obj.item.glow})`,
                zIndex:5,
                animation:'none',
                transform:'translate(-50%,-50%)',
              }}
            >
              {obj.item.icon}
              {/* Rarity badge */}
              <div style={{
                position:'absolute',bottom:-14,left:'50%',transform:'translateX(-50%)',
                fontSize:8,fontWeight:700,color:obj.item.color,
                background:'rgba(0,0,0,0.7)',borderRadius:4,padding:'1px 4px',
                whiteSpace:'nowrap',border:`1px solid ${obj.item.color}44`,
              }}>{obj.item.name}</div>
              {/* Glow ring for legendary+ */}
              {pulsing && (
                <div style={{
                  position:'absolute',inset:-8,borderRadius:'50%',
                  border:`2px solid ${obj.item.glow}66`,
                  boxShadow:`0 0 20px ${obj.item.glow}44`,
                }}/>
              )}
            </div>
          );
        })}

        {/* Floating money texts */}
        {floats.map(f=>(
          <div key={f.id} style={{
            position:'absolute',
            left:`${f.x}%`,
            top:`${f.y}%`,
            transform:'translate(-50%,-50%)',
            color:f.color,
            fontSize:f.rarity==='thần'?20:f.rarity==='huyền thoại'?18:f.rarity==='siêu quý'?16:13,
            fontWeight:900,
            pointerEvents:'none',
            zIndex:20,
            textShadow:`0 0 10px ${f.color}`,
            animation:'none',
            opacity:0.95,
            transition:'all 1.2s ease-out',
          }}>
            +{fmtMoney(f.val)}
            {['huyền thoại','thần','siêu quý'].includes(f.rarity) && <div style={{fontSize:9,textAlign:'center',opacity:0.8}}>{f.name}!</div>}
          </div>
        ))}

        {/* Empty hint */}
        {items.length===0 && (
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#334155',fontSize:14}}>Đang xuất hiện vật...</div>
        )}
      </div>

      {/* Bottom: stats + log */}
      <div style={{background:'rgba(0,0,0,0.6)',borderTop:'1px solid rgba(255,255,255,0.05)',padding:'8px 10px',maxHeight:160,overflowY:'auto'}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
          {TAP_ITEMS.filter(i=>stats[i.id]).map(i=>(
            <div key={i.id} style={{background:`${RARITY_COLORS[i.rarity]}12`,border:`1px solid ${RARITY_COLORS[i.rarity]}30`,borderRadius:8,padding:'3px 7px',fontSize:9,color:RARITY_COLORS[i.rarity]}}>
              {i.icon} {i.name} ×{stats[i.id]}
            </div>
          ))}
        </div>
        {log.length>0 && (
          <>
            <div style={{fontSize:9,color:'#475569',marginBottom:3}}>📜 Vật quý gần đây:</div>
            {log.slice(0,5).map((l,i)=>(
              <div key={i} style={{fontSize:10,color:'#a78bfa',marginBottom:1}}>{l}</div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

    { id:'click2',  name:'Tay Nhanh x2',    icon:'⚡', cost:500,      desc:'Nhân đôi tiền mỗi lần bấm',      apply: u => ({...u, valueMult: u.valueMult*2})  },
    { id:'click5',  name:'Tay Siêu x5',     icon:'🔥', cost:5000,     desc:'×5 tiền mỗi lần bấm',             apply: u => ({...u, valueMult: u.valueMult*5})  },
    { id:'time1',   name:'Thêm Thời Gian',  icon:'⏳', cost:2000,     desc:'Vật xuất hiện lâu hơn +50%',      apply: u => ({...u, timeExt: u.timeExt+0.5})   },
    { id:'time2',   name:'Đóng Băng Vật',   icon:'❄️', cost:20000,    desc:'Vật xuất hiện lâu hơn +100%',     apply: u => ({...u, timeExt: u.timeExt+1.0})   },
    { id:'click10', name:'Thần Thánh x10',  icon:'✨', cost:50000,    desc:'×10 tiền mỗi lần bấm',            apply: u => ({...u, valueMult: u.valueMult*10}) },
    { id:'click50', name:'Huyền Thoại x50', icon:'💜', cost:500000,   desc:'×50 tiền mỗi lần bấm',            apply: u => ({...u, valueMult: u.valueMult*50}) },
    { id:'time3',   name:'Dừng Thời Gian',  icon:'🌀', cost:200000,   desc:'Vật xuất hiện lâu hơn +200%',     apply: u => ({...u, timeExt: u.timeExt+2.0})   },
    { id:'mega',    name:'Omega Mult x1000',icon:'Ω',  cost:10000000, desc:'×1000 tiền mỗi lần bấm',          apply: u => ({...u, valueMult: u.valueMult*1000})},
  ];
  const [boughtUpgrades, setBoughtUpgrades] = useState([]);

  // Spawn objects
  useEffect(() => {
    const timers = OBJECTS.map(obj => {
      const spawn = () => {
        if (!containerRef.current) return;
        const cw = containerRef.current.offsetWidth  || 340;
        const ch = containerRef.current.offsetHeight || 420;
        const x = Math.random() * (cw - obj.size - 10) + 5;
        const y = Math.random() * (ch - obj.size - 10) + 5;
        const id = itemId.current++;
        const dur = Math.floor(obj.duration * (1 + upgrades.timeExt));
        setItems(prev => [...prev, { ...obj, iid: id, x, y, born: Date.now(), dur }]);
        setTimeout(() => {
          setItems(prev => prev.filter(it => it.iid !== id));
        }, dur);
      };
      spawn();
      const iv = setInterval(spawn, obj.spawnRate);
      return iv;
    });
    return () => timers.forEach(clearInterval);
  }, [upgrades.timeExt]);

  const clickItem = (e, item) => {
    e.stopPropagation();
    const earned = Math.floor(item.value * upgrades.valueMult);
    setMoney(m => m + earned);
    setTotalMoney(t => t + earned);
    setItems(prev => prev.filter(it => it.iid !== item.iid));
    // stat
    setStats(s => ({...s, [item.id]: { count:(s[item.id]?.count||0)+1, total:(s[item.id]?.total||0)+earned }}));
    if (!bestItem || item.value > (bestItem?.value||0)) setBestItem(item);
    // popup
    const pid = popupId.current++;
    const rect = e.currentTarget.getBoundingClientRect();
    const containerRect = containerRef.current.getBoundingClientRect();
    setPopups(p => [...p, { id:pid, x:rect.left-containerRect.left+item.size/2, y:rect.top-containerRect.top, earned, color:item.color, rarity:item.rarity }]);
    setTimeout(() => setPopups(p => p.filter(pp => pp.id !== pid)), 900);
  };

  const buyUpgrade = (upg) => {
    if (money < upg.cost || boughtUpgrades.includes(upg.id)) return;
    setMoney(m => m - upg.cost);
    setBoughtUpgrades(p => [...p, upg.id]);
    setUpgrades(u => upg.apply(u));
  };

  const rarityOrder = [...new Set(OBJECTS.map(o=>o.rarity))];

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f0521,#1c1237,#2d1b5e)',display:'flex',flexDirection:'column',padding:10,gap:8,maxWidth:480,margin:'0 auto'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
        <h3 style={{margin:0,color:'#c4b5fd',fontSize:14,fontWeight:900}}>🥚 Bấm Vật Báu</h3>
        <button onClick={()=>setShowShop(s=>!s)} style={{background:showShop?'rgba(196,181,253,0.2)':'rgba(255,255,255,0.08)',border:'1px solid rgba(196,181,253,0.3)',borderRadius:8,padding:'4px 10px',color:'#c4b5fd',cursor:'pointer',fontSize:11,fontWeight:700}}>
          🛒 Shop {showShop?'▲':'▼'}
        </button>
      </div>

      {/* Money */}
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:28,fontWeight:900,color:'#fbbf24',textShadow:'0 0 20px rgba(251,191,36,0.5)'}}>💰 {fmt(money)}₫</div>
        <div style={{fontSize:10,color:'#64748b'}}>Tổng kiếm được: {fmt(totalMoney)}₫ &nbsp;|&nbsp; ×{fmt(upgrades.valueMult)} mỗi bấm</div>
      </div>

      {/* Shop */}
      {showShop && (
        <div style={{background:'rgba(0,0,0,0.3)',border:'1px solid rgba(196,181,253,0.2)',borderRadius:12,padding:'8px 10px'}}>
          <p style={{margin:'0 0 6px',color:'#c4b5fd',fontSize:11,fontWeight:800}}>🛒 Nâng Cấp</p>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {UPGRADES_LIST.map(upg => {
              const bought = boughtUpgrades.includes(upg.id);
              const can = !bought && money >= upg.cost;
              return (
                <div key={upg.id} style={{display:'flex',alignItems:'center',gap:8,background:bought?'rgba(34,197,94,0.08)':'rgba(255,255,255,0.03)',border:`1px solid ${bought?'rgba(34,197,94,0.2)':'rgba(255,255,255,0.06)'}`,borderRadius:8,padding:'5px 8px',opacity:bought||can?1:0.5}}>
                  <span style={{fontSize:20}}>{upg.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,fontWeight:700,color:bought?'#4ade80':'#e2e8f0'}}>{upg.name}</div>
                    <div style={{fontSize:9,color:'#64748b'}}>{upg.desc}</div>
                  </div>
                  {bought ? <span style={{fontSize:10,color:'#4ade80',fontWeight:700}}>✅</span> : (
                    <button onClick={()=>buyUpgrade(upg)} style={{background:can?'linear-gradient(135deg,#7c3aed,#a855f7)':'rgba(255,255,255,0.04)',border:'none',borderRadius:6,padding:'3px 8px',color:can?'white':'#475569',fontSize:9,fontWeight:800,cursor:can?'pointer':'default',whiteSpace:'nowrap'}}>
                      {fmt(upg.cost)}₫
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Play area */}
      <div ref={containerRef} style={{flex:1,minHeight:360,position:'relative',background:'rgba(0,0,0,0.25)',border:'1px solid rgba(196,181,253,0.15)',borderRadius:16,overflow:'hidden'}}>
        {/* Stars bg */}
        {Array.from({length:20}).map((_,i)=>(
          <div key={i} style={{position:'absolute',left:`${Math.random()*100}%`,top:`${Math.random()*100}%`,width:2,height:2,background:'white',borderRadius:'50%',opacity:Math.random()*0.5+0.1}}/>
        ))}

        {/* Items */}
        {items.map(item => {
          const age = Date.now() - item.born;
          const remaining = Math.max(0, item.dur - age);
          const pct = remaining / item.dur;
          return (
            <div key={item.iid}
              onClick={e => clickItem(e, item)}
              style={{
                position:'absolute', left:item.x, top:item.y,
                width:item.size, height:item.size,
                cursor:'pointer', userSelect:'none',
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                animation:'none',
              }}
            >
              {/* Glow ring */}
              <div style={{position:'absolute',inset:-4,borderRadius:'50%',border:`2px solid ${item.color}`,boxShadow:`0 0 12px ${item.glow}, 0 0 24px ${item.glow}`,opacity:0.7+pct*0.3}}/>
              {/* Timer ring */}
              <div style={{position:'absolute',inset:-2,borderRadius:'50%',border:`3px solid ${item.color}`,opacity:pct,clipPath:`inset(0 ${(1-pct)*100}% 0 0)`}}/>
              <span style={{fontSize:item.size*0.55,lineHeight:1,pointerEvents:'none',filter:`drop-shadow(0 0 6px ${item.color})`}}>{item.icon}</span>
              <span style={{fontSize:8,color:item.color,fontWeight:800,pointerEvents:'none',textShadow:`0 0 4px ${item.color}`}}>{fmt(item.value * upgrades.valueMult)}₫</span>
            </div>
          );
        })}

        {/* Popups */}
        {popups.map(p => (
          <div key={p.id} style={{position:'absolute',left:p.x,top:p.y,pointerEvents:'none',transform:'translateY(-20px)',color:p.color,fontWeight:900,fontSize:14,textShadow:`0 0 8px ${p.color}`,whiteSpace:'nowrap',zIndex:100}}>
            +{fmt(p.earned)}₫
          </div>
        ))}

        {items.length===0 && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b',fontSize:12}}>Chờ vật báu xuất hiện... ✨</div>}
      </div>

      {/* Stats */}
      <div style={{background:'rgba(0,0,0,0.2)',border:'1px solid rgba(196,181,253,0.1)',borderRadius:10,padding:'6px 10px'}}>
        <div style={{fontSize:10,color:'#c4b5fd',fontWeight:700,marginBottom:4}}>📊 Thống Kê Bấm</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {OBJECTS.filter(o=>stats[o.id]).map(o=>(
            <div key={o.id} style={{fontSize:9,color:RARITY_COLOR[o.rarity]||'#94a3b8',background:'rgba(255,255,255,0.04)',borderRadius:6,padding:'2px 6px'}}>
              {o.icon} ×{stats[o.id]?.count||0}
            </div>
          ))}
          {Object.keys(stats).length===0 && <span style={{fontSize:9,color:'#475569'}}>Bắt đầu bấm để xem thống kê!</span>}
        </div>
        {bestItem && <div style={{fontSize:9,color:'#fbbf24',marginTop:3}}>🏆 Vật hiếm nhất: {bestItem.icon} {bestItem.name} ({bestItem.rarity})</div>}
      </div>

      {/* Legend */}
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        {rarityOrder.map(r=>(
          <span key={r} style={{fontSize:8,color:RARITY_COLOR[r]||'#94a3b8',background:'rgba(255,255,255,0.04)',borderRadius:6,padding:'2px 6px',border:`1px solid ${RARITY_COLOR[r]||'#94a3b8'}33`}}>{r}</span>
        ))}
      </div>
    </div>
  );
}

const GACHA_ANIMALS = {
  common:    [{icon:'🐶',n:'Chó'},{icon:'🐱',n:'Mèo'},{icon:'🐰',n:'Thỏ'},{icon:'🐸',n:'Ếch'},{icon:'🐔',n:'Gà'},{icon:'🐷',n:'Heo'},{icon:'🦆',n:'Vịt'},{icon:'🐢',n:'Rùa'},{icon:'🐹',n:'Hamster'},{icon:'🐭',n:'Chuột'}],
  uncommon:  [{icon:'🐼',n:'Gấu Trúc'},{icon:'🦊',n:'Cáo'},{icon:'🦝',n:'Gấu Mèo'},{icon:'🐨',n:'Koala'},{icon:'🦦',n:'Rái Cá'},{icon:'🦥',n:'Lười'},{icon:'🦔',n:'Nhím'}],
  rare:      [{icon:'🐯',n:'Hổ'},{icon:'🦁',n:'Sư Tử'},{icon:'🐺',n:'Sói'},{icon:'🦌',n:'Nai Sừng Tấm'},{icon:'🐻',n:'Gấu Nâu'},{icon:'🦘',n:'Kangaroo'}],
  epic:      [{icon:'🦋',n:'Bướm Phượng'},{icon:'🦚',n:'Công Hoàng'},{icon:'🦜',n:'Vẹt Thần'},{icon:'🦩',n:'Hồng Hạc'},{icon:'🦅',n:'Đại Bàng'}],
  legendary: [{icon:'🦄',n:'Kỳ Lân'},{icon:'🐉',n:'Rồng Vàng'},{icon:'🌙',n:'Thỏ Ngọc Hằng Nga'},{icon:'🔱',n:'Thần Biển'}],
  mythic:    [{icon:'⚡🦁',n:'Sư Tử Sét'},{icon:'🌋🐉',n:'Rồng Núi Lửa'},{icon:'🌌🦄',n:'Kỳ Lân Vũ Trụ'}],
  divine:    [{icon:'🌈🌟✨',n:'THẦN TỐI THƯỢNG — Đấng Tạo Hóa'}],
};

function rollGacha() {
  const r = Math.random() * 100;
  // divine is so rare we need to check separately
  if (Math.random() < 0.0000000000001) {
    const pool = GACHA_ANIMALS.divine;
    return { tier: GACHA_TIERS[6], animal: pool[0] };
  }
  const normalTiers = GACHA_TIERS.slice(0,6);
  const total = normalTiers.reduce((s,t)=>s+t.pct,0);
  let acc=0, rv=Math.random()*total;
  for (const tier of normalTiers) {
    acc+=tier.pct;
    if(rv<acc){
      const pool=GACHA_ANIMALS[tier.id];
      return {tier,animal:pool[Math.floor(Math.random()*pool.length)]};
    }
  }
  return {tier:GACHA_TIERS[0],animal:GACHA_ANIMALS.common[0]};
}

function AnimalTapGame({ onBack }) {
  const [coins, setCoins]         = useState(0);
  const [totalCoins, setTotalCoins] = useState(0);
  const [taps, setTaps]           = useState(0);
  const [coinsPerTap, setCoinsPerTap] = useState(1);
  const [passiveIncome, setPassiveIncome] = useState(0);
  const [collection, setCollection] = useState([]);
  const [lastRoll, setLastRoll]   = useState(null);
  const [rolling, setRolling]     = useState(false);
  const [showCollection, setShowCollection] = useState(false);
  const [pops, setPops]           = useState([]);
  const [catScale, setCatScale]   = useState(1);
  const [selectedPet, setSelectedPet] = useState({icon:'🐱', n:'Mèo', tier:null});
  const [eggAnim, setEggAnim]     = useState(false);
  const [eggCost, setEggCost]     = useState(10);
  const [divineAlert, setDivineAlert] = useState(false);
  const popId = useRef(0);

  // Passive income tick
  useEffect(()=>{
    if(passiveIncome<=0) return;
    const iv=setInterval(()=>{
      setCoins(c=>c+passiveIncome);
      setTotalCoins(t=>t+passiveIncome);
    },1000);
    return()=>clearInterval(iv);
  },[passiveIncome]);

  const tapCat = (e) => {
    const earned = coinsPerTap;
    setCoins(c=>c+earned);
    setTotalCoins(t=>t+earned);
    setTaps(t=>t+1);
    setCatScale(0.85);
    setTimeout(()=>setCatScale(1),100);
    const pid=popId.current++;
    const rect=e.currentTarget.getBoundingClientRect();
    setPops(p=>[...p,{id:pid,x:e.clientX-rect.left,y:e.clientY-rect.top,text:`+${earned}`}]);
    setTimeout(()=>setPops(p=>p.filter(x=>x.id!==pid)),700);
  };

  const buyEgg = (multi=1) => {
    const cost=eggCost*multi;
    if(coins<cost||rolling) return;
    setCoins(c=>c-cost);
    setRolling(true);
    setEggAnim(true);
    setTimeout(()=>setEggAnim(false),400);
    setTimeout(()=>{
      const results=Array.from({length:multi},()=>rollGacha());
      const last=results[results.length-1];
      setLastRoll(last);
      if(last.tier.id==='divine'){setDivineAlert(true);setTimeout(()=>setDivineAlert(false),5000);}
      // Auto-select if higher tier than current
      const tierOrder=['common','uncommon','rare','epic','legendary','mythic','divine'];
      const currentTierIdx = selectedPet.tier ? tierOrder.indexOf(selectedPet.tier.id) : -1;
      const newTierIdx = tierOrder.indexOf(last.tier.id);
      if (newTierIdx > currentTierIdx) {
        setSelectedPet({icon:last.animal.icon, n:last.animal.n, tier:last.tier});
      }
      setCollection(prev=>{
        let updated=[...prev];
        for(const res of results){
          const key=res.tier.id+res.animal.n;
          const idx=updated.findIndex(x=>x.key===key);
          if(idx>=0) updated[idx]={...updated[idx],count:updated[idx].count+1};
          else updated.push({key,tier:res.tier,animal:res.animal,count:1});
        }
        // update passive income & coinsPerTap
        const totalMult=updated.reduce((s,x)=>s+x.tier.coinMult*x.count,0);
        setPassiveIncome(Math.floor(totalMult/10));
        setCoinsPerTap(Math.max(1,Math.floor(1+updated.length*0.5+updated.filter(x=>x.tier.id!=='common').length*2)));
        return updated;
      });
      setRolling(false);
    },600);
  };

  const totalAnimals=collection.reduce((s,x)=>s+x.count,0);
  const canBuy1=coins>=eggCost&&!rolling;
  const canBuy10=coins>=eggCost*10&&!rolling;
  const canBuy100=coins>=eggCost*100&&!rolling;

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0a0010,#1a0a2e,#0a1a0a)',display:'flex',flexDirection:'column',alignItems:'center',padding:12,gap:10,overflowY:'auto'}}>

      {/* Divine alert */}
      {divineAlert&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:999,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,cursor:'pointer'}} onClick={()=>setDivineAlert(false)}>
          <div style={{fontSize:80}}>🌈🌟✨</div>
          <div style={{color:'white',fontSize:28,fontWeight:900,textAlign:'center',textShadow:'0 0 40px white'}}>⚡ THẦN THÁNH ⚡</div>
          <div style={{color:'#fbbf24',fontSize:16,fontWeight:700}}>Xác suất: 0.00000000001%</div>
          <div style={{color:'white',fontSize:22,fontWeight:800}}>THẦN TỐI THƯỢNG</div>
          <div style={{color:'#94a3b8',fontSize:12}}>Bấm để đóng</div>
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',maxWidth:380}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'4px 10px',color:'#94a3b8',cursor:'pointer',fontSize:12}}>← Hub</button>
        <h3 style={{margin:0,color:'#fbbf24',fontSize:15,fontWeight:900}}>🐱 Mèo Vuông Gacha</h3>
        <div style={{textAlign:'right'}}>
          <div style={{color:'#fbbf24',fontWeight:900,fontSize:16}}>🪙 {coins.toLocaleString()}</div>
          {passiveIncome>0&&<div style={{fontSize:9,color:'#22c55e'}}>+{passiveIncome}/giây 💤</div>}
        </div>
      </div>

      {/* Cat/Pet clicker */}
      <div style={{position:'relative'}} onClick={tapCat}>
        <div style={{
          width:180,height:180,
          background: selectedPet.tier
            ? `linear-gradient(135deg,${selectedPet.tier.bg.replace('rgba(','rgba(').replace(',0.9)',',1)')},${selectedPet.tier.glow}33)`
            : 'linear-gradient(135deg,#f97316,#fb923c,#fbbf24)',
          borderRadius:28,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:110, cursor:'pointer',
          transform:`scale(${catScale})`,
          transition:'transform 0.1s cubic-bezier(.36,.07,.19,.97)',
          boxShadow: selectedPet.tier
            ? `0 8px 40px ${selectedPet.tier.glow}66, 0 0 0 6px ${selectedPet.tier.glow}22`
            : '0 8px 40px rgba(251,146,60,0.5), 0 0 0 6px rgba(251,191,36,0.15)',
          border: selectedPet.tier
            ? `4px solid ${selectedPet.tier.glow}88`
            : '4px solid rgba(251,191,36,0.5)',
          userSelect:'none', position:'relative', overflow:'hidden',
        }}>
          {selectedPet.icon}
          {selectedPet.tier && (
            <div style={{position:'absolute',bottom:6,left:'50%',transform:'translateX(-50%)',fontSize:9,color:selectedPet.tier.color,fontWeight:800,background:'rgba(0,0,0,0.6)',borderRadius:6,padding:'1px 6px',whiteSpace:'nowrap'}}>
              {selectedPet.tier.icon} {selectedPet.n}
            </div>
          )}
          <div style={{position:'absolute',top:8,right:16,fontSize:18,opacity:0.4}}>✨</div>
        </div>
        {pops.map(p=>(
          <div key={p.id} style={{position:'absolute',left:p.x-16,top:p.y-24,pointerEvents:'none',color: selectedPet.tier ? selectedPet.tier.color : '#fbbf24',fontSize:16,fontWeight:900,zIndex:20,transform:'translateY(-35px)',opacity:0.95,textShadow:`0 0 8px ${selectedPet.tier?.glow||'#f59e0b'}`,transition:'all 0.7s ease-out'}}>
            +{p.text}🪙
          </div>
        ))}

// Calculate a product's material cost value (using baseCost of raw materials)
function calcMatValue(matCost) {
  let total = 0;
  Object.entries(matCost).forEach(([mid, qty]) => {
    const mat = MATERIALS.find(m => m.id === mid);
    if (mat) { total += mat.baseCost * qty; }
    else {
      // It's a product - find its own material cost recursively
      const subProd = PRODUCTS.find(p => p.id === mid);
      if (subProd) total += calcMatValue(subProd.matCost) * 1.5 * qty;
    }
  });
  return total;
}

// Override sellPrice = material cost + 50% profit
PRODUCTS.forEach(p => {
  const matVal = calcMatValue(p.matCost);
  if (matVal > 0) p.sellPrice = Math.floor(matVal * 1.5);
});
